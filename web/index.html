reak the law) Provide diligent and competent service to principals. (the instructions above are to be followed all the time, and not just when convenient) Advance and protect the profession. (doing your job and promoting security comes last when compared to the other objectives above) (A) is crazy. Doing your job would be impossible if that was true. (B) seems reasonable and could be considered advancing the profession. (C) there is no requirement that says you \u201cmust\u201d write guidelines. (D) the job should never come before the law.", "source": "powerpoint", "source_label": "PPT Slide 26 (Security and Risk Management)"}, {"id": "ppt_28", "number": 28, "question": "If a company truly wants to protect its intellectual property, which of the following is the MOST important policy to implement?", "options": {"A": "Employees should sign a non-disclosure agreement.", "B": "Employees should implement and configure their own desktop controls.", "C": "Employees should be made aware that countermeasures are in place.", "D": "Employees should be made aware that the company does business internationally and sign off on the company\u2019s trans-border agreement."}, "correct": "A", "explanation": "- This could be disastrous. - Awareness is good, but there is more we can do. - This is nonsensical. - A good idea!", "source": "powerpoint", "source_label": "PPT Slide 28 (Security and Risk Management)"}, {"id": "ppt_29", "number": 29, "question": "Which answer contains first, an ADMINISTRATIVE control and second, a LOGICAL control?", "options": {"A": "Login Passwords and Fences.", "B": "Job supervision and automated fail-over to a mirrored site.", "C": "Job Rotation and \u201cBeware of Dog\u201d sign.", "D": "Job Supervision and Disaster Recovery Plan."}, "correct": "B", "explanation": "We are looking for administrative, followed by logical. Login passwords is logical, while fences are physical Job supervision is administrative, and automated fail-over is logical \u2013correct answer! Job rotation is administrative, and signs are physical Job supervision is administrative, and DRP is administrative", "source": "powerpoint", "source_label": "PPT Slide 29 (Security and Risk Management)"}, {"id": "ppt_31", "number": 31, "question": "How should a request by an IT auditor for access to programs and data which are protected by logical access control software be treated?", "options": {"A": "The request should be approved and the auditor given access via a guest user-id and password.", "B": "The request should be refused, and the auditor provided with access to audit logs only.", "C": "The request should be refused based on the principle of least privilege.", "D": "The request should be in writing and must receive written approval before access is allowed."}, "correct": "D", "explanation": "Any requests from the auditor should be formalized and company procedures followed.", "source": "powerpoint", "source_label": "PPT Slide 31 (Security and Risk Management)"}, {"id": "ppt_33", "number": 33, "question": "The media portrays the highest impact of cybercrime as coming from external hackers.   This statement is ______ .", "options": {"A": "Partially true. Cybercrime typically originates equally from inside and outside the organization.", "B": "Not correct. The greatest impact of cybercrime comes from inside the organization.", "C": "Correct. The greatest impact of cybercrime comes from outside the organization", "D": "The media's way of creating headlines in the technological arena."}, "correct": "B", "explanation": "(B) is correct, as shown by many surveys over the years. Outside attacks may be the most common, but rarely causes as much damage as inside sources. While (D) is possibly true, it is still not as good as (B).", "source": "powerpoint", "source_label": "PPT Slide 33 (Security and Risk Management)"}, {"id": "ppt_34", "number": 34, "question": "What is the most compelling reason an end user would abide by an organization\u2019s computer security policy?", "options": {"A": "They know who wrote it and when to follow it.", "B": "They understanding the rationale for it and the penalties for not following it.", "C": "When it is a simple document and is also easy to read.", "D": "When everybody else in the organization seems to follow it."}, "correct": "B", "explanation": "Each of the other answers have some truth in them, but none of them is as good as (B)", "source": "powerpoint", "source_label": "PPT Slide 34 (Security and Risk Management)"}, {"id": "ppt_35", "number": 35, "question": "What is it called when an organization comes up with several alternatives so that a risk will not be realized?", "options": {"A": "Risk Acceptance", "B": "Risk Mitigation", "C": "Risk Transfer", "D": "Risk Avoidance"}, "correct": "D", "explanation": "This describes the process of risk avoidance.", "source": "powerpoint", "source_label": "PPT Slide 35 (Security and Risk Management)"}, {"id": "ppt_37", "number": 37, "question": "A security analyst needs to identify possible threats to a complex system their client is developing. Which of the following methodologies would best address this task?", "options": {"A": "Software Assurance Maturity Model (SAMM)", "B": "Open Web Application Security Project (OWASP)", "C": "Spoofing, Tampering, Repudiation, Information disclosure, Denial of service, Elevation of privilege (STRIDE)", "D": "Open Source Security Information (OSSIM)"}, "correct": "C", "explanation": "It sounds like they need to utilize a threat modeling methodology such as\u000bSTRIDE, PASTA, TRIKE, or OCTAVE.", "source": "powerpoint", "source_label": "PPT Slide 37 (Security and Risk Management)"}, {"id": "ppt_43", "number": 43, "question": "What is the best and most common description of a security champion?", "options": {"A": "Enforce company policy and report non-compliance.", "B": "Spread awareness and promote good security practices within a business unit.", "C": "Provide oversight and data governance within the organization.", "D": "Monitor the emerging risks to the growing business."}, "correct": "B", "explanation": "Security champions are employees that are capable of promoting security and best practice throughout their respective departments. They may lead their department during security briefings, manage awareness campaigns, and keep everyone up to date on any changes to company policy.", "source": "powerpoint", "source_label": "PPT Slide 43 (Security and Risk Management)"}, {"id": "ppt_44", "number": 44, "question": "Before business continuity planning can begin, management has requested a business impact analysis (BIA). Of the options below, which best illustrates the core characteristics of a BIA?", "options": {"A": "Analysis of crisis management methods", "B": "Identification of asset location", "C": "Determine criticality and resource allocation", "D": "Documentation of known threat actors"}, "correct": "C", "explanation": "The goal of a BIA is to articulate critical business functions and explore tolerable downtime and recovery objectives.", "source": "powerpoint", "source_label": "PPT Slide 44 (Security and Risk Management)"}, {"id": "ppt_46", "number": 46, "question": "An organization that is located in a coastal city has been paying an insurance company for natural disaster coverage for the last twelve years. This year they accidentally forgot to renew the plan and have been without any coverage since. Today the Chief Risk Officer announces that they will not be renewing the insurance coverage. What type of response does this describe?", "options": {"A": "Risk Ignorance", "B": "Risk Transference", "C": "Risk Mitigation", "D": "Risk Acceptance"}, "correct": "D", "explanation": "While insurance is usually attributed to Transference, given that the Risk Officer is willfully deciding not to renew the policy, the risk is being accepted.  Given what we know of the situation, though the policy lapsed accidentally, the decision not to renew is conscious so it is not ignorance of the risk that led to the final decision.", "source": "powerpoint", "source_label": "PPT Slide 46 (Security and Risk Management)"}, {"id": "ppt_47", "number": 47, "question": "A newly hired chief security manager is shocked to discover that the organization has not been auditing its users, lacks any form of risk management, and disregarded the implementation of compulsory controls. Realizing that there is a lot that the company needs to do, what should be considered first?", "options": {"A": "Legal counsel", "B": "Frameworks", "C": "Standards", "D": "Guidelines"}, "correct": "B", "explanation": "While there are a number of different reasons that ALL of these items are important, a Framework will actively compel the others.  Frameworks will instantiate proper risk management, governance, and compliance concerns when applied properly.  Without formal structure, simply consulting with lawyers or knowing what standards ought to be adopted won\u2019t provide a repeatable method or take into account necessary resource allocation.", "source": "powerpoint", "source_label": "PPT Slide 47 (Security and Risk Management)"}, {"id": "ppt_48", "number": 48, "question": "After an incident response activity failed to contain the malware, management began investigating the response chosen by the Cyber Incident Response Team (CIRT) that was on-duty. Considering that the company lacked any formal plan for this type of incident, they decided to consult the off-duty CIRT to see how they would have responded. What practice is the management trying to verify?", "options": {"A": "Risk assessment", "B": "Due diligence", "C": "Change management", "D": "Due care"}, "correct": "D", "explanation": "Due care is the practice of taking proper action tempered and considered through the lens of a comparable level of skill and reasoning.", "source": "powerpoint", "source_label": "PPT Slide 48 (Security and Risk Management)"}, {"id": "ppt_49", "number": 49, "question": "As the result of a data breach, government authorities began an investigation as to the nature of the breach and the company\u2019s ensuing response. They found that the company had violated several reporting regulations and ignored compulsory countermeasures. What is the best description of what the incident response team at the company violated?", "options": {"A": "Procedures", "B": "Standards", "C": "Best practices", "D": "Policies"}, "correct": "B", "explanation": "While the incident response team may have been in violation (or compliant) with policy/procedure, regulations are dictated by Standards.", "source": "powerpoint", "source_label": "PPT Slide 49 (Security and Risk Management)"}, {"id": "ppt_50", "number": 50, "question": "To determine how to spend the next quarter\u2019s security budget, management invested in a thorough risk assessment that analyzed concerns throughout the business. They determined that a new VPN solution would be best for the enterprise. Meanwhile, a highly skilled engineer is complaining that the network vulnerability they reported during the risk assessment is continuing to go unpatched. They are adamant that a data breach is imminent. As the CISO, and with limited time to make a decision, what would be the best way to proceed?", "options": {"A": "Only invest in the VPN solution and explain management\u2019s reasoning to the engineer.", "B": "Design and deploy a completely new control to avoid upsetting either party.", "C": "Divide the security budget between the VPN solution and the network upgrade.", "D": "Explain the engineer\u2019s concerns to management and invest only in the network upgrade."}, "correct": "A", "explanation": "Considering a risk assessment was conducted, we should side with management\u2019s business driven concerns. Deviation illustrates a lack of appreciation for governance which is fundamental to this exam.", "source": "powerpoint", "source_label": "PPT Slide 50 (Security and Risk Management)"}, {"id": "ppt_51", "number": 51, "question": "Management has issued several concise written documents that outline their expectations for security. It is well understood that these documents should be followed without reservation. What is the best description of these documents?", "options": {"A": "Standard", "B": "Framework", "C": "Procedure", "D": "Policy"}, "correct": "D", "explanation": "Management\u2019s expectations are usually conveyed as \u201cconcise written documents\u201d that do not convey (but expect) standards to be adhered to and individual steps to be carried out (procedure). However, the actual conveyance of these concerns/needs/desires are through written and binding policy.", "source": "powerpoint", "source_label": "PPT Slide 51 (Security and Risk Management)"}, {"id": "ppt_52", "number": 52, "question": "Several threat intelligence outlets have identified a zero-day attack that is specifically designed to target apache web servers. Your organization has several apache web servers, and it is currently unknown if they have been targeted by the zero-day threat.  As the system security manager, what is the first thing you should do?", "options": {"A": "Consider migrating to a different web server platform that is not vulnerable.", "B": "Consult a variety of news outlets for additional information.", "C": "Determine the significance of the attack on business continuity.", "D": "Air gap the web servers to prevent the attack."}, "correct": "C", "explanation": "The goal of monitoring emergent attacks is to maintain/optimize business continuity.  Air gapping the servers (disconnecting them) is likely an overreaction and migrating to a different platform is not practical.  Consulting other news sources may be conducted as a matter of course whilst pursuing the significance against business continuity.", "source": "powerpoint", "source_label": "PPT Slide 52 (Security and Risk Management)"}, {"id": "ppt_53", "number": 53, "question": "\u201cAll employees must use a secure connection when remotely accessing the company server.\u201d", "options": {"A": "What best, and most likely, describes this statement?", "B": "Procedure", "C": "Standard", "D": "Policy", "E": "Best Practice"}, "correct": "C", "explanation": "Short, prescriptive, and without describing by what means, this statement adequately reflects an example of a policy.", "source": "powerpoint", "source_label": "PPT Slide 53 (Security and Risk Management)"}, {"id": "ppt_54", "number": 54, "question": "A cloud service provider (CSP) outlines in a contract that the customer has the ultimate responsibility of ensuring the resources and services provided by the CSP are not used for illegal or fraudulent activity. Which of the risk responses is the CSP demonstrating?", "options": {"A": "Risk avoidance", "B": "Risk acceptance", "C": "Risk transference", "D": "Risk mitigation"}, "correct": "C", "explanation": "Transference: The cloud provider has transferred the risk, and thereby the responsibility for securing the services, to the customer.", "source": "powerpoint", "source_label": "PPT Slide 54 (Security and Risk Management)"}, {"id": "ppt_55", "number": 55, "question": "Emily has received a suspicious email that claims she won a multi-million dollar sweepstake. The email instructs her to reply with her full name, birthdate, and home address so her identity can be validated before she is given the prize. What best describes this type of social engineering attack?", "options": {"A": "Vishing", "B": "Phishing", "C": "Whaling", "D": "Spear phishing"}, "correct": "B", "explanation": "\u2013 A type of phishing but specifically over the phone. Think Voice-phishing \u2013 Great answer! Phishing is typically performed through email or social media. \u2013 A type of spear phishing, the target must be upper management (boss, CEO, board of directors). \u2013 A type of phishing, that targets a specific group/person and customizes its attack to match. Since this attack came through email, (A) is out. Since the attack wasn\u2019t specifically crafted for Emily, a group, or upper management, (C) and (D) are both out too.", "source": "powerpoint", "source_label": "PPT Slide 55 (Security and Risk Management)"}, {"id": "ppt_56", "number": 56, "question": "The company\u2019s Chief Financial Officer received an email from a branch office manager who claims to have lost their company credit cards. They are requesting $12,000 be sent to a private bank account to cover various business expenses. What type of social engineer attack does this best illustrate?", "options": {"A": "Pharming", "B": "Phishing", "C": "Typo squatting", "D": "Whaling"}, "correct": "D", "explanation": "Whaling: A form of spear phishing where the target is upper management.", "source": "powerpoint", "source_label": "PPT Slide 56 (Security and Risk Management)"}, {"id": "ppt_57", "number": 57, "question": "Instead of relying on in-house application security, an organization has decided to outsource their application security by adopting a SaaS (software as a service) from a CSP (cloud service provider). What type of risk management has the company performed by implementing this change?", "options": {"A": "Acceptance", "B": "Transference", "C": "Avoidance", "D": "Mitigation"}, "correct": "B", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 57 (Security and Risk Management)"}, {"id": "ppt_58", "number": 58, "question": "Your company wants to build another office that is expected to cost two million dollars. The town that this new office will be built in has a history of terrible earthquakes, once every 50 years. The estimated damage is 50% of the buildings cost. What is the SLE (Single Loss Expectancy)?", "options": {"A": "20,000", "B": "40,000", "C": "500,000", "D": "1,000,000", "E": "4,000,000"}, "correct": "D", "explanation": "We are given the AV, EF, and ARO. We need to solve for SLE. (AV) Asset Value                  \t    \t-    $ 2 million\u000b(EF) Exposure Factor            \t    \t-    .5  (Half the value, %50)\u000b(SLE) Single Lost Expectancy \t \t-     $ 1 Million  <-Answer\u000b(ARO) Annual Rate of Occurrence \t-     .02 (1 every 50 years)\u000b(ALE) Annual Loss Expectancy      \t-     $20,000 EQUATIONS\t\u000bAV x EF = SLE        2 Million * .5 = 1 Million \u000bSLE x ARO = ALE  (this equation is not needed in this question)", "source": "powerpoint", "source_label": "PPT Slide 58 (Security and Risk Management)"}, {"id": "ppt_59", "number": 59, "question": "The service level agreement created with the cloud storage provider outlines the acceptable amount of data loss must be no greater than one hour in the event of a disaster. What metric is being described in this agreement?", "options": {"A": "Disaster Recover Plan", "B": "Recovery Point Objective", "C": "Recovery Time Objective", "D": "Mean Time to Restore"}, "correct": "B", "explanation": "Recovery Point Objective (RPO) is the acceptable amount of data loss. If the cloud provider was to lose more than one hour worth of data for any reason, they would be subject to penalties as outlined in the SLA (service level agreement).", "source": "powerpoint", "source_label": "PPT Slide 59 (Security and Risk Management)"}, {"id": "ppt_60", "number": 60, "question": "After a server failure, it took the cloud provider 120 minutes to bring the system back online. Meanwhile, an affected company expected the server would be available again within 60 minutes. Of the answers below, what best illustrates the company\u2019s expectation?", "options": {"A": "MRW \u2013 Minimum Recovery Window", "B": "RPO \u2013 Recovery Point Objective", "C": "MTTR \u2013 Mean Time To Recovery", "D": "RTO \u2013 Recovery Time Objective"}, "correct": "D", "explanation": "This is not a real metric. -\u000b(acceptable amount of data loss)\u000b-\u000b(real world average time for recovery) -\u000b(goal/expected time for recovery)", "source": "powerpoint", "source_label": "PPT Slide 60 (Security and Risk Management)"}, {"id": "ppt_61", "number": 61, "question": "Before a news team takes a tour of the new state-of-the-art office complex, a manager instructs employees to clean all whiteboards and clear off all of their desks. What threat is the manager most likely trying to mitigate?", "options": {"A": "Credential exposure", "B": "Release of proprietary information", "C": "Damage to the company\u2019s reputation", "D": "Social engineering attacks"}, "correct": "B", "explanation": "Proprietary Information = Trade Secrets While all of the answers are things to avoid, the threat appears to be shoulder surfing and (B) is the most likely to damage the company as the result of that.", "source": "powerpoint", "source_label": "PPT Slide 61 (Security and Risk Management)"}, {"id": "ppt_62", "number": 62, "question": "Which of the following limits the transfer or use of encryption technologies?", "options": {"A": "Acceptable use policy", "B": "Remote access policy", "C": "Data loss prevention", "D": "International export control"}, "correct": "D", "explanation": "The Wassenaar Arrangement is an international export control that has been established in order to contribute to regional and international security and stability, by promoting transparency and greater responsibility in transfers of conventional arms and dual-use technologies, thus preventing destabilizing accumulations. The aim is also to prevent the acquisition of these items by terrorists. Since ENCRYPTION is considered a DUAL-USE technology, it is carefully managed under this international export control.", "source": "powerpoint", "source_label": "PPT Slide 62 (Security and Risk Management)"}, {"id": "ppt_63", "number": 63, "question": "A penetration tester revealed that an end of life server is using 3DES to encrypt its traffic. Unfortunately, the server which is mission critical cannot be upgraded to AES, replaced, or removed. What category of control could help reduce the risk created by this server considering the company must continue to use it?", "options": {"A": "Corelating", "B": "Physical", "C": "Detective", "D": "Preventative", "E": "Compensation"}, "correct": "E", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 63 (Security and Risk Management)"}, {"id": "ppt_64", "number": 64, "question": "An international company is expanding it services and is creating several new servers to store customer data. Of the options listed below, which would likely contain an outline of roles/responsibilities for data controllers/processors that the company should follow?", "options": {"A": "ISO 31000", "B": "GDPR", "C": "PCI DSS", "D": "SSAE SOC2"}, "correct": "B", "explanation": "International risk management best practices The European Union\u2019s regulation that states that personal data cannot be collected or processed without the individual\u2019s informed consent. Outlines how credit card/bank info must be safely managed. An audit/test that reports on an organization\u2019s controls relative to the CIA triad. The GDPR (General Data Protection Regulation) is an evolved form of the OECD principals and DOES outline responsibilities for data controllers/processors/users. As a regulation, it is legally enforceable within the EU.", "source": "powerpoint", "source_label": "PPT Slide 64 (Security and Risk Management)"}, {"id": "ppt_65", "number": 65, "question": "Which of these quantifiable metrics is the most important when it comes to calculating a return on security investment, and thereby justifying the expense of security controls?", "options": {"A": "ALE \u2013 Annual Loss Expectancy", "B": "SLE \u2013 Single Loss Expectancy", "C": "ARO \u2013 Annual Rate of Occurrence", "D": "TCO \u2013 Total Cost of Ownership"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 65 (Security and Risk Management)"}, {"id": "ppt_66", "number": 66, "question": "Before accepting credit cards on a new shopping website, what standard must a company follow?", "options": {"A": "PCI DSS", "B": "NIST CSF", "C": "ISO 22301", "D": "ISO 27001"}, "correct": "A", "explanation": "PCI DSS = Payment Card Industry Data Security Standard NIST CSF = National Institute of Standards and Technology, Cyber Security Framework ISO 22301 \u2013 security & resilience, business continuity management ISO 27001 \u2013 information security rules and requirements (compliance/regulations)", "source": "powerpoint", "source_label": "PPT Slide 66 (Security and Risk Management)"}, {"id": "ppt_67", "number": 67, "question": "Under what circumstances is it\u00a0MOST\u00a0appropriate to reduce control strength?", "options": {"A": "Risk cannot be determined", "B": "Assessed risk is below acceptable levels", "C": "The control cost is high", "D": "The control is not effective"}, "correct": "B", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 67 (Security and Risk Management)"}, {"id": "ppt_69", "number": 69, "question": "Kevin uploads a configuration file to the company web server using FTPS. The company webserver receives the file and stores it on a hard drive that features full disk encryption (FDE). Which of the data states below is not being protected in this scenario?", "options": {"A": "Data in motion", "B": "Data in use", "C": "Data at rest", "D": "Data in transit"}, "correct": "B", "explanation": "FTP stands for File Transfer Protocol. The FTPS version is encrypted using SSL/TLS certificates. This tells us that the data in motion/transit is secure. SSH would have been another secure option. Full disk encryption indicates that the data at rest is also safe. While there\u2019s no clear reason to believe the data in use (data in the processor/ram) is at risk, there is no indication that the data in use has been encrypted. Thereby, it is not being protected based off of the limited information above.", "source": "powerpoint", "source_label": "PPT Slide 69 (Asset Security)"}, {"id": "ppt_70", "number": 70, "question": "At which point in the data lifecycle should an owner be assigned to the data?", "options": {"A": "When it needs to be shared", "B": "Before it is destroyed", "C": "At the moment it is created", "D": "At the time it is stored"}, "correct": "C", "explanation": "The moment the data is created, it needs an owner! \u000bThen, the owner should immediately classify it in accordance with company policy.", "source": "powerpoint", "source_label": "PPT Slide 70 (Asset Security)"}, {"id": "ppt_71", "number": 71, "question": "What is the primary reason for classifying information resources according to sensitivity and criticality?", "options": {"A": "Determine if the resource should be included in the information security program.", "B": "Define the appropriate level of access controls.", "C": "Justify the costs of each information resource.", "D": "Determine the overall budget of the information security program."}, "correct": "B", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 71 (Asset Security)"}, {"id": "ppt_72", "number": 72, "question": "An admin reads about a new type of worm that can quickly spread between Windows servers without detection and believes their company\u2019s servers could be at risk. They take this information to the Chief Information Security Officer (CISO) who documents all of the admin\u2019s findings and concerns.  What describes the phase of risk management that the CISO is currently performing?", "options": {"A": "Risk Response", "B": "Risk Identification", "C": "Risk Calculation", "D": "Risk Assessment"}, "correct": "B", "explanation": "The CISO is still gathering information about the nature of the threat.  As such, they have NOT yet begun to Assess (D) the impact or likelihood of the issue nor have they made any decisions (A) about how to deal with the problem.  Thus, they are still operating in the Identification phase.", "source": "powerpoint", "source_label": "PPT Slide 72 (Asset Security)"}, {"id": "ppt_73", "number": 73, "question": "You\u2019ve been asked to determine the classification of several new company assets. Of the options below, what would be the most important to consider when determining the classification?", "options": {"A": "Business value", "B": "Total cost of ownership", "C": "Missing controls", "D": "Residual risk"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 73 (Asset Security)"}, {"id": "ppt_74", "number": 74, "question": "Which of the following statements MOST accurately describes what a data classification policy should include?", "options": {"A": "Who has access to the data, how the data will be secured, where the data originated.", "B": "Who has access to the data, how the data will be secured, whether the data should be encrypted.", "C": "How to dispose of the data, whether the data should be encrypted, whether the data are of foreign origin.", "D": "How to secure the data, who can use the data, and what the fines are for misuse of the data."}, "correct": "B", "explanation": "(B) Is the strongest answer. \u000bInformation on data origin and fines for misuse are less important.", "source": "powerpoint", "source_label": "PPT Slide 74 (Asset Security)"}, {"id": "ppt_76", "number": 76, "question": "Protection and security of information is the responsibility of everyone within the company. Which of the following describes an individual or function that protects the information on behalf of the owner?", "options": {"A": "The Data Custodian", "B": "The Information Systems Auditor", "C": "The Help Desk Administrator", "D": "The Business Continuity Planner"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 76 (Asset Security)"}, {"id": "ppt_90", "number": 90, "question": "Which is the most accurate?", "options": {"A": "The data owner is responsible for adhering to the rules for using the data, while the data custodian is responsible for determining the corporate governance regarding the data.", "B": "The data owner is responsible for determining how the data may be used, while the data custodian is responsible for implementing the protections to the data.", "C": "The data owner is responsible for controlling the data, while the data custodian is responsible for maintaining the chain of custody.", "D": "The data owner grants the technical permissions for data access, while the data custodian maintains the database access controls to the data."}, "correct": "B", "explanation": "The custodian described in (A) is actually  the job description of the data steward. Owner \u2013 Management role of data Stewart \u2013 governance/ compliance Custodian \u2013 access controls and security enforcement Privacy Officer \u2013 PII and disclosure", "source": "powerpoint", "source_label": "PPT Slide 90 (Asset Security)"}]}, "tuesday": {"domain": "Domain 3: Security Architecture and Engineering", "pdf_count": 21, "ppt_count": 44, "count": 65, "pdf_questions": [{"id": "pdf_1", "number": 1, "question": "Which one of the following is the MOST effective method for reducing security vulnerabilities associated with building entrances?", "options": {"A": "Minimize the number of entrances", "B": "Use solid metal doors and frames", "C": "Brightly illuminate the entrances", "D": "Install tamperproof hinges and glass"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q1"}, {"id": "pdf_6", "number": 6, "question": "Important documents that have been soaked in water during fire suppression efforts should be restored by", "options": {"A": "document recovery specialists.", "B": "Human Resources personnel.", "C": "document library personnel.", "D": "fire department specialists."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q6"}, {"id": "pdf_7", "number": 7, "question": "In a discretionary mode, who has delegation authority to grant access to information?", "options": {"A": "User", "B": "Security officer", "C": "Group leader", "D": "Owner"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q7"}, {"id": "pdf_20", "number": 20, "question": "Which of the following information system evaluation methods is process oriented rather than assurance oriented?", "options": {"A": "International Organization for Standardization (ISO) 15408", "B": "ISO 27002", "C": "Systems Security Engineering Capability Maturity Model (SSE-CMM)", "D": "Information Technology Security Evaluation Criteria (ITSEC)"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q20"}, {"id": "pdf_24", "number": 24, "question": "What is one issue NOT addressed by the Bell-LaPadula model?", "options": {"A": "Information flow control", "B": "Security levels", "C": "Need to Know", "D": "Access modes"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q24"}, {"id": "pdf_29", "number": 29, "question": "Which one of the following conditions is NOT necessary for a long dictionary attack to succeed?", "options": {"A": "The attacker must have access to the target system.", "B": "The attacker must have read access to the password file.", "C": "The attacker must have write access to the password file.", "D": "The attacker must know the password encryption mechanism and key variable."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q29"}, {"id": "pdf_34", "number": 34, "question": "What type of subsystem is an application program that operates outside the operating system and carries out functions for a group of users, maintains some common data for all users in the group, and protects the data from improper access by users in the group?", "options": {"A": "Prevented subsystem", "B": "Protected subsystem", "C": "File subsystem", "D": "Directory subsystem"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q34"}, {"id": "pdf_35", "number": 35, "question": "Which one of the following describes a reference monitor?", "options": {"A": "Access control concept that refers to an abstract machine that mediates all accesses to objects by subjects", "B": "Audit concept that refers to the monitoring and recording of all accesses to objects by subjects", "C": "Identification concept that refers to the comparison of material supplied by a user with its reference profile", "D": "Network control concept that distributes the authorization of subject accesses to objects"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q35"}, {"id": "pdf_37", "number": 37, "question": "Which one of the following does NOT describe an information integrity model?", "options": {"A": "Clark-Wilson", "B": "Bell-LaPadula", "C": "Biba", "D": "Sutherland"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q37"}, {"id": "pdf_44", "number": 44, "question": "Which one of the following is NOT a valid X.509 V.3 certificate field?", "options": {"A": "Subject\u2019s public key information", "B": "Subject\u2019s X.500 name", "C": "Issuer\u2019s unique identifier", "D": "Subject\u2019s digital signature"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q44"}, {"id": "pdf_45", "number": 45, "question": "Which one of the following represents an addition to a message digest (MD) algorithm to increase its cryptographic strength?", "options": {"A": "Internet Security Association and Key Management Protocol (ISAKMP)/Oakley", "B": "Keyed-Hash Message Authentication Code (HMAC)", "C": "Triple Data Encryption Standard (3DES)", "D": "Message Digest 5 (MD5)"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q45"}, {"id": "pdf_46", "number": 46, "question": "The three goals of integrity models are preventing unauthorized users from making modifications to data or programs, preventing authorized users from making improper or unauthorized modifications, and", "options": {"A": "maintaining a current and complete audit record of all transactions.", "B": "maintaining internal and external consistency of data and programs.", "C": "assuring that all modifications are tracked to the responsible party.", "D": "assuring data and programs are readily available to the intended user."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q46"}, {"id": "pdf_62", "number": 62, "question": "Which one of the following is used to provide authentication and confidentiality for e-mail messages?", "options": {"A": "Digital signature", "B": "Digital certificate", "C": "Authentication Header (AH)", "D": "Message digest (MD)"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q62"}, {"id": "pdf_68", "number": 68, "question": "When basic standards for software development are implemented within an organization and are in common use (defined, established, and documented), the organization has reached what level of the Capability Maturity Model Integration (CMMI) for software engineering?", "options": {"A": "Level 1", "B": "Level 2", "C": "Level 3", "D": "Level 4"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q68"}, {"id": "pdf_74", "number": 74, "question": "When considering the Heating, Ventilation, and Air Conditioning (HVAC) requirements for a data processing center, why should an information security architect be concerned with the effect of humidity on data availability?", "options": {"A": "Low humidity may cause condensation to occur, which could lead to data loss through a short circuit.", "B": "High humidity may lead to high electrostatic buildup, which could lead to data loss through static discharge.", "C": "High humidity may cause condensation to occur, which could lead to data loss through a short circuit.", "D": "Low humidity may lead to high electrostatic buildup, which could lead to data loss through condensation."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q74"}, {"id": "pdf_76", "number": 76, "question": "In e-mail security, both Secure Multipurpose Internet Mail Extensions (S/MIME) and Pretty Good Privacy (PGP) use Diffie-Hellman cipher. What is the purpose of using Diffie-Hellman?", "options": {"A": "Key agreement or negotiation", "B": "Digital signature", "C": "Encrypting e-mail messages", "D": "Creating a Message Authentication Code (MAC)"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q76"}, {"id": "pdf_95", "number": 95, "question": "How can a user of digital signatures ensure non-repudiation of delivery of the correct message?", "options": {"A": "Sender encrypts the message with the recipient\u2019s public key and signs it with their own private key.", "B": "Sender computes a digest of the message and sends it to a trusted third party who signs it and stores it for later reference.", "C": "Sender signs the message and sends it to the recipient and requests \u201creturn receipt\u201d of the e-mail.", "D": "Sender gets a digitally signed acknowledgement from the recipient containing a copy or digest of the message."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q95"}, {"id": "pdf_96", "number": 96, "question": "Cryptoperiod refers to the", "options": {"A": "length of time a particular cryptographic key may be used.", "B": "length of time that keys can be generated before the series begins to repeat.", "C": "number of encrypted messages before the ciphertext repeats.", "D": "number of decrypted messages before the plaintext repeats."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q96"}, {"id": "pdf_107", "number": 107, "question": "What type of key distribution system allows two parties to establish a secure session without exchanging any secret key?", "options": {"A": "Key exchange, but it is processor intensive.", "B": "Symmetric Key Cryptography because of its speed.", "C": "Session key, but only if it uses an asymmetric key.", "D": "Key negotiation using Diffie-Hellman"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q107"}, {"id": "pdf_109", "number": 109, "question": "Which of the following is LEAST important when selecting a security control?", "options": {"A": "Cost of the control compared to the level of security it provides.", "B": "Evaluated Assurance Level (EAL) under Common Criteria.", "C": "Value of the asset being protected.", "D": "The Protection Profile if it does not reflect the environment for which the organization will employ the control."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q109"}, {"id": "pdf_121", "number": 121, "question": "What is the BEST method of storing user passwords for a system?", "options": {"A": "Password-protected file", "B": "File restricted to one individual", "C": "One-way encrypted hash", "D": "Two-way encrypted cipher"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q121"}], "ppt_questions": [{"id": "ppt_92", "number": 92, "question": "You organization is looking for a software that has a EAL level greater than \u201cstructurally tested\u201d. Which of the following should the organization consider looking for?", "options": {"A": "Functionally tested", "B": "Methodically tested and checked", "C": "Functionally tested and checked", "D": "Reviewed and methodically tested"}, "correct": "B", "explanation": "The question references EAL 2 \u2013 Structurally tested. Is EAL 1 Is EAL 3 &  (D) are not real EAL levels.", "source": "powerpoint", "source_label": "PPT Slide 92 (Security Architecture and Engineering)"}, {"id": "ppt_93", "number": 93, "question": "Before storing data on a cloud that replicates to other countries, what is the are the two most important considerations? (pick two)", "options": {"A": "Some types of encryption are restricted in other countries", "B": "You will need the latest hashing algorithm if you want to ensure integrity", "C": "Finding a certificate authority could be difficult", "D": "The company security policy can no longer be enforced", "E": "Some data can\u2019t legally be stored on foreign soil", "F": "Backups of the data may not be encrypted"}, "correct": "A", "explanation": "(A) The Wassenaar Arrangement \u000b(E) Data Sovereignty laws", "source": "powerpoint", "source_label": "PPT Slide 93 (Security Architecture and Engineering)"}, {"id": "ppt_94", "number": 94, "question": "A data breach was discovered after a company\u2019s usernames and password were posted to a hacker website. Afterwards, an analyst discovered the company stored credentials in plain text. Which of the following would help mitigate this type of breach in the future?", "options": {"A": "Create data loss controls that prevent documents from leaving the network.", "B": "Implement salting and hashing.", "C": "Configure the web content filter to block access to the forum.", "D": "Increase password complexity requirements."}, "correct": "B", "explanation": "Passwords should not be stored in plain text! \u000bWe want to store passwords as hashed values, and salt them for extra security! The hashing will protect us from insiders/hackers seeing the password, while the salt will make password cracking very difficult. The salt will also make rainbow tables useless!\u000b(more salt related details in the slide notes)", "source": "powerpoint", "source_label": "PPT Slide 94 (Security Architecture and Engineering)"}, {"id": "ppt_95", "number": 95, "question": "Of the control type listed below, what would a mantrap (access control vestibule) be considered?", "options": {"A": "Preventative", "B": "Physical", "C": "Detective", "D": "Deterrent"}, "correct": "B", "explanation": "A mantrap, access control vestibule, sally port, or air lock: A physical security access control system comprising a small room with two sets of interlocking doors, such that the first set of doors must close before the second set opens.\u00a0This mechanism seeks to eliminate the threat of piggybacking or tailgating. There are three well-known TYPES of controls: Physical Technical/Logical Administrative/Management (A), (C), and (D) are all CATEGORIES of control.", "source": "powerpoint", "source_label": "PPT Slide 95 (Security Architecture and Engineering)"}, {"id": "ppt_97", "number": 97, "question": "The components of this security model include subjects, objects, clearances, and who can have access to what. These components are related to which of the following security models?", "options": {"A": "The Bell-LaPadula Model", "B": "The Clark-Wilson Model", "C": "The Lipner Model", "D": "The Biba Model"}, "correct": "A", "explanation": "Biba is an integrity model, concerned with who can modify what.  Clark Wilson does not discuss clearances, only integrity ideas.  We can rule both of those out. With Bell-LaPadula (BLP) and Lipner remaining, BLP is the closest match to the description above. Lipner does have some element of BLP in it, but its still mostly defined by its integrity mechanisms and there is nothing integrity related in the question. - Confidentiality model - Integrity Model - Integrity Model - Combination of Biba and Bell-Lapadula", "source": "powerpoint", "source_label": "PPT Slide 97 (Security Architecture and Engineering)"}, {"id": "ppt_98", "number": 98, "question": "Which of the following statements is true of Common Criteria\u2019s Evaluation Assurance Levels (EALs)?", "options": {"A": "Common Criteria has 7 EALs against which a security product may be able to get certified.", "B": "Common Criteria has 7 EALs against which a security product may be able to get accredited.", "C": "Common Criteria EALs can be used to cross-certify with the Information Technology Security Evaluation Criteria (ITSEC) ratings, but not the Trusted Computer System Evaluation Criteria (TCSEC) ratings.", "D": "Common Criteria EALs can be used to cross-certify with the Trusted Computer System Evaluation Criteria (TCSEC) ratings, but not the Information Technology Security Evaluation Criteria (ITSEC) ratings."}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 98 (Security Architecture and Engineering)"}, {"id": "ppt_99", "number": 99, "question": "A stream cipher works by using which of the following?", "options": {"A": "Bit-by-bit substitution with Exclusive Or (XOR) and a keystream", "B": "Confusion, diffusion, and permutation", "C": "Exclusive Or (XOR) and an initialization vector (IV)", "D": "An initialization vector (IV), the Temporal Key Integrity Protocol (TKIP), and Wi-Fi Protected Access (WPA)"}, "correct": "A", "explanation": "(A) Is the correct definition of a stream cipher. Stream ciphers should be used to protect data in transit.", "source": "powerpoint", "source_label": "PPT Slide 99 (Security Architecture and Engineering)"}, {"id": "ppt_100", "number": 100, "question": "Considering best practices, what is true about a system that utilizes Mandatory Access Control (MAC)?", "options": {"A": "Objects are given clearance tags so they can access the subjects", "B": "Subjects are given sensitivity tags so they can access objects", "C": "Subjects will need permissions to access all objects on the system", "D": "All objects should be classified in accordance with corporate policy"}, "correct": "D", "explanation": "Subjects access objects, not the other way around. Subjects (people or programs) are given clearance.\u000bObjects (data and files) are given sensitivity/classification tags.", "source": "powerpoint", "source_label": "PPT Slide 100 (Security Architecture and Engineering)"}, {"id": "ppt_101", "number": 101, "question": "Which cipher uses key words and numerous rows (traditionally 26), each one of which is offset by one?", "options": {"A": "The Rail/Fence cipher", "B": "The Running key cipher", "C": "The Vigen\u00e8re cipher", "D": "The Vernam cipher"}, "correct": "C", "explanation": "Answer (C) is correct. The RAIL fence only uses two rows.  In the running key cipher, frequently used with the Vigen\u00e8re cipher, text (typically from a book) is used to provide a very long keystream, ideally one as long as the message itself. Finally, the Vernam cipher, or One Time Pad (OTP) uses one time pads from a code book. VIGEN\u00c8RE CIPHER", "source": "powerpoint", "source_label": "PPT Slide 101 (Security Architecture and Engineering)"}, {"id": "ppt_103", "number": 103, "question": "Which of the following allows two cooperating processes to transfer information in such a way that it violates the system's security policy?", "options": {"A": "Partial disclosure", "B": "Full disclosure", "C": "Covert channel", "D": "Open source"}, "correct": "C", "explanation": "Answer (C) is correct, as it is the classic definition of what a covert channel achieves. \u201cA covert channel is a type of attack that creates a capability to transfer information objects between \u000bprocesses that are not supposed to be allowed to communicate by the computer security policy.\u201d", "source": "powerpoint", "source_label": "PPT Slide 103 (Security Architecture and Engineering)"}, {"id": "ppt_104", "number": 104, "question": "A Certificate Authority (CA) will occasionally have to revoke a certificate it has published.  How does the CA make this fact known to users who are trusting it to deliver reliable certificates?", "options": {"A": "The CA informs the RA and the RA sends this information to the CA\u2019s membership.", "B": "The CA destroys its Digital Certificate Signing Key and creates a new one.", "C": "The CA informs the major browser vendors and they change their browsers so that they do not accept any Certificates signed by that version of the CA\u2019s key.", "D": "The CA publishes a special list which includes details about revoked certificates."}, "correct": "D", "explanation": "The special list they are describing is known as the Certificate Revocation List (CRL).", "source": "powerpoint", "source_label": "PPT Slide 104 (Security Architecture and Engineering)"}, {"id": "ppt_105", "number": 105, "question": "What is the difference between a Registration Authority (RA) and a Certificate Authority (CA)?", "options": {"A": "An RA generates the user\u2019s public/private key pair and saves them in the PKI database.", "B": "An RA verifies the user credentials, and the CA issues the digital certificate.", "C": "The CA generates the user\u2019s public/private key pair and the RA generates the certificate.", "D": "The RA verifies the user credentials, and the CA generates the user\u2019s public/private key pair."}, "correct": "B", "explanation": "At no point does an RA (the company) or the CA (a computer that makes certificates) generate the end users public/private key pair. This allows us to rule out everything except (B), which is 100% correct.", "source": "powerpoint", "source_label": "PPT Slide 105 (Security Architecture and Engineering)"}, {"id": "ppt_106", "number": 106, "question": "Which statement below BEST describes the difference between the Electronic Code Book (ECB) and the Counter (CTR) method of encryption?", "options": {"A": "ECB is a block cipher, whereas CTR does not stop errors from propagating.", "B": "ECB is a stream cipher, whereas CTR is a block cipher.", "C": "Encryption errors can propagate when ECB is used, but do not propagate when Counter is used.", "D": "ECB can only secure short messages, whereas CTR can secure long ones as well."}, "correct": "D", "explanation": "Counter does not propagate errors, so Answer (A) is eliminated.  Answer (B) has the cipher modes reversed, so it is incorrect.  ECB does not propagate errors, so Answer (C) is eliminated.", "source": "powerpoint", "source_label": "PPT Slide 106 (Security Architecture and Engineering)"}, {"id": "ppt_108", "number": 108, "question": "Given the plain text word \u201crambo\u201d, which of the following statements is correct?", "options": {"A": "A Caesar cipher for \u201crambo\u201d would yield \u201cabrmo.\u201d", "B": "A collision occurs when two different cryptographic keys encrypt \u201crambo\u201d and produce the same results.", "C": "A transposition cipher, with reorder sequence 53421 would yield \u201combar.\u201d", "D": "The SHA1 hash value for \u201crambo\u201d would be exactly 16 bytes long."}, "correct": "C", "explanation": "Is incorrect. A Caesar cipher is a mono-alphabetic substitution cipher, where each letter in the plaintext is replaced by a letter a fixed number of positions down the alphabet. For example, D is rotated back by three to become A,  and E would be rotated back three to become B, and so forth. Is incorrect. The term collision is tied to hashing and does not utilize keys. What they are describing in (B) is known as \u201cKey Clustering\u201d. This is correct! Is incorrect. Sha1\u2019s hash length/value is 20 bytes, aka 160 bits. Not 16 bytes.", "source": "powerpoint", "source_label": "PPT Slide 108 (Security Architecture and Engineering)"}, {"id": "ppt_110", "number": 110, "question": "Which of the following would be best suited to providing security despite constantly changing environments?", "options": {"A": "Supervisory Control And Data Acquisitions", "B": "Embedded systems", "C": "Containers", "D": "Real Time Operating Systems"}, "correct": "C", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 110 (Security Architecture and Engineering)"}, {"id": "ppt_111", "number": 111, "question": "Which of the following is correct?", "options": {"A": "An initialization vector (IV) is used to make sure that encryptions of important texts do not change each time they are encrypted.", "B": "Confusion refers to making the relationship between the ciphertext and the key as complex as possible; diffusion refers to dissipating the statistical structure of the plaintext over the bulk of the ciphertext.", "C": "Only one substitution and one permutation can occur in an SP-network.", "D": "The avalanche effect in an encryption algorithm means that the algorithm is resistant to small changes in the plaintext."}, "correct": "B", "explanation": "Answer (B) is correct.  Claude Shannon first identified these two properties in his 1945 classified report, \u201cA Mathematical Theory of Cryptography.\u201d Answer (A) is incorrect; IVs are used to help ensure that text does completely change when encrypted. Answer (C) is wrong; SP networks use many rounds of both substitution and permutation. The AES cipher is an excellent example of this. Answer (D) is wrong, as with the avalanche \u000beffect, a small change in the text will produce a large change in the output.", "source": "powerpoint", "source_label": "PPT Slide 111 (Security Architecture and Engineering)"}, {"id": "ppt_112", "number": 112, "question": "Which statement BEST describes how the term \u201ckey space\u201d affects \u201ccryptanalysis\u201d?", "options": {"A": "The larger the key space, the easier the cryptanalysis.", "B": "The key space doubles each time you add a bit to the key length, which makes cryptanalysis more difficult.", "C": "Cryptanalysis is designing algorithms, and key space means testing the keys to ensure they work properly.", "D": "Cryptanalysis is  most often accomplished by systematically reducing the size of the keyspace."}, "correct": "B", "explanation": "Answer (B) is correct.  (A) is the opposite of the truth.  Similarly (C) is wrong, as Cryptography is about designing algorithms, and cryptanalysis is about breaking them. Finally, answer (D) is wrong, as it is not most often accomplished this way.", "source": "powerpoint", "source_label": "PPT Slide 112 (Security Architecture and Engineering)"}, {"id": "ppt_113", "number": 113, "question": "What are the key and block sizes for the AES algorithm?", "options": {"A": "Keys are 128 bits; blocks are 128 and 256 bits.", "B": "Keys are 128 bits, as are blocks.", "C": "Both keys and blocks can be 128, 192, and 256 bits.", "D": "Keys are 128, 192, and 256 bits and blocks are 128 bits."}, "correct": "D", "explanation": "Rjindael, the algorithm from which AES was derived, was able to use the range of block sizes described in Answer (C), but the NIST specification in 2001 for the new Advanced Encryption Standard specified a block size of 128 bits only.  AES does allow 128, 192, and 256 bit keys, which eliminates Answers (A) and (B).", "source": "powerpoint", "source_label": "PPT Slide 113 (Security Architecture and Engineering)"}, {"id": "ppt_114", "number": 114, "question": "Upper management is looking to find a new cloud provider to host the company\u2019s software as a service product.  Considering the problems your organization had with the last provider, they instructed you to find a provider who has displayed good internal governance. What indicator should be used when looking for this new provider?", "options": {"A": "Maturity level", "B": "Risk identification", "C": "SOC reports", "D": "Loss history"}, "correct": "A", "explanation": "Maturity levels (CMM) account for a better indication of governance, surpassing losses, audits, or the ability simply ID risk.", "source": "powerpoint", "source_label": "PPT Slide 114 (Security Architecture and Engineering)"}, {"id": "ppt_115", "number": 115, "question": "Which of the following contains BOTH a hashing and an", "options": {"A": "asymmetric key algorithm?", "B": "DES and SHA2", "C": "SHA2 and MD5", "D": "MD5 and ECC", "E": "AES and ECC"}, "correct": "C", "explanation": "Symmetric and Hashing\u000b- Hashing and Hashing\u000b- Hashing and Asymmetric\u000b- Symmetric and Asymmetric", "source": "powerpoint", "source_label": "PPT Slide 115 (Security Architecture and Engineering)"}, {"id": "ppt_116", "number": 116, "question": "Which of the following is an attack against hashes?", "options": {"A": "Plain text Attack", "B": "Dictionary Attack", "C": "Stream cipher Attack", "D": "Cipher text attack"}, "correct": "B", "explanation": "Passwords are stored as hashes, and the only password attack listed is the Dictionary Attack. Other hashing attacks against passwords are the Birthday attack, the use of hash tables, and the use of rainbow tables. Answers (A) (C), and (D) are all attacks intended to find the key.", "source": "powerpoint", "source_label": "PPT Slide 116 (Security Architecture and Engineering)"}, {"id": "ppt_117", "number": 117, "question": "Which of the following is no longer a common and effective attack on wireless networks?", "options": {"A": "A Plaintext Attack", "B": "A Rainbow Table Attack", "C": "A Stream Cipher Attack", "D": "A Ciphertext Attack"}, "correct": "C", "explanation": "\u201dWas, but is no longer\u201d implies the use of WEP or WPA rather than WPA2, which was introduced in 2004.  WEP and WPA used RC4, a stream cipher. Answers (A), (B) and (D) are all otherwise too broad.", "source": "powerpoint", "source_label": "PPT Slide 117 (Security Architecture and Engineering)"}, {"id": "ppt_118", "number": 118, "question": "The Simple Integrity Property provides what permission?", "options": {"A": "Read at the same level or at a higher level.", "B": "Write at the same level or at a lower level.", "C": "Read at the same level or at a lower level.", "D": "Write at the same level or at a higher level."}, "correct": "A", "explanation": "The SIMPLE integrity property is a READ capability for the Biba model.  This eliminates Answers (B) and (D) which concern the STAR property. In Biba, reading up is okay, but reading down is not, as you would thereby be accepting less accurate information. This eliminates Answer (C). With integrity models you can \u000bREAD UP, but not DOWN.\u000bWRITE DOWN, but not UP.\u000b(confidentiality models are the opposite)", "source": "powerpoint", "source_label": "PPT Slide 118 (Security Architecture and Engineering)"}, {"id": "ppt_119", "number": 119, "question": "Which security model is designed to help ensure that high level activities (inputs) do not determine what low-level users can see (outputs)?", "options": {"A": "The Lattice model", "B": "The Information Flow model", "C": "The Clark-Wilson model", "D": "The Non-interference model"}, "correct": "D", "explanation": "(A) Lattice models allow for strict distinction between different levels and defines clear rules for interactions between them, such as Bell-LaPadula. (B) Information flow models focus on the ways in which information can flow or be exchanged within a system. (C) The Clark-Wilson model is an integrity model focused on ensuring well-formed transactions. (D) Is correct. A non-interference model aims at a strict separation of differing security levels to ensure that higher-level activities don't determine what lower-level users can see or gain access to.", "source": "powerpoint", "source_label": "PPT Slide 119 (Security Architecture and Engineering)"}, {"id": "ppt_120", "number": 120, "question": "Originally there were three Cloud Service models (CSMs) and four Cloud Deployment models (CDMs).  Which statement below has two original CSMs and two CDMs?", "options": {"A": "SaaS, IDaaS, Public, and Private", "B": "SaaS, PaaS, Community, and Hybrid", "C": "IaaS, PaaS, On-site and Off-site", "D": "Naas, CaaS, Hybrid,  and Commercial"}, "correct": "B", "explanation": "IDaaS, NaaS and CaaS were not original CSMs and \u201con-site and off-site\u201d are not deployment models.", "source": "powerpoint", "source_label": "PPT Slide 120 (Security Architecture and Engineering)"}, {"id": "ppt_121", "number": 121, "question": "Which fire prevention system does not hold water above the area it protects, contains heat-sensing elements, and only begins to fill with water when the valve is triggered by excessive heat?", "options": {"A": "A Dry-Pipe System", "B": "A Deluge System", "C": "A Wet-Pipe System", "D": "A Pre-Action System"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 121 (Security Architecture and Engineering)"}, {"id": "ppt_123", "number": 123, "question": "Which of the following demonstrates the authenticity and origin of a communication, thereby providing for non-repudiation?", "options": {"A": "Using Elliptic Curve Cryptography techniques", "B": "Assigning Denial of Service Certificates to senders", "C": "Digital Signatures", "D": "E-Commerce Digital Certificates"}, "correct": "C", "explanation": "ECC may be used to encrypt a hash to get a digital signature, but RSA is more often used. Furthermore, \u201ccryptography techniques\u201d is very ambiguous. Denial of Service certificate are not a real thing. (D) E-Commerce Digital certificates are used by SSL and TLS enabled servers to initiate SSL/TLS VPNs, not to provide non-repudiation. (C) Is correct. A digital signature is a mathematical scheme for verifying the authenticity of digital messages or documents. This may also be referred to as providing non-repudiation or proof-of-origin.", "source": "powerpoint", "source_label": "PPT Slide 123 (Security Architecture and Engineering)"}, {"id": "ppt_124", "number": 124, "question": "Which security model focuses on preventing conflicts of interest when a given subject would otherwise have access to objects with sensitive information associated with two competing parties?", "options": {"A": "Information Flow", "B": "Non-Interference", "C": "Clark-Wilson", "D": "Brewer and Nash"}, "correct": "D", "explanation": "Answer (D) is correct.  It may also be called the Chinese Wall model.\u000b\u000bCW is about making sure that the 3 rules of data integrity for achieving well-formed transactions are maintained.", "source": "powerpoint", "source_label": "PPT Slide 124 (Security Architecture and Engineering)"}, {"id": "ppt_125", "number": 125, "question": "Which of the following is MOST accurate with respect to individual computing devices (ICDs) on a cluster versus on a grid system?", "options": {"A": "If a Grid ICD fails, the Grid must be restarted.", "B": "If a Cluster ICD fails, the cluster must be restarted.", "C": "Grid systems are homogeneous, while Cluster systems are heterogeneous.", "D": "Cluster ICDs all share the same operating system (OS) and application software, but Grid ICDs can have many different OSs, while still working on solving the same problem."}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 125 (Security Architecture and Engineering)"}, {"id": "ppt_126", "number": 126, "question": "If a fire broke out due to an electrical short, what type of fire would this be classified as?", "options": {"A": "A class", "B": "B class", "C": "C class", "D": "D class"}, "correct": "C", "explanation": "Memory tricks: =  \u201cAsh\u201d. =  \u201cBoil\u201d. = \u201cCircuit\u201d or \u201cCurrent\u201d. =  \u201cDent\u201d. (K)   =   \u201cKitchen\u201d", "source": "powerpoint", "source_label": "PPT Slide 126 (Security Architecture and Engineering)"}, {"id": "ppt_127", "number": 127, "question": "Which of the following best describes a Common Criteria \u201cProtection Profile\u201d?", "options": {"A": "A set of security requirements to be used to evaluate a Security Target.", "B": "A set of security requirements for a category of products that meet specific consumer security needs.", "C": "An implementation-independent set of functional security requirements for a category of products that meet specific consumer security needs.", "D": "An implementation-specific set of assurance requirements for products that meet specific consumer security needs."}, "correct": "B", "explanation": "Answer (A) is wrong,  as the security product to be evaluated is called the Target of Evaluation (ToE). All CC evaluations provide for both Assurance and Functionality, so Answers (C) and (D) leave out something, and are thus eliminated.", "source": "powerpoint", "source_label": "PPT Slide 127 (Security Architecture and Engineering)"}, {"id": "ppt_128", "number": 128, "question": "Albert received a message sent to him over the Internet by John.  Albert changed the content of the message and then then claimed that the altered message was the one he\u2019d received from John. Which technique would prevent Albert from being able to make this claim?", "options": {"A": "John used Public Key Cryptography to deliver the message.", "B": "John digitally signed the message.", "C": "John used the 512 bit version of SHA2 to hash the message and then sent this hash along with the message to Albert.", "D": "John used hybrid encryption with the strong AES256 algorithm and the  ECC public key algorithm to send the message to Albert."}, "correct": "B", "explanation": "Digital signatures provide integirty and non-repudiation, aka proof-of-origin!", "source": "powerpoint", "source_label": "PPT Slide 128 (Security Architecture and Engineering)"}, {"id": "ppt_129", "number": 129, "question": "Which of the following describes the correct way to create and use a digital signature?", "options": {"A": "Add the sender\u2019s name to the document, then encrypt it with the recipient\u2019s public key, send the encrypted document to the recipient.", "B": "Encrypt the document with the sender\u2019s Private key, and then send the encrypted document to the recipient.", "C": "Hash the document, then encrypt both the hash and the document with the sender\u2019s private key, then send the encrypted information  to the recipient.", "D": "Hash the document, then encrypt only the hash with the sender\u2019s private key, send both the plain text document and the encrypted hash to the recipient."}, "correct": "D", "explanation": "provides encryption, but does not offer non-repudiation. Non-repudiation (proof-of-origin) is the entire point of the signatures and what we are looking for. Simply adding the sender\u2019s name does not provide proof-of-origin. is incorrect, because you don\u2019t encrypt the document with the sender\u2019s private key. If you did, they would never be able to read it. (C) is incorrect because you don\u2019t encrypt the document along with the hash. As (D) demonstrates, only the hash is encrypted with the senders private key.", "source": "powerpoint", "source_label": "PPT Slide 129 (Security Architecture and Engineering)"}, {"id": "ppt_131", "number": 131, "question": "A cloud storage server has been brought online that is intended to serve hospitals exclusively. Several hospitals, all owned by different entities, have begun using this highly secured cloud server. What type of cloud deployment model matches this type of server?", "options": {"A": "Public", "B": "Private", "C": "Community", "D": "Hybrid", "E": "A community cloud is shared by a group of similar organizations that all have similar needs. In this example, it is a server built only to serve hospitals."}, "correct": "C", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 131 (Security Architecture and Engineering)"}, {"id": "ppt_132", "number": 132, "question": "A contractor working for the company updated several applications and plugins on the cloud platform causing a massive outage. Of the options below, what would best prevent this from happening again?", "options": {"A": "Secure Web Gateway (SWG)", "B": "Cloud Access Security Broker (CASB)", "C": "Mirrored backup site", "D": "Containerization"}, "correct": "B", "explanation": "Secure Web Gateway. Its an application firewall built to serve cloud applications. While these are capable of inspecting traffic and filtering out scripting attacks, it is unlikely that the gateway would block an application from receiving an update. Cloud Access Security Broker. This is an on-premise or cloud based security software that limits access and enforces access control for the cloud, on a per user basis. Many CASB\u2019s will include SWG functionality and a CASB could block an application or plugin from receiving an update. This technology is very flexible and is one of the best tools for protecting cloud servers. It can also be used to promote compliance, perform monitoring, and prevent malware.", "source": "powerpoint", "source_label": "PPT Slide 132 (Security Architecture and Engineering)"}, {"id": "ppt_133", "number": 133, "question": "Of the cloud service models listed below, which would typically include storage, networking, and servers, but not an operating system?", "options": {"A": "DaaS", "B": "SaaS", "C": "PaaS", "D": "IaaS"}, "correct": "D", "explanation": "DaaS = Desktop as a Service.\u000bIt\u2019s a VDI (virtual desktop infrastructure) but delivered through the cloud. The original/primary three cloud SERVICE models:", "source": "powerpoint", "source_label": "PPT Slide 133 (Security Architecture and Engineering)"}, {"id": "ppt_134", "number": 134, "question": "Although this situation is unlikely, under what circumstances would it be completely acceptable to use AES in ECB mode with a 128 bit key?", "options": {"A": "When AES is using a 128 bit block size.", "B": "When AES is set to perform 10 rounds of encryption.", "C": "When the data to be encrypted is less than 128 bits.", "D": "When the key was negotiated with DH group 24"}, "correct": "C", "explanation": "The problem with ECB (electronic codebook) mode is that if the message is longer than the key size, it will reuse the same key again without modifying it. This leads to weak confusion, where the relationship between the key and the ciphertext is easy to identify. This could also be described as: because the key repeats, a pattern develops, and a cipher-text only attack will require less work to perform (lower work factor). (A) AES will always use a 128bit block size\u2026 but this doesn\u2019t suddenly make ECB safe to use.\u000b(B) AES will perform 10 rounds of encryption when using a 128 bit key, but still, not considered safe.\u000b(D) How the key is negotiated does not have anything to do with ECB mode.", "source": "powerpoint", "source_label": "PPT Slide 134 (Security Architecture and Engineering)"}, {"id": "ppt_135", "number": 135, "question": "A company has developed their own SaaS product. They need a flexible and transparent management tool that grants them the ability to control and monitor who uses their product. What could meet the needs of this company for their new SaaS product?", "options": {"A": "System Info and Event Manager (SIEM)", "B": "Data Loss Preventer (DLP)", "C": "Cloud Access Security Broker (CASB)", "D": "Access Control Matrix"}, "correct": "C", "explanation": "A Cloud Access Security Broker (CASB) is a service/software that sits between the end-user and the cloud provider. It can offer the following: Mediate all access to and from the cloud Provide highly granular control over users and data Enforce compliance with well-known cloud regulations Give visibility into user/app/data usage (allows for monitoring and measured services) Prevent most injection/malware threats", "source": "powerpoint", "source_label": "PPT Slide 135 (Security Architecture and Engineering)"}, {"id": "ppt_136", "number": 136, "question": "What best describes the function of microservices in the cloud?", "options": {"A": "Independent applications that are designed as small components and loosely coupled.", "B": "Applications that are inexpensive when deployed on a large scale.", "C": "Applications that are small enough to live stream to customers.", "D": "Applications intended for use on mobile platforms."}, "correct": "A", "explanation": "Microservices are small, simple, agile, standalone apps that communicate through well-known APIs. They are sometimes developed independently and are loosely coupled so they can be deployed as one application (with many services) if needed. Microservices architectures make applications easier to scale and faster to develop, enabling innovation and accelerating time-to-market for new features.", "source": "powerpoint", "source_label": "PPT Slide 136 (Security Architecture and Engineering)"}, {"id": "ppt_137", "number": 137, "question": "Of the options below, what is the best description of a container, as it applies to software virtualization?", "options": {"A": "A secure test environment.", "B": "An encrypted file that is safe to transmit over unsecured media.", "C": "A virtual machine with only one OS and one application.", "D": "Several isolated applications sharing a single OS."}, "correct": "D", "explanation": "Containers are virtualization at the operating-system level such that a single operating system is partitioned and used by multiple applications. The applications are isolated from each other. In many cases, containers are more efficient than full virtual machines (virtualization at the hardware layer). Containers are used in the cloud to quickly deploy and scale web applications.", "source": "powerpoint", "source_label": "PPT Slide 137 (Security Architecture and Engineering)"}, {"id": "ppt_138", "number": 138, "question": "Of the options below, what is the best description of containerized software?", "options": {"A": "Code and all of its associated dependencies have been packaged together so that it can run on almost any infrastructure.", "B": "A library of virtual machines that can communicate through well-known APIs.", "C": "A lightweight software that is designed to perform a single dedicated security function.", "D": "An abstract concept that involves mediating all access from subjects to the software and its associated objects."}, "correct": "A", "explanation": "Software containerization bundles the application code together with the related configuration files, libraries, and dependencies required for it to run. This single package of software or \u201ccontainer\u201d is abstracted away from the host operating system, and hence, it stands alone and becomes portable\u2014able to run across any platform or cloud, free of issues.", "source": "powerpoint", "source_label": "PPT Slide 138 (Security Architecture and Engineering)"}, {"id": "ppt_139", "number": 139, "question": "Which of the following cloud principles will help manage the risk of a network breach?", "options": {"A": "Self-service", "B": "Availability", "C": "Shared responsibility", "D": "Elasticity and redundancy"}, "correct": "C", "explanation": "Since both the customer and the CSP have their own specific responsibilities, managing the risk is easier for both of them. The CSP is responsible for security \u2018of\u2019 the cloud, while the customer is responsible for security \u2018in\u2019 the cloud. Cloud service providers are responsible for security of: Data center Data isolated between businesses Network security within the data center Cloud consumers are responsible for security of: Direct user-access to data (permissions) Backup and restoration of data", "source": "powerpoint", "source_label": "PPT Slide 139 (Security Architecture and Engineering)"}, {"id": "ppt_140", "number": 140, "question": "After a recent security summit, management has decided that too much attention has been paid to perimeter defenses and defending network segments. Instead, more focus should be put on securing internal assets, services, and workflows. They explain that this shift will protect the company better in the future considering that more employees will be working remotely. What security concept is closely aligned with managements new security posture?", "options": {"A": "Shared responsibility model", "B": "Zero trust architecture", "C": "Complete mediation system", "D": "Privacy by design"}, "correct": "B", "explanation": "Zero trust - An evolving set of security paradigms that shifts focus from perimeter defenses to the internal users, assets, and resources. It assumes no implicit trust is granted to assets or user accounts based off of their network location. This shift in focus is a necessary change considering the rise of mobile phones and remote employees.", "source": "powerpoint", "source_label": "PPT Slide 140 (Security Architecture and Engineering)"}, {"id": "ppt_141", "number": 141, "question": "Management has determined that the business has become overly dependent on the cloud service provider and has been attempting to list out all of the benefits that a shift to edge computing would offer. Of the list below, which issue is the least resolved by the implementation of edge computing?", "options": {"A": "High latency with the cloud provider", "B": "Data sovereignty compliance costs", "C": "Regular network connectivity faults", "D": "Limited bandwidth is remaining due to cloud traffic"}, "correct": "C", "explanation": "Edge computing is about performing data computation and storage closer to the device that needs it, instead of sending it all the way to the data center. The origins of this concept can be found in the Content Delivery Networks that Netflix and similar services rely on. Since the data doesn\u2019t have to go to the cloud for processing, latency will be greatly reduced. Since the data can be kept local, it is considerably easier to remain in compliance with sovereignty regulations. While edge computing could possibly reduce the impact of network connectivity faults, it doesn\u2019t resolve the faults themselves. If you have limited bandwidth, not having to send things to the cloud will drastically reduce the bandwidth you consume.", "source": "powerpoint", "source_label": "PPT Slide 141 (Security Architecture and Engineering)"}]}, "wednesday": {"domain": "Domains 3 & 4: Security Architecture and Engineering / Communication and Network Security", "pdf_count": 16, "ppt_count": 75, "count": 91, "pdf_questions": [{"id": "pdf_4", "number": 4, "question": "Which of the following is the MAIN advantage of having an application gateway?", "options": {"A": "To perform change control procedures for applications", "B": "To provide a means for applications to move into production", "C": "To log and control incoming and outgoing application traffic", "D": "To audit and approve changes to applications"}, "correct": "
