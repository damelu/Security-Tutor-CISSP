<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISSP Study Kit - Adaptive Quiz & Exam Prep</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-alt: #262c3a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-primary: #e8eef7;
            --text-secondary: #8b92b7;
            --border: #30363d;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
            --info: #58a6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Navigation */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            sticky: top 0;
            z-index: 100;
            padding: 1rem 0;
        }

        .nav-content {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 0.5rem 1.2rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background: var(--surface-alt);
        }

        .nav-tab.active {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .nav-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            background: var(--surface-alt);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            color: var(--text-primary);
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Main Content */
        .main {
            padding: 2rem 0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .card-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--surface-alt);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            border-color: var(--accent);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #2d9e47;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-danger:hover {
            background: #da3633;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.7rem;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 200px;
            font-family: 'Courier New', monospace;
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 1.5rem;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        /* Dashboard Stats */
        .stat-card {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: var(--surface-alt);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s;
        }

        /* Domain Performance */
        .domain-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--surface-alt);
            border-radius: 6px;
            margin-bottom: 0.8rem;
        }

        .domain-name {
            flex: 0 0 200px;
            font-weight: 500;
        }

        .domain-bar {
            flex: 1;
        }

        .domain-stats {
            flex: 0 0 150px;
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .cat-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 1rem;
        }

        .cat-badge.associate {
            background: rgba(58, 134, 255, 0.2);
            color: #58a6ff;
        }

        .cat-badge.professional {
            background: rgba(88, 166, 255, 0.2);
            color: #79c0ff;
        }

        .cat-badge.expert {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent);
        }

        /* Quiz */
        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .question-number {
            font-weight: 600;
            color: var(--accent);
        }

        .question-meta {
            display: flex;
            gap: 0.8rem;
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            background: var(--surface-alt);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .badge.domain {
            border-color: var(--accent);
            color: var(--accent);
        }

        .badge.difficulty {
            border-color: var(--warning);
            color: var(--warning);
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option {
            padding: 1rem;
            background: var(--surface-alt);
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .option input[type="radio"] {
            margin-right: 0.8rem;
            cursor: pointer;
        }

        .option.selected {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .option.correct {
            border-color: var(--success);
            background: rgba(63, 185, 80, 0.1);
        }

        .option.incorrect {
            border-color: var(--error);
            background: rgba(248, 81, 73, 0.1);
        }

        /* Explanation */
        .explanation {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--surface-alt);
            border-left: 4px solid var(--accent);
            border-radius: 4px;
        }

        .explanation-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .explanation-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Quiz Progress */
        .quiz-progress {
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--surface-alt);
            border-radius: 6px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .progress-stats {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 2rem 0;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        /* Results */
        .results-container {
            text-align: center;
            padding: 2rem;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .results-message {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .results-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        /* History */
        .history-row {
            display: grid;
            grid-template-columns: 100px 120px 150px auto 100px;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: var(--surface-alt);
            border-radius: 6px;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
        }

        .history-date {
            color: var(--text-secondary);
        }

        .history-score {
            color: var(--accent);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-tabs {
                width: 100%;
                justify-content: center;
            }

            .domain-row {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }

            .domain-name {
                flex: 1;
            }

            .domain-stats {
                flex: 1;
                text-align: left;
            }

            .history-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }

            .results-details {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Utility */
        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-secondary);
        }

        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }

        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }

        .flex {
            display: flex;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gap-1 { gap: 0.5rem; }
        .gap-2 { gap: 1rem; }

        .hidden {
            display: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        /* Copy Button */
        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.4rem 0.8rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .copy-btn:hover {
            background: var(--accent-hover);
        }

        .copy-btn.copied {
            background: var(--success);
        }

        .code-block {
            position: relative;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            overflow-x: auto;
        }

        .code-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-content">
            <a href="#" class="nav-brand">CISSP Study Kit</a>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="dashboard">Dashboard</button>
                <button class="nav-tab" data-tab="tonights">Tonight's Study</button>
                <button class="nav-tab" data-tab="quiz">Quiz</button>
                <button class="nav-tab" data-tab="rewrong">Re-Quiz Wrong</button>
                <button class="nav-tab" data-tab="bank">Bank Sync</button>
                <button class="nav-tab" data-tab="history">History</button>
            </div>
            <div class="nav-actions">
                <button class="btn-icon" id="exportBtn" title="Save your progress (quiz history, wrong answers, mastery) as a JSON file">Save Progress</button>
                <button class="btn-icon" id="importBtn" title="Load a previously saved progress file to restore your data">Load Progress</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Dashboard Tab -->
            <div class="tab-content active" id="dashboard-tab">
                <div class="card">
                    <div class="card-header">Dashboard</div>
                    <div class="grid grid-3">
                        <div class="stat-card">
                            <div class="stat-value" id="totalAnswered">0</div>
                            <div class="stat-label">Questions Answered</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalCorrect">0</div>
                            <div class="stat-label">Correct</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="overallAccuracy">0%</div>
                            <div class="stat-label">Overall Accuracy</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Domain Performance</div>
                    <div id="domainPerformance"></div>
                </div>

                <div class="card">
                    <div class="card-header">Last Session Summary</div>
                    <div id="lastSessionSummary"></div>
                </div>

                <div class="card">
                    <div class="card-header">Quick Actions</div>
                    <div class="flex gap-2" style="flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="app.startContinueQuiz()">
                            Continue Learning
                        </button>
                        <button class="btn btn-secondary" onclick="app.showTab('quiz')">
                            Start New Quiz
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tonight's Study Tab -->
            <div class="tab-content" id="tonights-tab">
                <div class="card">
                    <div class="card-header">Tonight's Bootcamp Study</div>
                    <div class="form-group">
                        <label class="form-label">Select Study Day:</label>
                        <select id="bootcampDay" class="form-select">
                            <option value="">Choose a day...</option>
                            <option value="monday">Monday: Domains 1 & 2</option>
                            <option value="tuesday">Tuesday: Domain 3</option>
                            <option value="wednesday">Wednesday: Domains 3 & 4</option>
                            <option value="thursday">Thursday: Domains 4, 5 & 6</option>
                            <option value="friday">Friday: Domains 7 & 8</option>
                        </select>
                    </div>
                    <div id="bootcampInfo"></div>
                    <div id="bootcampSourceFilter" style="display:none; margin: 1rem 0;">
                        <p style="font-weight: 600; margin-bottom: 0.5rem;">Question Sources:</p>
                        <label style="display: flex; align-items: center; margin-bottom: 0.4rem; cursor: pointer;">
                            <input type="checkbox" name="hwSource" value="pdf" checked onchange="app.updateHwCount()" style="margin-right: 0.5rem;">
                            <span>Practice Exam (PDF/Excel) — <span id="hwPdfCount">0</span> questions</span>
                        </label>
                        <label style="display: flex; align-items: center; margin-bottom: 0.4rem; cursor: pointer;">
                            <input type="checkbox" name="hwSource" value="ppt" checked onchange="app.updateHwCount()" style="margin-right: 0.5rem;">
                            <span>PowerPoint Slides — <span id="hwPptCount">0</span> questions</span>
                        </label>
                    </div>
                    <button class="btn btn-primary" onclick="app.startBootcampQuiz()" id="bootcampStartBtn" disabled>
                        Start Homework (<span id="hwTotalCount">0</span> questions)
                    </button>
                </div>
            </div>

            <!-- Quiz Tab -->
            <div class="tab-content" id="quiz-tab">
                <div class="card">
                    <div class="card-header">Configure Quiz</div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Select Domains:</label>
                            <div id="domainCheckboxes"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Number of Questions:</label>
                            <input type="number" id="questionCount" class="form-input" value="20" min="1" max="240">
                        </div>
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Difficulty Levels:</label>
                            <div id="difficultyCheckboxes"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Quiz Mode:</label>
                            <select id="quizMode" class="form-select">
                                <option value="random">Random</option>
                                <option value="weak-first">Weak Domains First</option>
                                <option value="cat">CAT Adaptive</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="app.startCustomQuiz()">Start Quiz</button>
                </div>
            </div>

            <!-- Re-Quiz Wrong Tab -->
            <div class="tab-content" id="rewrong-tab">
                <div class="card">
                    <div class="card-header">Re-Quiz Wrong Answers</div>
                    <div id="rewrongStatus"></div>
                    <div id="rewrongDomainFilter" style="display:none; margin: 1rem 0;">
                        <p style="font-weight: 600; margin-bottom: 0.5rem;">Filter by Domain:</p>
                        <div id="rewrongDomainCheckboxes"></div>
                        <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
                            <button class="btn btn-secondary" onclick="app.rewrongSelectAll(true)" style="font-size: 0.85rem; padding: 0.3rem 0.75rem;">Select All</button>
                            <button class="btn btn-secondary" onclick="app.rewrongSelectAll(false)" style="font-size: 0.85rem; padding: 0.3rem 0.75rem;">Clear All</button>
                            <button class="btn btn-secondary" onclick="app.rewrongAutoSelect()" style="font-size: 0.85rem; padding: 0.3rem 0.75rem;">Auto-Select Weakest</button>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="app.startReQuiz()" id="rewrongStartBtn" disabled>
                        Start Re-Quiz (<span id="rewrongCount">0</span> questions)
                    </button>
                </div>
            </div>

            <!-- Bank Sync Tab -->
            <div class="tab-content" id="bank-tab">
                <div class="card">
                    <div class="card-header">Import from WRONG-ANSWER-BANK.md</div>
                    <div class="form-group">
                        <label class="form-label">Paste WRONG-ANSWER-BANK.md Content:</label>
                        <textarea id="bankInput" class="form-textarea" placeholder="Paste your WRONG-ANSWER-BANK.md content here..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="app.importBank()">Import Questions</button>
                    <div id="bankStatus" class="mt-2"></div>
                </div>
            </div>

            <!-- History Tab -->
            <div class="tab-content" id="history-tab">
                <div class="card">
                    <div class="card-header">Quiz History</div>
                    <div id="historyContent"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Quiz Modal -->
    <div class="modal" id="quizModal">
