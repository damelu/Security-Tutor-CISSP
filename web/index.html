C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q4"}, {"id": "pdf_9", "number": 9, "question": "What is the purpose of the Encapsulating Security Payload (ESP) in the Internet Protocol (IP) Security Architecture for Internet Protocol Security (IPSec)?", "options": {"A": "To provide non-repudiation and confidentiality for IP transmissions", "B": "To provide integrity and confidentiality for IP transmissions", "C": "To provide integrity and authentication for IP transmissions", "D": "To provide key management and key distribution for IP transmissions"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q9"}, {"id": "pdf_13", "number": 13, "question": "To support legacy applications that rely on risky protocols (e.g., plain text passwords), which one of the following can be implemented to mitigate the risks on a corporate network?", "options": {"A": "Implement strong, centrally-generated passwords to control use of the vulnerable applications", "B": "Implement a Virtual Private Network (VPN) with controls on workstations joining the VPN", "C": "Use physical access controls to ensure that only authorized, trained users have access to workstations", "D": "Ensure audit logging is enabled on all hosts and applications with frequent log reviews"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q13"}, {"id": "pdf_18", "number": 18, "question": "What type of networking model can be deployed for small, inexpensive, and less secure networking?", "options": {"A": "Wide Area Network (WAN)", "B": "Metropolitan Area Network (MAN)", "C": "Campus Area Network (CAN)", "D": "Peer-to-Peer Network (P2P)"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q18"}, {"id": "pdf_21", "number": 21, "question": "Initial and ongoing authentication can be used as mitigation against which of the following network attacks?", "options": {"A": "Spoofing", "B": "Tampering", "C": "Side channel", "D": "Traffic analysis"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q21"}, {"id": "pdf_27", "number": 27, "question": "Which one of the following is an example of electronic piggybacking?", "options": {"A": "Attaching to a communications line and injecting data", "B": "Abruptly terminating a dial-up or direct-connect session", "C": "Following an authorized user into the computer room", "D": "Recording and playing back computer transactions"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q27"}, {"id": "pdf_30", "number": 30, "question": "Wired Equivalent Privacy (WEP) uses which of the following ciphers?", "options": {"A": "Rivest-Shamir-Adleman (RSA)", "B": "Triple Data Encryption Standard (3DES)", "C": "Advanced Encryption Standard (AES)", "D": "Rivest Cipher 4 (RC4)"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q30"}, {"id": "pdf_38", "number": 38, "question": "The purpose of the Internet Protocol Security (IPSec) Authentication Header (AH) is to provide", "options": {"A": "Proof of delivery.", "B": "Encryption of a payload.", "C": "Validation of the sender.", "D": "Validation of the recipient."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q38"}, {"id": "pdf_40", "number": 40, "question": "What technology interleaves data frames from multiple conversations into a single data stream for transmission?", "options": {"A": "Time-Division Multiplexing (TDM)", "B": "Real-time Transport Protocol (RTP)", "C": "Synchronous Data Link Control (SDLC)", "D": "Wired Equivalent Privacy 2 (WEP2)"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q40"}, {"id": "pdf_47", "number": 47, "question": "Why does fiber optic communication technology have a significant security advantage over other transmission technology?", "options": {"A": "Higher data rates can be transmitted.", "B": "Interception of data traffic is more difficult.", "C": "Traffic analysis is prevented by multiplexing.", "D": "Single and double-bit errors are correctable."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q47"}, {"id": "pdf_54", "number": 54, "question": "Which of the following is NOT a protection feature associated with Secure Sockets Layer (SSL)?", "options": {"A": "Certificate-based authentication of web client", "B": "Certificate-based authentication of web server", "C": "Data confidentiality between client and web server", "D": "Data confidentiality between two web servers"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q54"}, {"id": "pdf_57", "number": 57, "question": "What is considered an industry standard for Internet Protocol Security (IPSec) remote access Virtual Private Networks (VPN) key exchange?", "options": {"A": "Internet Key Exchange (IKE) Extended Authentication", "B": "Internet Security Association and Key Management Protocol (ISAKMP)", "C": "Transport Layer Security (TLS)", "D": "Interior Gateway Routing Protocol (IGRP)"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q57"}, {"id": "pdf_98", "number": 98, "question": "Referring to the following diagram, which of the following statements is most correct: DMZ Firewall Firewall Network Switch", "options": {"A": "Place the enterprise mail server in the DMZ area because a mail relay would not provide adequate mail service.", "B": "Place a router between the Internet and the first firewall to provide appropriate warning that the firewall is under attack.", "C": "VPN connections from a VPN concentrator should terminate at the firewall closest to the network to minimize traffic in the DMZ area.", "D": "A protocol based network Intrusion Detection System (IDS) could be placed in the DMZ area."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q98"}, {"id": "pdf_108", "number": 108, "question": "The network topology that provides the MOST security and the least risk is:", "options": {"A": "Symmetric networks because the increased amount of redundancy reduces the possibility of an integrity error occurring without being caught.", "B": "Symmetric Key Cryptography because of its speed.", "C": "Bus because all users are on the same LAN segment.", "D": "Ring if it is dedicated with no external connections"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q108"}, {"id": "pdf_119", "number": 119, "question": "IPSEC (IP Security), S-HTTP (Secure HTTP) and SSL (Secure Socket Layer) are examples of ?", "options": {"A": "Secure Multi-purpose Internet Mail Extensions (S/MIME).", "B": "Secure Internet protocols.", "C": "Internet transaction protocols.", "D": "Application protocol interfaces."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q119"}, {"id": "pdf_124", "number": 124, "question": "Which of the following statements is true about traffic passing from the DMZ interface to the inside interface?", "options": {"A": "Traffic is allowed access by default.", "B": "Traffic is blocked by default", "C": "Traffic passes if the access control lists are established between the inside and the DMZ.", "D": "Traffic passes if the inside security level is higher than the DMZ\u2019s interface\u2019s level."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q124"}], "ppt_questions": [{"id": "ppt_92", "number": 92, "question": "You organization is looking for a software that has a EAL level greater than \u201cstructurally tested\u201d. Which of the following should the organization consider looking for?", "options": {"A": "Functionally tested", "B": "Methodically tested and checked", "C": "Functionally tested and checked", "D": "Reviewed and methodically tested"}, "correct": "B", "explanation": "The question references EAL 2 \u2013 Structurally tested. Is EAL 1 Is EAL 3 &  (D) are not real EAL levels.", "source": "powerpoint", "source_label": "PPT Slide 92 (Security Architecture and Engineering)"}, {"id": "ppt_93", "number": 93, "question": "Before storing data on a cloud that replicates to other countries, what is the are the two most important considerations? (pick two)", "options": {"A": "Some types of encryption are restricted in other countries", "B": "You will need the latest hashing algorithm if you want to ensure integrity", "C": "Finding a certificate authority could be difficult", "D": "The company security policy can no longer be enforced", "E": "Some data can\u2019t legally be stored on foreign soil", "F": "Backups of the data may not be encrypted"}, "correct": "A", "explanation": "(A) The Wassenaar Arrangement \u000b(E) Data Sovereignty laws", "source": "powerpoint", "source_label": "PPT Slide 93 (Security Architecture and Engineering)"}, {"id": "ppt_94", "number": 94, "question": "A data breach was discovered after a company\u2019s usernames and password were posted to a hacker website. Afterwards, an analyst discovered the company stored credentials in plain text. Which of the following would help mitigate this type of breach in the future?", "options": {"A": "Create data loss controls that prevent documents from leaving the network.", "B": "Implement salting and hashing.", "C": "Configure the web content filter to block access to the forum.", "D": "Increase password complexity requirements."}, "correct": "B", "explanation": "Passwords should not be stored in plain text! \u000bWe want to store passwords as hashed values, and salt them for extra security! The hashing will protect us from insiders/hackers seeing the password, while the salt will make password cracking very difficult. The salt will also make rainbow tables useless!\u000b(more salt related details in the slide notes)", "source": "powerpoint", "source_label": "PPT Slide 94 (Security Architecture and Engineering)"}, {"id": "ppt_95", "number": 95, "question": "Of the control type listed below, what would a mantrap (access control vestibule) be considered?", "options": {"A": "Preventative", "B": "Physical", "C": "Detective", "D": "Deterrent"}, "correct": "B", "explanation": "A mantrap, access control vestibule, sally port, or air lock: A physical security access control system comprising a small room with two sets of interlocking doors, such that the first set of doors must close before the second set opens.\u00a0This mechanism seeks to eliminate the threat of piggybacking or tailgating. There are three well-known TYPES of controls: Physical Technical/Logical Administrative/Management (A), (C), and (D) are all CATEGORIES of control.", "source": "powerpoint", "source_label": "PPT Slide 95 (Security Architecture and Engineering)"}, {"id": "ppt_97", "number": 97, "question": "The components of this security model include subjects, objects, clearances, and who can have access to what. These components are related to which of the following security models?", "options": {"A": "The Bell-LaPadula Model", "B": "The Clark-Wilson Model", "C": "The Lipner Model", "D": "The Biba Model"}, "correct": "A", "explanation": "Biba is an integrity model, concerned with who can modify what.  Clark Wilson does not discuss clearances, only integrity ideas.  We can rule both of those out. With Bell-LaPadula (BLP) and Lipner remaining, BLP is the closest match to the description above. Lipner does have some element of BLP in it, but its still mostly defined by its integrity mechanisms and there is nothing integrity related in the question. - Confidentiality model - Integrity Model - Integrity Model - Combination of Biba and Bell-Lapadula", "source": "powerpoint", "source_label": "PPT Slide 97 (Security Architecture and Engineering)"}, {"id": "ppt_98", "number": 98, "question": "Which of the following statements is true of Common Criteria\u2019s Evaluation Assurance Levels (EALs)?", "options": {"A": "Common Criteria has 7 EALs against which a security product may be able to get certified.", "B": "Common Criteria has 7 EALs against which a security product may be able to get accredited.", "C": "Common Criteria EALs can be used to cross-certify with the Information Technology Security Evaluation Criteria (ITSEC) ratings, but not the Trusted Computer System Evaluation Criteria (TCSEC) ratings.", "D": "Common Criteria EALs can be used to cross-certify with the Trusted Computer System Evaluation Criteria (TCSEC) ratings, but not the Information Technology Security Evaluation Criteria (ITSEC) ratings."}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 98 (Security Architecture and Engineering)"}, {"id": "ppt_99", "number": 99, "question": "A stream cipher works by using which of the following?", "options": {"A": "Bit-by-bit substitution with Exclusive Or (XOR) and a keystream", "B": "Confusion, diffusion, and permutation", "C": "Exclusive Or (XOR) and an initialization vector (IV)", "D": "An initialization vector (IV), the Temporal Key Integrity Protocol (TKIP), and Wi-Fi Protected Access (WPA)"}, "correct": "A", "explanation": "(A) Is the correct definition of a stream cipher. Stream ciphers should be used to protect data in transit.", "source": "powerpoint", "source_label": "PPT Slide 99 (Security Architecture and Engineering)"}, {"id": "ppt_100", "number": 100, "question": "Considering best practices, what is true about a system that utilizes Mandatory Access Control (MAC)?", "options": {"A": "Objects are given clearance tags so they can access the subjects", "B": "Subjects are given sensitivity tags so they can access objects", "C": "Subjects will need permissions to access all objects on the system", "D": "All objects should be classified in accordance with corporate policy"}, "correct": "D", "explanation": "Subjects access objects, not the other way around. Subjects (people or programs) are given clearance.\u000bObjects (data and files) are given sensitivity/classification tags.", "source": "powerpoint", "source_label": "PPT Slide 100 (Security Architecture and Engineering)"}, {"id": "ppt_101", "number": 101, "question": "Which cipher uses key words and numerous rows (traditionally 26), each one of which is offset by one?", "options": {"A": "The Rail/Fence cipher", "B": "The Running key cipher", "C": "The Vigen\u00e8re cipher", "D": "The Vernam cipher"}, "correct": "C", "explanation": "Answer (C) is correct. The RAIL fence only uses two rows.  In the running key cipher, frequently used with the Vigen\u00e8re cipher, text (typically from a book) is used to provide a very long keystream, ideally one as long as the message itself. Finally, the Vernam cipher, or One Time Pad (OTP) uses one time pads from a code book. VIGEN\u00c8RE CIPHER", "source": "powerpoint", "source_label": "PPT Slide 101 (Security Architecture and Engineering)"}, {"id": "ppt_103", "number": 103, "question": "Which of the following allows two cooperating processes to transfer information in such a way that it violates the system's security policy?", "options": {"A": "Partial disclosure", "B": "Full disclosure", "C": "Covert channel", "D": "Open source"}, "correct": "C", "explanation": "Answer (C) is correct, as it is the classic definition of what a covert channel achieves. \u201cA covert channel is a type of attack that creates a capability to transfer information objects between \u000bprocesses that are not supposed to be allowed to communicate by the computer security policy.\u201d", "source": "powerpoint", "source_label": "PPT Slide 103 (Security Architecture and Engineering)"}, {"id": "ppt_104", "number": 104, "question": "A Certificate Authority (CA) will occasionally have to revoke a certificate it has published.  How does the CA make this fact known to users who are trusting it to deliver reliable certificates?", "options": {"A": "The CA informs the RA and the RA sends this information to the CA\u2019s membership.", "B": "The CA destroys its Digital Certificate Signing Key and creates a new one.", "C": "The CA informs the major browser vendors and they change their browsers so that they do not accept any Certificates signed by that version of the CA\u2019s key.", "D": "The CA publishes a special list which includes details about revoked certificates."}, "correct": "D", "explanation": "The special list they are describing is known as the Certificate Revocation List (CRL).", "source": "powerpoint", "source_label": "PPT Slide 104 (Security Architecture and Engineering)"}, {"id": "ppt_105", "number": 105, "question": "What is the difference between a Registration Authority (RA) and a Certificate Authority (CA)?", "options": {"A": "An RA generates the user\u2019s public/private key pair and saves them in the PKI database.", "B": "An RA verifies the user credentials, and the CA issues the digital certificate.", "C": "The CA generates the user\u2019s public/private key pair and the RA generates the certificate.", "D": "The RA verifies the user credentials, and the CA generates the user\u2019s public/private key pair."}, "correct": "B", "explanation": "At no point does an RA (the company) or the CA (a computer that makes certificates) generate the end users public/private key pair. This allows us to rule out everything except (B), which is 100% correct.", "source": "powerpoint", "source_label": "PPT Slide 105 (Security Architecture and Engineering)"}, {"id": "ppt_106", "number": 106, "question": "Which statement below BEST describes the difference between the Electronic Code Book (ECB) and the Counter (CTR) method of encryption?", "options": {"A": "ECB is a block cipher, whereas CTR does not stop errors from propagating.", "B": "ECB is a stream cipher, whereas CTR is a block cipher.", "C": "Encryption errors can propagate when ECB is used, but do not propagate when Counter is used.", "D": "ECB can only secure short messages, whereas CTR can secure long ones as well."}, "correct": "D", "explanation": "Counter does not propagate errors, so Answer (A) is eliminated.  Answer (B) has the cipher modes reversed, so it is incorrect.  ECB does not propagate errors, so Answer (C) is eliminated.", "source": "powerpoint", "source_label": "PPT Slide 106 (Security Architecture and Engineering)"}, {"id": "ppt_108", "number": 108, "question": "Given the plain text word \u201crambo\u201d, which of the following statements is correct?", "options": {"A": "A Caesar cipher for \u201crambo\u201d would yield \u201cabrmo.\u201d", "B": "A collision occurs when two different cryptographic keys encrypt \u201crambo\u201d and produce the same results.", "C": "A transposition cipher, with reorder sequence 53421 would yield \u201combar.\u201d", "D": "The SHA1 hash value for \u201crambo\u201d would be exactly 16 bytes long."}, "correct": "C", "explanation": "Is incorrect. A Caesar cipher is a mono-alphabetic substitution cipher, where each letter in the plaintext is replaced by a letter a fixed number of positions down the alphabet. For example, D is rotated back by three to become A,  and E would be rotated back three to become B, and so forth. Is incorrect. The term collision is tied to hashing and does not utilize keys. What they are describing in (B) is known as \u201cKey Clustering\u201d. This is correct! Is incorrect. Sha1\u2019s hash length/value is 20 bytes, aka 160 bits. Not 16 bytes.", "source": "powerpoint", "source_label": "PPT Slide 108 (Security Architecture and Engineering)"}, {"id": "ppt_110", "number": 110, "question": "Which of the following would be best suited to providing security despite constantly changing environments?", "options": {"A": "Supervisory Control And Data Acquisitions", "B": "Embedded systems", "C": "Containers", "D": "Real Time Operating Systems"}, "correct": "C", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 110 (Security Architecture and Engineering)"}, {"id": "ppt_111", "number": 111, "question": "Which of the following is correct?", "options": {"A": "An initialization vector (IV) is used to make sure that encryptions of important texts do not change each time they are encrypted.", "B": "Confusion refers to making the relationship between the ciphertext and the key as complex as possible; diffusion refers to dissipating the statistical structure of the plaintext over the bulk of the ciphertext.", "C": "Only one substitution and one permutation can occur in an SP-network.", "D": "The avalanche effect in an encryption algorithm means that the algorithm is resistant to small changes in the plaintext."}, "correct": "B", "explanation": "Answer (B) is correct.  Claude Shannon first identified these two properties in his 1945 classified report, \u201cA Mathematical Theory of Cryptography.\u201d Answer (A) is incorrect; IVs are used to help ensure that text does completely change when encrypted. Answer (C) is wrong; SP networks use many rounds of both substitution and permutation. The AES cipher is an excellent example of this. Answer (D) is wrong, as with the avalanche \u000beffect, a small change in the text will produce a large change in the output.", "source": "powerpoint", "source_label": "PPT Slide 111 (Security Architecture and Engineering)"}, {"id": "ppt_112", "number": 112, "question": "Which statement BEST describes how the term \u201ckey space\u201d affects \u201ccryptanalysis\u201d?", "options": {"A": "The larger the key space, the easier the cryptanalysis.", "B": "The key space doubles each time you add a bit to the key length, which makes cryptanalysis more difficult.", "C": "Cryptanalysis is designing algorithms, and key space means testing the keys to ensure they work properly.", "D": "Cryptanalysis is  most often accomplished by systematically reducing the size of the keyspace."}, "correct": "B", "explanation": "Answer (B) is correct.  (A) is the opposite of the truth.  Similarly (C) is wrong, as Cryptography is about designing algorithms, and cryptanalysis is about breaking them. Finally, answer (D) is wrong, as it is not most often accomplished this way.", "source": "powerpoint", "source_label": "PPT Slide 112 (Security Architecture and Engineering)"}, {"id": "ppt_113", "number": 113, "question": "What are the key and block sizes for the AES algorithm?", "options": {"A": "Keys are 128 bits; blocks are 128 and 256 bits.", "B": "Keys are 128 bits, as are blocks.", "C": "Both keys and blocks can be 128, 192, and 256 bits.", "D": "Keys are 128, 192, and 256 bits and blocks are 128 bits."}, "correct": "D", "explanation": "Rjindael, the algorithm from which AES was derived, was able to use the range of block sizes described in Answer (C), but the NIST specification in 2001 for the new Advanced Encryption Standard specified a block size of 128 bits only.  AES does allow 128, 192, and 256 bit keys, which eliminates Answers (A) and (B).", "source": "powerpoint", "source_label": "PPT Slide 113 (Security Architecture and Engineering)"}, {"id": "ppt_114", "number": 114, "question": "Upper management is looking to find a new cloud provider to host the company\u2019s software as a service product.  Considering the problems your organization had with the last provider, they instructed you to find a provider who has displayed good internal governance. What indicator should be used when looking for this new provider?", "options": {"A": "Maturity level", "B": "Risk identification", "C": "SOC reports", "D": "Loss history"}, "correct": "A", "explanation": "Maturity levels (CMM) account for a better indication of governance, surpassing losses, audits, or the ability simply ID risk.", "source": "powerpoint", "source_label": "PPT Slide 114 (Security Architecture and Engineering)"}, {"id": "ppt_115", "number": 115, "question": "Which of the following contains BOTH a hashing and an", "options": {"A": "asymmetric key algorithm?", "B": "DES and SHA2", "C": "SHA2 and MD5", "D": "MD5 and ECC", "E": "AES and ECC"}, "correct": "C", "explanation": "Symmetric and Hashing\u000b- Hashing and Hashing\u000b- Hashing and Asymmetric\u000b- Symmetric and Asymmetric", "source": "powerpoint", "source_label": "PPT Slide 115 (Security Architecture and Engineering)"}, {"id": "ppt_116", "number": 116, "question": "Which of the following is an attack against hashes?", "options": {"A": "Plain text Attack", "B": "Dictionary Attack", "C": "Stream cipher Attack", "D": "Cipher text attack"}, "correct": "B", "explanation": "Passwords are stored as hashes, and the only password attack listed is the Dictionary Attack. Other hashing attacks against passwords are the Birthday attack, the use of hash tables, and the use of rainbow tables. Answers (A) (C), and (D) are all attacks intended to find the key.", "source": "powerpoint", "source_label": "PPT Slide 116 (Security Architecture and Engineering)"}, {"id": "ppt_117", "number": 117, "question": "Which of the following is no longer a common and effective attack on wireless networks?", "options": {"A": "A Plaintext Attack", "B": "A Rainbow Table Attack", "C": "A Stream Cipher Attack", "D": "A Ciphertext Attack"}, "correct": "C", "explanation": "\u201dWas, but is no longer\u201d implies the use of WEP or WPA rather than WPA2, which was introduced in 2004.  WEP and WPA used RC4, a stream cipher. Answers (A), (B) and (D) are all otherwise too broad.", "source": "powerpoint", "source_label": "PPT Slide 117 (Security Architecture and Engineering)"}, {"id": "ppt_118", "number": 118, "question": "The Simple Integrity Property provides what permission?", "options": {"A": "Read at the same level or at a higher level.", "B": "Write at the same level or at a lower level.", "C": "Read at the same level or at a lower level.", "D": "Write at the same level or at a higher level."}, "correct": "A", "explanation": "The SIMPLE integrity property is a READ capability for the Biba model.  This eliminates Answers (B) and (D) which concern the STAR property. In Biba, reading up is okay, but reading down is not, as you would thereby be accepting less accurate information. This eliminates Answer (C). With integrity models you can \u000bREAD UP, but not DOWN.\u000bWRITE DOWN, but not UP.\u000b(confidentiality models are the opposite)", "source": "powerpoint", "source_label": "PPT Slide 118 (Security Architecture and Engineering)"}, {"id": "ppt_119", "number": 119, "question": "Which security model is designed to help ensure that high level activities (inputs) do not determine what low-level users can see (outputs)?", "options": {"A": "The Lattice model", "B": "The Information Flow model", "C": "The Clark-Wilson model", "D": "The Non-interference model"}, "correct": "D", "explanation": "(A) Lattice models allow for strict distinction between different levels and defines clear rules for interactions between them, such as Bell-LaPadula. (B) Information flow models focus on the ways in which information can flow or be exchanged within a system. (C) The Clark-Wilson model is an integrity model focused on ensuring well-formed transactions. (D) Is correct. A non-interference model aims at a strict separation of differing security levels to ensure that higher-level activities don't determine what lower-level users can see or gain access to.", "source": "powerpoint", "source_label": "PPT Slide 119 (Security Architecture and Engineering)"}, {"id": "ppt_120", "number": 120, "question": "Originally there were three Cloud Service models (CSMs) and four Cloud Deployment models (CDMs).  Which statement below has two original CSMs and two CDMs?", "options": {"A": "SaaS, IDaaS, Public, and Private", "B": "SaaS, PaaS, Community, and Hybrid", "C": "IaaS, PaaS, On-site and Off-site", "D": "Naas, CaaS, Hybrid,  and Commercial"}, "correct": "B", "explanation": "IDaaS, NaaS and CaaS were not original CSMs and \u201con-site and off-site\u201d are not deployment models.", "source": "powerpoint", "source_label": "PPT Slide 120 (Security Architecture and Engineering)"}, {"id": "ppt_121", "number": 121, "question": "Which fire prevention system does not hold water above the area it protects, contains heat-sensing elements, and only begins to fill with water when the valve is triggered by excessive heat?", "options": {"A": "A Dry-Pipe System", "B": "A Deluge System", "C": "A Wet-Pipe System", "D": "A Pre-Action System"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 121 (Security Architecture and Engineering)"}, {"id": "ppt_123", "number": 123, "question": "Which of the following demonstrates the authenticity and origin of a communication, thereby providing for non-repudiation?", "options": {"A": "Using Elliptic Curve Cryptography techniques", "B": "Assigning Denial of Service Certificates to senders", "C": "Digital Signatures", "D": "E-Commerce Digital Certificates"}, "correct": "C", "explanation": "ECC may be used to encrypt a hash to get a digital signature, but RSA is more often used. Furthermore, \u201ccryptography techniques\u201d is very ambiguous. Denial of Service certificate are not a real thing. (D) E-Commerce Digital certificates are used by SSL and TLS enabled servers to initiate SSL/TLS VPNs, not to provide non-repudiation. (C) Is correct. A digital signature is a mathematical scheme for verifying the authenticity of digital messages or documents. This may also be referred to as providing non-repudiation or proof-of-origin.", "source": "powerpoint", "source_label": "PPT Slide 123 (Security Architecture and Engineering)"}, {"id": "ppt_124", "number": 124, "question": "Which security model focuses on preventing conflicts of interest when a given subject would otherwise have access to objects with sensitive information associated with two competing parties?", "options": {"A": "Information Flow", "B": "Non-Interference", "C": "Clark-Wilson", "D": "Brewer and Nash"}, "correct": "D", "explanation": "Answer (D) is correct.  It may also be called the Chinese Wall model.\u000b\u000bCW is about making sure that the 3 rules of data integrity for achieving well-formed transactions are maintained.", "source": "powerpoint", "source_label": "PPT Slide 124 (Security Architecture and Engineering)"}, {"id": "ppt_125", "number": 125, "question": "Which of the following is MOST accurate with respect to individual computing devices (ICDs) on a cluster versus on a grid system?", "options": {"A": "If a Grid ICD fails, the Grid must be restarted.", "B": "If a Cluster ICD fails, the cluster must be restarted.", "C": "Grid systems are homogeneous, while Cluster systems are heterogeneous.", "D": "Cluster ICDs all share the same operating system (OS) and application software, but Grid ICDs can have many different OSs, while still working on solving the same problem."}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 125 (Security Architecture and Engineering)"}, {"id": "ppt_126", "number": 126, "question": "If a fire broke out due to an electrical short, what type of fire would this be classified as?", "options": {"A": "A class", "B": "B class", "C": "C class", "D": "D class"}, "correct": "C", "explanation": "Memory tricks: =  \u201cAsh\u201d. =  \u201cBoil\u201d. = \u201cCircuit\u201d or \u201cCurrent\u201d. =  \u201cDent\u201d. (K)   =   \u201cKitchen\u201d", "source": "powerpoint", "source_label": "PPT Slide 126 (Security Architecture and Engineering)"}, {"id": "ppt_127", "number": 127, "question": "Which of the following best describes a Common Criteria \u201cProtection Profile\u201d?", "options": {"A": "A set of security requirements to be used to evaluate a Security Target.", "B": "A set of security requirements for a category of products that meet specific consumer security needs.", "C": "An implementation-independent set of functional security requirements for a category of products that meet specific consumer security needs.", "D": "An implementation-specific set of assurance requirements for products that meet specific consumer security needs."}, "correct": "B", "explanation": "Answer (A) is wrong,  as the security product to be evaluated is called the Target of Evaluation (ToE). All CC evaluations provide for both Assurance and Functionality, so Answers (C) and (D) leave out something, and are thus eliminated.", "source": "powerpoint", "source_label": "PPT Slide 127 (Security Architecture and Engineering)"}, {"id": "ppt_128", "number": 128, "question": "Albert received a message sent to him over the Internet by John.  Albert changed the content of the message and then then claimed that the altered message was the one he\u2019d received from John. Which technique would prevent Albert from being able to make this claim?", "options": {"A": "John used Public Key Cryptography to deliver the message.", "B": "John digitally signed the message.", "C": "John used the 512 bit version of SHA2 to hash the message and then sent this hash along with the message to Albert.", "D": "John used hybrid encryption with the strong AES256 algorithm and the  ECC public key algorithm to send the message to Albert."}, "correct": "B", "explanation": "Digital signatures provide integirty and non-repudiation, aka proof-of-origin!", "source": "powerpoint", "source_label": "PPT Slide 128 (Security Architecture and Engineering)"}, {"id": "ppt_129", "number": 129, "question": "Which of the following describes the correct way to create and use a digital signature?", "options": {"A": "Add the sender\u2019s name to the document, then encrypt it with the recipient\u2019s public key, send the encrypted document to the recipient.", "B": "Encrypt the document with the sender\u2019s Private key, and then send the encrypted document to the recipient.", "C": "Hash the document, then encrypt both the hash and the document with the sender\u2019s private key, then send the encrypted information  to the recipient.", "D": "Hash the document, then encrypt only the hash with the sender\u2019s private key, send both the plain text document and the encrypted hash to the recipient."}, "correct": "D", "explanation": "provides encryption, but does not offer non-repudiation. Non-repudiation (proof-of-origin) is the entire point of the signatures and what we are looking for. Simply adding the sender\u2019s name does not provide proof-of-origin. is incorrect, because you don\u2019t encrypt the document with the sender\u2019s private key. If you did, they would never be able to read it. (C) is incorrect because you don\u2019t encrypt the document along with the hash. As (D) demonstrates, only the hash is encrypted with the senders private key.", "source": "powerpoint", "source_label": "PPT Slide 129 (Security Architecture and Engineering)"}, {"id": "ppt_131", "number": 131, "question": "A cloud storage server has been brought online that is intended to serve hospitals exclusively. Several hospitals, all owned by different entities, have begun using this highly secured cloud server. What type of cloud deployment model matches this type of server?", "options": {"A": "Public", "B": "Private", "C": "Community", "D": "Hybrid", "E": "A community cloud is shared by a group of similar organizations that all have similar needs. In this example, it is a server built only to serve hospitals."}, "correct": "C", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 131 (Security Architecture and Engineering)"}, {"id": "ppt_132", "number": 132, "question": "A contractor working for the company updated several applications and plugins on the cloud platform causing a massive outage. Of the options below, what would best prevent this from happening again?", "options": {"A": "Secure Web Gateway (SWG)", "B": "Cloud Access Security Broker (CASB)", "C": "Mirrored backup site", "D": "Containerization"}, "correct": "B", "explanation": "Secure Web Gateway. Its an application firewall built to serve cloud applications. While these are capable of inspecting traffic and filtering out scripting attacks, it is unlikely that the gateway would block an application from receiving an update. Cloud Access Security Broker. This is an on-premise or cloud based security software that limits access and enforces access control for the cloud, on a per user basis. Many CASB\u2019s will include SWG functionality and a CASB could block an application or plugin from receiving an update. This technology is very flexible and is one of the best tools for protecting cloud servers. It can also be used to promote compliance, perform monitoring, and prevent malware.", "source": "powerpoint", "source_label": "PPT Slide 132 (Security Architecture and Engineering)"}, {"id": "ppt_133", "number": 133, "question": "Of the cloud service models listed below, which would typically include storage, networking, and servers, but not an operating system?", "options": {"A": "DaaS", "B": "SaaS", "C": "PaaS", "D": "IaaS"}, "correct": "D", "explanation": "DaaS = Desktop as a Service.\u000bIt\u2019s a VDI (virtual desktop infrastructure) but delivered through the cloud. The original/primary three cloud SERVICE models:", "source": "powerpoint", "source_label": "PPT Slide 133 (Security Architecture and Engineering)"}, {"id": "ppt_134", "number": 134, "question": "Although this situation is unlikely, under what circumstances would it be completely acceptable to use AES in ECB mode with a 128 bit key?", "options": {"A": "When AES is using a 128 bit block size.", "B": "When AES is set to perform 10 rounds of encryption.", "C": "When the data to be encrypted is less than 128 bits.", "D": "When the key was negotiated with DH group 24"}, "correct": "C", "explanation": "The problem with ECB (electronic codebook) mode is that if the message is longer than the key size, it will reuse the same key again without modifying it. This leads to weak confusion, where the relationship between the key and the ciphertext is easy to identify. This could also be described as: because the key repeats, a pattern develops, and a cipher-text only attack will require less work to perform (lower work factor). (A) AES will always use a 128bit block size\u2026 but this doesn\u2019t suddenly make ECB safe to use.\u000b(B) AES will perform 10 rounds of encryption when using a 128 bit key, but still, not considered safe.\u000b(D) How the key is negotiated does not have anything to do with ECB mode.", "source": "powerpoint", "source_label": "PPT Slide 134 (Security Architecture and Engineering)"}, {"id": "ppt_135", "number": 135, "question": "A company has developed their own SaaS product. They need a flexible and transparent management tool that grants them the ability to control and monitor who uses their product. What could meet the needs of this company for their new SaaS product?", "options": {"A": "System Info and Event Manager (SIEM)", "B": "Data Loss Preventer (DLP)", "C": "Cloud Access Security Broker (CASB)", "D": "Access Control Matrix"}, "correct": "C", "explanation": "A Cloud Access Security Broker (CASB) is a service/software that sits between the end-user and the cloud provider. It can offer the following: Mediate all access to and from the cloud Provide highly granular control over users and data Enforce compliance with well-known cloud regulations Give visibility into user/app/data usage (allows for monitoring and measured services) Prevent most injection/malware threats", "source": "powerpoint", "source_label": "PPT Slide 135 (Security Architecture and Engineering)"}, {"id": "ppt_136", "number": 136, "question": "What best describes the function of microservices in the cloud?", "options": {"A": "Independent applications that are designed as small components and loosely coupled.", "B": "Applications that are inexpensive when deployed on a large scale.", "C": "Applications that are small enough to live stream to customers.", "D": "Applications intended for use on mobile platforms."}, "correct": "A", "explanation": "Microservices are small, simple, agile, standalone apps that communicate through well-known APIs. They are sometimes developed independently and are loosely coupled so they can be deployed as one application (with many services) if needed. Microservices architectures make applications easier to scale and faster to develop, enabling innovation and accelerating time-to-market for new features.", "source": "powerpoint", "source_label": "PPT Slide 136 (Security Architecture and Engineering)"}, {"id": "ppt_137", "number": 137, "question": "Of the options below, what is the best description of a container, as it applies to software virtualization?", "options": {"A": "A secure test environment.", "B": "An encrypted file that is safe to transmit over unsecured media.", "C": "A virtual machine with only one OS and one application.", "D": "Several isolated applications sharing a single OS."}, "correct": "D", "explanation": "Containers are virtualization at the operating-system level such that a single operating system is partitioned and used by multiple applications. The applications are isolated from each other. In many cases, containers are more efficient than full virtual machines (virtualization at the hardware layer). Containers are used in the cloud to quickly deploy and scale web applications.", "source": "powerpoint", "source_label": "PPT Slide 137 (Security Architecture and Engineering)"}, {"id": "ppt_138", "number": 138, "question": "Of the options below, what is the best description of containerized software?", "options": {"A": "Code and all of its associated dependencies have been packaged together so that it can run on almost any infrastructure.", "B": "A library of virtual machines that can communicate through well-known APIs.", "C": "A lightweight software that is designed to perform a single dedicated security function.", "D": "An abstract concept that involves mediating all access from subjects to the software and its associated objects."}, "correct": "A", "explanation": "Software containerization bundles the application code together with the related configuration files, libraries, and dependencies required for it to run. This single package of software or \u201ccontainer\u201d is abstracted away from the host operating system, and hence, it stands alone and becomes portable\u2014able to run across any platform or cloud, free of issues.", "source": "powerpoint", "source_label": "PPT Slide 138 (Security Architecture and Engineering)"}, {"id": "ppt_139", "number": 139, "question": "Which of the following cloud principles will help manage the risk of a network breach?", "options": {"A": "Self-service", "B": "Availability", "C": "Shared responsibility", "D": "Elasticity and redundancy"}, "correct": "C", "explanation": "Since both the customer and the CSP have their own specific responsibilities, managing the risk is easier for both of them. The CSP is responsible for security \u2018of\u2019 the cloud, while the customer is responsible for security \u2018in\u2019 the cloud. Cloud service providers are responsible for security of: Data center Data isolated between businesses Network security within the data center Cloud consumers are responsible for security of: Direct user-access to data (permissions) Backup and restoration of data", "source": "powerpoint", "source_label": "PPT Slide 139 (Security Architecture and Engineering)"}, {"id": "ppt_140", "number": 140, "question": "After a recent security summit, management has decided that too much attention has been paid to perimeter defenses and defending network segments. Instead, more focus should be put on securing internal assets, services, and workflows. They explain that this shift will protect the company better in the future considering that more employees will be working remotely. What security concept is closely aligned with managements new security posture?", "options": {"A": "Shared responsibility model", "B": "Zero trust architecture", "C": "Complete mediation system", "D": "Privacy by design"}, "correct": "B", "explanation": "Zero trust - An evolving set of security paradigms that shifts focus from perimeter defenses to the internal users, assets, and resources. It assumes no implicit trust is granted to assets or user accounts based off of their network location. This shift in focus is a necessary change considering the rise of mobile phones and remote employees.", "source": "powerpoint", "source_label": "PPT Slide 140 (Security Architecture and Engineering)"}, {"id": "ppt_141", "number": 141, "question": "Management has determined that the business has become overly dependent on the cloud service provider and has been attempting to list out all of the benefits that a shift to edge computing would offer. Of the list below, which issue is the least resolved by the implementation of edge computing?", "options": {"A": "High latency with the cloud provider", "B": "Data sovereignty compliance costs", "C": "Regular network connectivity faults", "D": "Limited bandwidth is remaining due to cloud traffic"}, "correct": "C", "explanation": "Edge computing is about performing data computation and storage closer to the device that needs it, instead of sending it all the way to the data center. The origins of this concept can be found in the Content Delivery Networks that Netflix and similar services rely on. Since the data doesn\u2019t have to go to the cloud for processing, latency will be greatly reduced. Since the data can be kept local, it is considerably easier to remain in compliance with sovereignty regulations. While edge computing could possibly reduce the impact of network connectivity faults, it doesn\u2019t resolve the faults themselves. If you have limited bandwidth, not having to send things to the cloud will drastically reduce the bandwidth you consume.", "source": "powerpoint", "source_label": "PPT Slide 141 (Security Architecture and Engineering)"}, {"id": "ppt_143", "number": 143, "question": "Management would like to use MAC filtering on all of the company access points. What consideration must be made before this is implemented?", "options": {"A": "Administrative overhead could become a problem as new devices are added to the enterprise", "B": "Employees would forget their MAC addresses and would need the IT department to reset them", "C": "The MAC address will reveal the vendor of the NIC", "D": "MAC addresses would need to be statically configured on all laptops and phones"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 143 (Communication and Network Security)"}, {"id": "ppt_144", "number": 144, "question": "Which of the following are the correct names for the Open Systems Interconnection (OSI) model layers 1, 6, 7, and 3?", "options": {"A": "Physical, application, presentation, and network", "B": "Data link, network, application, and session", "C": "Physical, data link, network, and application", "D": "Physical, presentation, application, and network"}, "correct": "D", "explanation": "The OSI MODEL\u000bLayer 7 - Application Layer 6 - Presentation Layer 5 - Session Layer 4 - Transport Layer 3 - Network Layer 2 - Data link Layer 1 - Physical", "source": "powerpoint", "source_label": "PPT Slide 144 (Communication and Network Security)"}, {"id": "ppt_145", "number": 145, "question": "Which of the following provides the best and most scalable access control for a corporate wireless network?", "options": {"A": "A Stateful firewall that also does Network Address Translation (NAT).", "B": "WPA2 Enterprise with IEEE 802.1x.", "C": "WPA2 Personal with long pre-shared keys.", "D": "A carefully monitored MAC filtering plan."}, "correct": "B", "explanation": "A Stateful firewall (A) does not provide access to a wireless network.  Pre-shared keys (C) are likely to be static, and can be brute-forced. Finally, MAC addresses (D) can be spoofed to easily bypass filtering. The best answer would be (B), as 802.1x could allow for everyone to have an unique username and password. Furthermore, it can support certificates which eliminates the threat of password attacks.", "source": "powerpoint", "source_label": "PPT Slide 145 (Communication and Network Security)"}, {"id": "ppt_146", "number": 146, "question": "Which statement BEST describes the functions of the data-link layer (DLL) and the presentation layer (PL)?", "options": {"A": "The DLL provides media access control and transmits signals as frames; the PL handles data formatting.", "B": "The DLL converts port numbers into signals; the PL handles data formatting.", "C": "The DLL provides framing; the PL converts bits into signals.", "D": "The DLL converts a network packet into signals; the PL converts an application packet into a datagram."}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 146 (Communication and Network Security)"}, {"id": "ppt_147", "number": 147, "question": "Which PKI component publishes the Certificate Revocation List (CRL)?", "options": {"A": "The Central Directory (CD)", "B": "The Registration Authority (RA)", "C": "The Certificate Authority (CA)", "D": "The Certificate Manager (CM)"}, "correct": "C", "explanation": "Answer (C) is correct.  The CA issues certificates and it also publishes the CRL.  The RA verifies the identity of users prior to issuing digital certificates.", "source": "powerpoint", "source_label": "PPT Slide 147 (Communication and Network Security)"}, {"id": "ppt_148", "number": 148, "question": "Which of the following technologies acted as a successor to Wired Equivalent Privacy (WEP) without requiring a change in hardware?", "options": {"A": "Wi-Fi Protected Access II (WPA2), and it used the Advanced Encryption Standard (AES).", "B": "Wi-Fi Protected Access II (WPA2), and it used the Temporal Key Integrity Protocol (TKIP).", "C": "Wi-Fi Protected Access (WPA) and it used the Temporal Key Integrity Protocol (TKIP).", "D": "Wi-Fi Protected Access (WPA) and it used the Advanced Encryption Standard (AES)."}, "correct": "C", "explanation": "The IEEE standards were WEP, then WPA, then WPA2.  The TKIP was first used with WPA and AES was first used in WPA2. WPA2\u2019s support of AES required a change to the hardware.", "source": "powerpoint", "source_label": "PPT Slide 148 (Communication and Network Security)"}, {"id": "ppt_151", "number": 151, "question": "If you used a system that included Network Intrusion Detection (NIDS), Host Intrusion Detection (HIDS), and Host Intrusion Prevention (HIPS) capabilities, which of the following would be MOST difficult to successfully monitor?", "options": {"A": "Web server traffic using the HIDS on the Web Server.", "B": "Database server traffic using the HIPS on the Database server.", "C": "Incoming E-Commerce traffic using the NIDS on the corporate DMZ.", "D": "Outgoing Telnet and FTP traffic using the NIDS within the DMZ."}, "correct": "C", "explanation": "Network devices will have difficulties inspecting encrypted traffic. While (C) doesn\u2019t say its encrypted, its safe to assume it is as TLS1.2 is a requirement for PCI-DSS.", "source": "powerpoint", "source_label": "PPT Slide 151 (Communication and Network Security)"}, {"id": "ppt_152", "number": 152, "question": "What is the MAIN security advantage of installing website control filters to block sites such as Facebook, or fantasy sports sites?", "options": {"A": "Making your employees more productive since they are not wasting time on the blocked social networking sites.", "B": "Deterring employees from betting on sports events.", "C": "Stopping leakage of personal information.", "D": "Avoiding malware."}, "correct": "D", "explanation": "Answers (A) and (B) are concerns for HR or management, and aren\u2019t strongly tied to the security that a web filter provides. While (C) isn\u2019t terrible, the company probably doesn\u2019t care about an employee leaking their personal information. Furthermore, a DLP would be best suited to this task. Answer (D) is correct. By avoiding those websites we greatly reduce the risk of malware.", "source": "powerpoint", "source_label": "PPT Slide 152 (Communication and Network Security)"}, {"id": "ppt_153", "number": 153, "question": "Your company has a border router/firewall to connect its network to the Internet. It also has a 64-port switch to connect all your internal users and printers. To isolate your general users from seeing the normal, but sensitive, traffic among Human Resources (HR) employees, you place the HR employees into a separate VLAN. What risks remain with the use of the VLAN?", "options": {"A": "None, the data is encrypted.", "B": "None, the data being communication is air gapped.", "C": "The HR data might be exposed through VLAN leaking.", "D": "The HR data might be exposed through a denial of service."}, "correct": "C", "explanation": "802.1Q and Inter-Switch Link Protocol (ISL) Tagging Attacks allow a user on a VLAN to get unauthorized access to another VLAN. This is commonly referred to as \u201cVLAN leaking.\u201d", "source": "powerpoint", "source_label": "PPT Slide 153 (Communication and Network Security)"}, {"id": "ppt_154", "number": 154, "question": "What routing technique allows multiple devices to share the same IPv6 address while routing packets to the nearest host?", "options": {"A": "Unicast", "B": "Broadcast", "C": "Multicast", "D": "Anycast"}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 154 (Communication and Network Security)"}, {"id": "ppt_155", "number": 155, "question": "To contain an ongoing incident where your E-mail server is being attacked, which answer is BEST?", "options": {"A": "Disconnect the E-mail server from the network.", "B": "Use network segmentation to isolate the E-mail server.", "C": "Put new and tighter E-mail filtering  rules into your firewall.", "D": "Put more specific E-mail rules into your border router."}, "correct": "A", "explanation": "When an important server, such as an Email server with lots of sensitive information, is being attacked, you need to work fast.  Disconnecting it from the network is the best way.  The other ways will take too much time.", "source": "powerpoint", "source_label": "PPT Slide 155 (Communication and Network Security)"}, {"id": "ppt_156", "number": 156, "question": "A hacker sniffs network traffic and then uses a faked IP address and TCP header information to insert packets onto the network.  Of the options below, what best illustrates this attack?", "options": {"A": "IP Spoofing", "B": "Session hijacking", "C": "Fraggle", "D": "Smurf"}, "correct": "B", "explanation": "This is the classic definition of Session Hijacking.  IP spoofing doesn\u2019t typically include the TCP header and Fraggle and Smurf attacks certainly don\u2019t.", "source": "powerpoint", "source_label": "PPT Slide 156 (Communication and Network Security)"}, {"id": "ppt_157", "number": 157, "question": "An unknown threat actor added a rogue Certificate Authority (CA) to your Public Key Infrastructure (PKI) cache. How would your web browser react?", "options": {"A": "Not trust any of the certificates the rogue CA had signed.", "B": "Always prompt you to reject it, as the rogue CA\u2019s certificate is in your browser\u2019s cache.", "C": "Always trust any certificate the rogue CA had previously signed.", "D": "Not cause any harm, as rogue CAs aren\u2019t effective."}, "correct": "C", "explanation": "Once a CA is in your PKI cache (normally in your browser), any Certificates that the rogue CA has signed will be trusted.", "source": "powerpoint", "source_label": "PPT Slide 157 (Communication and Network Security)"}, {"id": "ppt_158", "number": 158, "question": "Which attack uses options in the \u201cping\u201d command to create a denial-of-service attack?", "options": {"A": "An Overlapping fragment attack.", "B": "The Fraggle attack.", "C": "The Smurf attack.", "D": "The Double Teardrop attack."}, "correct": "C", "explanation": "They are describing a Smurf attack! This attack uses ping (ICMP echo replies) to overwhelm a target and cause a DoS. Fraggle is similar but it uses UDP messages instead of ICMP. Answers (A) and (D) are fragmentation attacks.", "source": "powerpoint", "source_label": "PPT Slide 158 (Communication and Network Security)"}, {"id": "ppt_159", "number": 159, "question": "As the result of a business merger, a root certificate authority from company A and a root certificate authority from company B need to be configured so that they will trust certificates generated by each other. Of the options below would best describe this process?", "options": {"A": "Subordinate CA to Subordinate CA Trust.", "B": "Cross-certification.", "C": "RA to RA Cooperation.", "D": "Certificate Authority Reciprocity."}, "correct": "B", "explanation": "Everything except (B) is complete nonsense.", "source": "powerpoint", "source_label": "PPT Slide 159 (Communication and Network Security)"}, {"id": "ppt_160", "number": 160, "question": "Which list contains one IP Networking port number in the \u201cWell known\u201d range, one in the \u201cRegistered\u201d range, and one in the \u201cDynamic\u201d range?", "options": {"A": "69         1007      and      50001", "B": "1443     8080     and      49152", "C": "23         80          and      1443", "D": "809       1812     and      53652"}, "correct": "D", "explanation": "Well known -- 0 to 1,023;   \u000bRegistered -- 1,024 to 49,151, \u000bDynamic/ephemeral --  49,152 to 65,535.", "source": "powerpoint", "source_label": "PPT Slide 160 (Communication and Network Security)"}, {"id": "ppt_161", "number": 161, "question": "What application layer device provides translation services for different environments?", "options": {"A": "A Voice over IP (VOIP) to Plain old Telephone Service (POTS) gateway.", "B": "An Ethernet to Token Ring bridge.", "C": "An ASCII to EBCDIC gateway.", "D": "A Router connecting two different LAN segments."}, "correct": "A", "explanation": "Since VOIP is an Layer 7 (Application), VOIP to POTS is application-layer translation. - Layer 2 (data link) - Layer 6 (presentation) - Layer 3 (network)", "source": "powerpoint", "source_label": "PPT Slide 161 (Communication and Network Security)"}, {"id": "ppt_162", "number": 162, "question": "Which statement below BEST describes the purpose of a Software Defined Network?", "options": {"A": "It is used to separate traditional network traffic into three components: raw data, the way in which the data are sent, and the purpose the data serve.", "B": "It is used to provide redundancy in cloud environments.", "C": "It abstracts network traffic into three layers which are called Application, Communications, and Interface.", "D": "It creatively uses TCP/IP networking standards to move data over different paths."}, "correct": "A", "explanation": "Answer (A) is the most accurate. \u000b(B) A SDN provides many things to cloud environments, not just redundancy.  (C) is wrong because the middle layer is called Control, not Communications. (D) does not really describe a SDN.", "source": "powerpoint", "source_label": "PPT Slide 162 (Communication and Network Security)"}, {"id": "ppt_163", "number": 163, "question": "Which statement BEST describes the differences among  different network cabling media?", "options": {"A": "Coaxial cable has more environmental protection than Shielded Twisted Pair (STP)", "B": "Twisted pair copper cabling comes in two modes, Unshielded Twisted Pair (UTP) and Shielded Twisted Pair (STP).", "C": "Fiber Optic cabling comes in two modes, single-mode and multi-mode.", "D": "Shielded Twisted Pair (STP) is more resistant to EMI than fiberoptic cables."}, "correct": "A", "explanation": "Answer (A) is correct, as it correctly compared different types of cabling media.  Answers (B) and (C) are wrong because they do not compare different types of media, but are otherwise accurate. Answer (D) is completely incorrect as fiberoptic is immune to EMI.", "source": "powerpoint", "source_label": "PPT Slide 163 (Communication and Network Security)"}, {"id": "ppt_164", "number": 164, "question": "Which of the following uses the User Datagram Protocol (UDP) to create a denial-of-service attack?", "options": {"A": "A Session Hijacking attack.", "B": "The Double Teardrop attack.", "C": "The Fraggle attack.", "D": "The Smurf attack."}, "correct": "C", "explanation": "The Fraggle attack uses UDP messages to cause a DoS. \u000bSession Hijacking is a layer 5 TCP attack. Smurf uses ICMP, and a Teardrop is a fragmentation attack (layer 3).", "source": "powerpoint", "source_label": "PPT Slide 164 (Communication and Network Security)"}, {"id": "ppt_165", "number": 165, "question": "Which are true regarding Software Defined Networks? (pick two)", "options": {"A": "Decouple the control and data planes, logically centralize network intelligence and state, and abstract the infrastructure from the applications.", "B": "Separate traditional network traffic into two areas: Clear-Text and Covered-Data.", "C": "Separate traditional network traffic into three components: raw data, how the data is sent, and what purpose the data serves.", "D": "Map the data into two planes, usually called the infrastructure and communications planes.", "E": "It abstracts policy from the actual device configuration to create new software profiles."}, "correct": "A", "explanation": "(B) is nonsense. (D) SDNs map into 3 planes, not two. (E) is backwards, as policy comes from the software and not the devices.", "source": "powerpoint", "source_label": "PPT Slide 165 (Communication and Network Security)"}, {"id": "ppt_166", "number": 166, "question": "Which of the following best describes IPSEC?", "options": {"A": "A protocol used by virtual private networks (VPNs) that can both tunnel and encrypt.", "B": "A protocol used by local area networks (LANs) that can both tunnel and encrypt.", "C": "A local area network (LAN) protocol that can encrypt but not tunnel.", "D": "A virtual private network (VPN) protocol that can only Tunnel."}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 166 (Communication and Network Security)"}, {"id": "ppt_168", "number": 168, "question": "A company has decided to adopt the CYOD (choose your own device) deployment model, where the company allows the employee to choose from a range of cellular devices. Considering this deployment model, what should the security team consider before the phones are deployed?", "options": {"A": "The most common set of MDM configurations will become the effective set of enterprise mobile security controls.", "B": "All devices will need to support SCEP-based enrollment; therefore, the heterogeneity of the chosen architecture may unnecessarily expose private keys to adversaries.", "C": "Certain devices are inherently less secure than others, so compensatory controls will be needed to address the delta between device vendors.", "D": "MDMs typically will not support heterogeneous deployment environments, so multiple MDMs will need to be installed and configured."}, "correct": "C", "explanation": "Different phones will have different security postures, features, and control mechanisms. Some may require compensatory controls.", "source": "powerpoint", "source_label": "PPT Slide 168 (Communication and Network Security)"}, {"id": "ppt_169", "number": 169, "question": "A 100 terabyte storage area network (SAN) needs to be deployed at your organization to support future growth. Management has dictated that you will need to use ethernet switches to minimize the cost of the installation. Which of the options below would be the most suitable for this deployment?", "options": {"A": "Fibre Channel", "B": "iSCSI", "C": "OSPF", "D": "Infiniband"}, "correct": "B", "explanation": "-  A protocol that can go over Ethernet and is considered the cheap alternative to Fibre Channel. - Requires non-ethernet dedicated Fibre Channel switches - This is a routing protocol and has nothing to do with switches - Requires non-ethernet dedicated InfiniBand switches If it was an answer, another valid option would have been FCoE (Fibre Channel over Ethernet)", "source": "powerpoint", "source_label": "PPT Slide 169 (Communication and Network Security)"}, {"id": "ppt_170", "number": 170, "question": "An organization is worried that the SCADA network that controls the environmental systems could be compromised if the staff\u2019s WiFi network was breached. What would be the best option to mitigate this threat?", "options": {"A": "Install a smart meter of the staff WiFi.", "B": "Place the environmental systems in the same DHCP scope as the staff WiFi.", "C": "Implement Zigbee on the staff WiFi access points.", "D": "Segment the staff WiFi network from the environmental systems network."}, "correct": "D", "explanation": "We should isolate/separate/segment those networks!", "source": "powerpoint", "source_label": "PPT Slide 170 (Communication and Network Security)"}, {"id": "ppt_171", "number": 171, "question": "A company has maintained highly detailed records of all of their authorized network devices and is planning to use Wi-Fi for all laptops that need network access. What could replace a pre-shared key on an access point and stop a script kiddie from being able to brute force the password?", "options": {"A": "WPA2-BPDU", "B": "WPA-EAP", "C": "IP filtering", "D": "Wi-fi Protected Setup"}, "correct": "B", "explanation": "A BPDU is a type of message found in the Spanning Tree Protocol, and has nothing to do with Wi-Fi or WPA2. This is a distractor and is complete nonsense. Also known as enterprise mode, or 802.1x, this would require each user to have an unique username and password. With this replacing the pre-shared key mechanism, the script kiddie would have to know the username in addition to brute forcing the password, and that would most likely be outside the scope of their ability. Alternatively or additionally, the 802.1x system allows users to authenticate with TLS certificates, and we can be sure that no script kiddie could bypass that. Not a terrible answer, but this wouldn\u2019t \u201creplace\u201d a pre-shared key. Also, IP filtering isn\u2019t done on most access points. Instead they rely on MAC filtering! Wi-fi Protected Setup allows users to input an eight digit pin number found on the bottom of the access point, or press a button on the access point, to allow a device to connect WITHOUT putting in the password. This mechanism does not replace a pre-shared key and is entirely unrelated to it.", "source": "powerpoint", "source_label": "PPT Slide 171 (Communication and Network Security)"}, {"id": "ppt_172", "number": 172, "question": "An admin is deploying access points that will use PKI for authentication. What needs to be configured for this to work?", "options": {"A": "HTTPS Captive portal", "B": "WPS \u2013 Wi-fi protected setup", "C": "802.1x \u2013 Enterprise mode", "D": "PSK \u2013 Pre-Shared key"}, "correct": "C", "explanation": "Using PKI (certificates) to authenticate into the access point will require an AAA system (a RADIUS or TACACS server must be on the network and configured properly). This process is described in the standard 802.1x, and is also referred to as \u201centerprise authentication/mode\u201d.", "source": "powerpoint", "source_label": "PPT Slide 172 (Communication and Network Security)"}, {"id": "ppt_173", "number": 173, "question": "The OSI model starts with Application (layer 7) at the top and ends with Physical (layer 1) at the bottom. What is the correct order for the TCP/IP model, from top to bottom?", "options": {"A": "Application, Network, Data-link, Physical", "B": "Application, Presentation, Session, Transport", "C": "Application, Internet, Transport, Host Access", "D": "Application, Transport, Internet, Network Access"}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 173 (Communication and Network Security)"}, {"id": "ppt_174", "number": 174, "question": "What best describes the function of OSI layer 3?", "options": {"A": "Provides connectionless communication using logical \u000b     addresses", "B": "Provides error detection through the FCS for frames \u000b     transmitted", "C": "Provides sequencing and acknowledgments for connection-\u000b     oriented communications", "D": "Provides encryption and compression for the data received"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 174 (Communication and Network Security)"}, {"id": "ppt_175", "number": 175, "question": "A smart switch has the ability to monitor electrical levels and shut off power to a building in the event of a power surge or other similar situations. The switch was installed on a wired network in a local office and is monitored via a cloud application. The switch is already isolated on a separate VLAN and has an automatic patching routine. Which of the following steps should also be taken to harden the smart switch?", "options": {"A": "Set up an air gap for the switch.", "B": "Change the default password for the switch.", "C": "Place the switch in a Faraday cage.", "D": "Install a cable lock on the switch."}, "correct": "B", "explanation": "Hardening: configuring the device for least functionality and thereby increasing security.\u000b(Stop unnecessary services, close unnecessary ports, and change the default password) Air gapping the switch (A) would cut it off from the cloud application, so this seems like a bad idea. A faraday cage (C) is used to block wireless signals, and probably isn\u2019t very useful in this situation. A cable lock (D) will only help prevent against physical theft, and that isn\u2019t typically part of the hardening process, nor does the question indicate we are dealing with anything physical. (B) Remains by far our strongest answer.", "source": "powerpoint", "source_label": "PPT Slide 175 (Communication and Network Security)"}, {"id": "ppt_176", "number": 176, "question": "A computer on the company network was infected with malware and the user says they haven\u2019t used the device for anything but browsing the internet. They did not download anything or open any emails on the infected computer. Of the options below, what might help a technician find where the malware came from?", "options": {"A": "The DNS logs", "B": "The web server logs", "C": "The SIP traffic logs", "D": "The SNMP logs"}, "correct": "A", "explanation": "The DNS logs will reveal which websites the user went to.", "source": "powerpoint", "source_label": "PPT Slide 176 (Communication and Network Security)"}]}, "thursday": {"domain": "Domains 4, 5 & 6: Communication and Network Security / Identity and Access Management / Security Assessment and Testing", "pdf_count": 11, "ppt_count": 66, "count": 77, "pdf_questions": [{"id": "pdf_11", "number": 11, "question": "What physical characteristics does a retinal scan biometric device measure?", "options": {"A": "The amount of light reaching the retina", "B": "The amount of light reflected by the retina", "C": "The size, curvature, and shape of the retina", "D": "The pattern of blood vessels on the retina"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q11"}, {"id": "pdf_15", "number": 15, "question": "While evaluating the effectiveness of several new devices, the security professional should expect that a biometric device becomes more sensitive when", "options": {"A": "both the False Acceptance Rate (FAR) and False Rejection Rate (FRR) increase.", "B": "the FAR increases while the FRR decreases.", "C": "the FAR decreases while the FRR increases.", "D": "both the FAR and FRR decrease."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q15"}, {"id": "pdf_16", "number": 16, "question": "The point where the False Acceptance Rate (FAR) and False Rejection Rate (FRR) is balanced is known as the", "options": {"A": "Crossover Error Rate (CER).", "B": "Crossover Acceptance Rate (CAR).", "C": "Equal Crossover Rate (EQR).", "D": "Equal Acceptance Rate (EAR)."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q16"}, {"id": "pdf_22", "number": 22, "question": "What is one advantage of content-dependent access control of information?", "options": {"A": "It prevents data locking.", "B": "It limits the user\u2019s individual address space.", "C": "It provides highly granular control.", "D": "It confines access to authorized users of the system."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q22"}, {"id": "pdf_23", "number": 23, "question": "What is the GREATEST vulnerability of relying solely on proximity cards for access to a secure facility?", "options": {"A": "A lost or stolen card may allow an unauthorized person to gain access.", "B": "A proximity card is too easy to duplicate or forge.", "C": "A proximity card does not record time of departure.", "D": "An electrical power failure may deny access to all users."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q23"}, {"id": "pdf_48", "number": 48, "question": "What determines the correct classification of data in a Mandatory Access Control (MAC) environment?", "options": {"A": "The analysis of the users in conjunction with the audit department", "B": "The assessment by the information security department", "C": "The user\u2019s evaluation of a particular information element", "D": "The requirements of the organization\u2019s published security policy"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q48"}, {"id": "pdf_77", "number": 77, "question": "What is one disadvantage of content-dependent access control of information?", "options": {"A": "It increases processing overhead.", "B": "It requires additional password entry.", "C": "It exposes the system to data locking.", "D": "It limits the user\u2019s individual address space."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q77"}, {"id": "pdf_114", "number": 114, "question": "What is a PRIMARY reason for designing the security kernel to be as small as possible?", "options": {"A": "The operating system cannot be easily penetrated by users.", "B": "Changes to the kernel are not required as frequently.", "C": "Due to its compactness, the kernel is easier to formally verify.", "D": "System performance and execution are enhanced as the kernel is faster"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q114"}, {"id": "pdf_115", "number": 115, "question": "What should be the size of a Trusted Computer Base?", "options": {"A": "Small - in order to permit it to be implemented in all critical system components without using excessive resources", "B": "Small - in order to facilitate the detailed analysis necessary to prove that it meets design requirements", "C": "Large - in order to accommodate the implementation of future updates without incurring the time and expense of recertification", "D": "Large - in order to enable it to protect the potentially large number of resources in a typical commercial system environment"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q115"}, {"id": "pdf_116", "number": 116, "question": "Which one of the following refers to a series of characters used to verify a user\u2019s identity?", "options": {"A": "Token serial number", "B": "UserID", "C": "Password", "D": "Security ticket"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q116"}, {"id": "pdf_120", "number": 120, "question": "Which one of the following can be used to increase the authentication strength of an access control system?", "options": {"A": "Multi-party", "B": "Two factor", "C": "Mandatory", "D": "Discretionary"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q120"}], "ppt_questions": [{"id": "ppt_143", "number": 143, "question": "Management would like to use MAC filtering on all of the company access points. What consideration must be made before this is implemented?", "options": {"A": "Administrative overhead could become a problem as new devices are added to the enterprise", "B": "Employees would forget their MAC addresses and would need the IT department to reset them", "C": "The MAC address will reveal the vendor of the NIC", "D": "MAC addresses would need to be statically configured on all laptops and phones"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 143 (Communication and Network Security)"}, {"id": "ppt_144", "number": 144, "question": "Which of the following are the correct names for the Open Systems Interconnection (OSI) model layers 1, 6, 7, and 3?", "options": {"A": "Physical, application, presentation, and network", "B": "Data link, network, application, and session", "C": "Physical, data link, network, and application", "D": "Physical, presentation, application, and network"}, "correct": "D", "explanation": "The OSI MODEL\u000bLayer 7 - Application Layer 6 - Presentation Layer 5 - Session Layer 4 - Transport Layer 3 - Network Layer 2 - Data link Layer 1 - Physical", "source": "powerpoint", "source_label": "PPT Slide 144 (Communication and Network Security)"}, {"id": "ppt_145", "number": 145, "question": "Which of the following provides the best and most scalable access control for a corporate wireless network?", "options": {"A": "A Stateful firewall that also does Network Address Translation (NAT).", "B": "WPA2 Enterprise with IEEE 802.1x.", "C": "WPA2 Personal with long pre-shared keys.", "D": "A carefully monitored MAC filtering plan."}, "correct": "B", "explanation": "A Stateful firewall (A) does not provide access to a wireless network.  Pre-shared keys (C) are likely to be static, and can be brute-forced. Finally, MAC addresses (D) can be spoofed to easily bypass filtering. The best answer would be (B), as 802.1x could allow for everyone to have an unique username and password. Furthermore, it can support certificates which eliminates the threat of password attacks.", "source": "powerpoint", "source_label": "PPT Slide 145 (Communication and Network Security)"}, {"id": "ppt_146", "number": 146, "question": "Which statement BEST describes the functions of the data-link layer (DLL) and the presentation layer (PL)?", "options": {"A": "The DLL provides media access control and transmits signals as frames; the PL handles data formatting.", "B": "The DLL converts port numbers into signals; the PL handles data formatting.", "C": "The DLL provides framing; the PL converts bits into signals.", "D": "The DLL converts a network packet into signals; the PL converts an application packet into a datagram."}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 146 (Communication and Network Security)"}, {"id": "ppt_147", "number": 147, "question": "Which PKI component publishes the Certificate Revocation List (CRL)?", "options": {"A": "The Central Directory (CD)", "B": "The Registration Authority (RA)", "C": "The Certificate Authority (CA)", "D": "The Certificate Manager (CM)"}, "correct": "C", "explanation": "Answer (C) is correct.  The CA issues certificates and it also publishes the CRL.  The RA verifies the identity of users prior to issuing digital certificates.", "source": "powerpoint", "source_label": "PPT Slide 147 (Communication and Network Security)"}, {"id": "ppt_148", "number": 148, "question": "Which of the following technologies acted as a successor to Wired Equivalent Privacy (WEP) without requiring a change in hardware?", "options": {"A": "Wi-Fi Protected Access II (WPA2), and it used the Advanced Encryption Standard (AES).", "B": "Wi-Fi Protected Access II (WPA2), and it used the Temporal Key Integrity Protocol (TKIP).", "C": "Wi-Fi Protected Access (WPA) and it used the Temporal Key Integrity Protocol (TKIP).", "D": "Wi-Fi Protected Access (WPA) and it used the Advanced Encryption Sta
