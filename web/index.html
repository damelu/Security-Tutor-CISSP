e door, go through it, wait for the door to close, and then for authentication and authorization of some sort to be performed before the next door will open.  What is this solution called?", "options": {"A": "A double-door security system.", "B": "A mantrap system.", "C": "A trapdoor or backdoor System.", "D": "A Delayed Door system."}, "correct": "B", "explanation": "Sometimes also known as an access control vestibule or dead man doors.", "source": "powerpoint", "source_label": "PPT Slide 237 (Security Operations)"}, {"id": "ppt_238", "number": 238, "question": "Once an incident has happened, and the analysis has provided sufficient information, the next phase in getting the system back online is best described as __________.", "options": {"A": "Recovery.", "B": "Lessons learned.", "C": "Feedback.", "D": "Debriefing."}, "correct": "A", "explanation": "Since your system is not yet online, it is too early for Feedback, Discussing Lessons Learned and Debriefing, so Answers (B), (C), and (D) are incorrect.", "source": "powerpoint", "source_label": "PPT Slide 238 (Security Operations)"}, {"id": "ppt_239", "number": 239, "question": "An Intrusion Detection System (IDS) is examining network traffic to determine whether it matches a known attack. What would be the best way to describe this current system?", "options": {"A": "Protocol-anomaly-based system.", "B": "Signature-matching system.", "C": "Statistical-anomaly-based system.", "D": "Traffic-analysis system."}, "correct": "B", "explanation": "Note that the systems in the other answers can all find unknown attacks, whereas signature-matching systems can only find known attacks.", "source": "powerpoint", "source_label": "PPT Slide 239 (Security Operations)"}, {"id": "ppt_240", "number": 240, "question": "Which Intrusion Detection System (IDS) approach to determining network problems uses the behavioral characteristics of a system's operation or network traffic to determine whether monitored traffic represents a risk to the overall network?", "options": {"A": "Statistical Anomaly detection.", "B": "Enunciator control.", "C": "Signature analysis.", "D": "Pattern matching."}, "correct": "A", "explanation": "Answer (A) is correct. Enunciator control is about making sure the alerts can get to the management station, eliminating Answer (B). Signature analysis and pattern matching are only able to detect known attacks and don\u2019t use behavioral analysis.", "source": "powerpoint", "source_label": "PPT Slide 240 (Security Operations)"}, {"id": "ppt_241", "number": 241, "question": "Which of the following BEST describes a method for displaying an information item's classification, thereby also describing the ways in which that information should be handled?", "options": {"A": "Information Classification Assurance.", "B": "The Kerberos Ticket Granting Server\u2019s (TGS\u2019s) method of creating new service tickets.", "C": "Labeling and Marking.", "D": "A Penetration Testing Team providing an organization with a set of KPIs after it has completed its Penetration Test."}, "correct": "C", "explanation": "Answer (C) is correct.  Information Classification Assurance is a mysterious term, so it goes out as a distractor.  Certainly, Kerberos issues are not the correct answer.  Finally, although knowledge of PKIs are helpful after Pen Testing, this has nothing to do with the question.", "source": "powerpoint", "source_label": "PPT Slide 241 (Security Operations)"}, {"id": "ppt_242", "number": 242, "question": "Which digital technique is most typically used for hiding information inside another file?", "options": {"A": "Steganography.", "B": "Watermarking a document that uses internal Digital Rights protection.", "C": "Encrypting a document with a One-time Pad (OTP).", "D": "An digital artist painting a picture over another picture."}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 242 (Security Operations)"}, {"id": "ppt_243", "number": 243, "question": "Which of the following is most likely to make a facility an unattractive target for possible intruders?", "options": {"A": "CCTV systems inside and outside the buildings.", "B": "Large, roaming guard dogs and electrified fences.", "C": "Techniques that can detect body heat.", "D": "Coaxial strain-sensitive cables woven through a fence and loud alarm systems."}, "correct": "B", "explanation": "The question implies the idea of deterrence and although all of the detection mechanisms are likely deterrents, none of them will deter as strongly as the threat of bodily harm. (Deterrence is typically achieved through fear or shame.)", "source": "powerpoint", "source_label": "PPT Slide 243 (Security Operations)"}, {"id": "ppt_244", "number": 244, "question": "Validate the accuracy of phone numbers.", "options": {"A": "Use as training and awareness for team members.", "B": "Validate coordination and interaction to improve the likelihood of recovery.", "C": "Find out how long it takes to reach everyone.", "D": "What are the benefits of conducting a structured walkthrough exercise?"}, "correct": "B", "explanation": "1 and 4 2 and 3 1, 2, and 4 1, 2, and 3 Checking phone numbers is performed during the Desk Check test, which comes before the structured walkthrough. Thereby #1 is not going to be part of our answer. This eliminates Answers (A), (C), and (D).", "source": "powerpoint", "source_label": "PPT Slide 244 (Security Operations)"}, {"id": "ppt_245", "number": 245, "question": "Which of the following perimeter intrusion detection devices are designed specifically to detect body heat?", "options": {"A": "Active Infrared Sensors", "B": "Bi-Static Sensors", "C": "Time Domain Reflectometry (TDR) Sensors", "D": "Passive Infrared Sensors"}, "correct": "D", "explanation": "Answer (D) is correct. Passive Infrared sensors read changes in energy in the surrounding area, in other words, detect body heat. TDR sensors are for line breaks, etc. and Bi-Static sensors are used in RADAR systems. Active sensors emit one of three kinds of energy to identify motion in the surrounding area: infrared light, microwave radiation, or sound waves.", "source": "powerpoint", "source_label": "PPT Slide 245 (Security Operations)"}, {"id": "ppt_246", "number": 246, "question": "An analyst in the security operations center (SOC) has been asked to look through forensics artifacts, such as log entries, to see if they can find any evidence of malware, such as a keylogger or remote access trojan. What has the analyst been asked to look for?", "options": {"A": "Indicator of Compromise", "B": "Advanced Persistent Threats", "C": "Key Threat Indicators", "D": "Volatile evidence"}, "correct": "A", "explanation": "It sounds like the analyst is being asked to perform threat hunting and is looking for Indicators of Compromise. An IoC is an artifact observed on a network, operating system, or log that, with high confidence, indicates a computer intrusion. (B) Is too specific. We have been asked to look for evidence of malware. That evidence could manifest as IoCs. \u000b(C) and (D) are distractors. While Key RISK indicators are a thing, Key Threat Indicators is not a formal term.", "source": "powerpoint", "source_label": "PPT Slide 246 (Security Operations)"}, {"id": "ppt_247", "number": 247, "question": "What technology could be leveraged to perform statistical modeling on large volumes of data to better detect insider threats and anomalous activity generated by an advanced persistent threat (APT)?", "options": {"A": "Anomaly-based Intrusion Detection (AID)", "B": "User and Entity Behavior Analytics (UEBA)", "C": "Security Orchestration, Automation, and Response (SOAR)", "D": "System Info and Event Manager (SIEM)"}, "correct": "B", "explanation": "UEBA solutions look at patterns in human behavior and then apply statistical analysis to detect meaningful anomalies in those patterns. Then it reports the anomalies that indicate potential threats. While most platforms track devices or look for security events, UEBA tracks a system\u2019s users. This solution was specifically designed to detect threats that SIEMs, DLPs, and other similar platforms failed to realize. Several UEBA platforms rely on machine learning, so the more data you give them, the better they can be expected to perform.", "source": "powerpoint", "source_label": "PPT Slide 247 (Security Operations)"}, {"id": "ppt_248", "number": 248, "question": "Of the intelligence sources below, which should a security manager review that would give them the most proactive insight into understanding the types of threats that face their company?", "options": {"A": "Vulnerability feeds", "B": "Structured threat information expression", "C": "Industry information-sharing and collaboration groups", "D": "System info and event manager"}, "correct": "C", "explanation": "Vulnerability feeds only show software/hardware vulnerabilities. We want to know more about possible threats (who is going to attack us, not how), and for that we will want to find a threat researcher or info-sec news outlet that is related to our industry.\u000b(B) STIX \u2013 is a standardized XML format for conveying data about cybersecurity threats in a common language that can be easily understood by humans and security technologies. While it helps logically organize information, its not so much a source as it is a mechanism for delivering news. (C) ISAC \u2013 Industry specific groups for sharing detailed and current threat information. For example, www.FSISAC.com is specifically tailored to discussing the latest threats to the financial sector. (D) SIEM - used to aggregate logs from a wide range of devices and to alert admins if it detects a threat. While an admin could use the logs to perform threat hunting, that would only tell us about threats that have already targeted us (not a very proactive answer).", "source": "powerpoint", "source_label": "PPT Slide 248 (Security Operations)"}, {"id": "ppt_249", "number": 249, "question": "A public announcement is made about a newly discovered, rapidly spreading virus. The security team immediately updates and applies all its antivirus signatures. The security manager contacts the antivirus vendor support team to ask why one of the systems was infected. The vendor support team explains that the signature update is not available for this virus yet. Which of the following best describes the situation?", "options": {"A": "Race condition", "B": "End of life", "C": "Zero day", "D": "Control risk"}, "correct": "C", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 249 (Security Operations)"}, {"id": "ppt_250", "number": 250, "question": "Which type of RAID would allow for recovery even after two drive failures?", "options": {"A": "6", "B": "5", "C": "1", "D": "0"}, "correct": "A", "explanation": "RAID 6 can support two drive failures. RAID 1 and 5 can only support a single failure, while RAID 0 has no fault tolerance.", "source": "powerpoint", "source_label": "PPT Slide 250 (Security Operations)"}, {"id": "ppt_251", "number": 251, "question": "Of the options below, when would it be the best time to use a detective control instead of a preventative control?", "options": {"A": "A company implemented a network load balancer to ensure 99.999% availability of its web application.", "B": "A company designed a backup solution to increase the chances of restoring services in case of a natural disaster.", "C": "A company purchased an application-level firewall to isolate traffic between the accounting department and the information technology department.", "D": "A company purchased an IPS system, but after reviewing the requirements, the appliance was supposed to monitor, not block, any traffic."}, "correct": "D", "explanation": "All IPSs (intrusion prevention systems) can be set up to act as an IDSs (intrusion detection systems).", "source": "powerpoint", "source_label": "PPT Slide 251 (Security Operations)"}, {"id": "ppt_252", "number": 252, "question": "A worm infected a computer, and then spread to the network\u2019s file shares. All preventative measures failed to block or detect the worm and it has continued to evade detection. What could be used to protect the network from this elusive malware?", "options": {"A": "Install a definition-based antivirus.", "B": "Implement an NIDS (Network Intrusion Detection System).", "C": "Implement a heuristic behavior-detection solution.", "D": "Implement full disk encryption on all workstations"}, "correct": "C", "explanation": "Either the worm is a zero-day and there is no signature or patch for it, or the worm is polymorphic and thereby evading detection. Nevertheless, time for anomaly based (heuristics/behavior) solution.", "source": "powerpoint", "source_label": "PPT Slide 252 (Security Operations)"}, {"id": "ppt_253", "number": 253, "question": "To protect business operations during an incident, a manager has asked you to update the execution prevention rules to stop malware from spreading to critical systems. Which of the following incident response steps are you being asked to perform?", "options": {"A": "Investigation", "B": "Lessons learned", "C": "Containment", "D": "Recovery", "E": "Eradication"}, "correct": "C", "explanation": "Incident response process = PICERL Prepare Identify Contain Eradicate Recover Lessons-learned We are here.", "source": "powerpoint", "source_label": "PPT Slide 253 (Security Operations)"}, {"id": "ppt_254", "number": 254, "question": "An organizations e-commerce webpage is not allowed to be offline for more than five hours and they do not have a lot of available storage space. Of the backup strategies outlined below, which should the organization utilize to have low data-loss, allow for the FASTEST database restore time in the event of a failure, and still be mindful of the limited space?", "options": {"A": "Implement full tape backups every Sunday at 8:00 p.m. and perform nightly tape rotations.", "B": "Implement differential backups every Sunday at 8:00 p.m. and nightly incremental backups at 8:00 pm.", "C": "Implement nightly full backups every Sunday at 8:00 pm.", "D": "Implement full backups every Sunday at 8:00 pm. and nightly differential backups at 8:00 p.m."}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 254 (Security Operations)"}, {"id": "ppt_256", "number": 256, "question": "An organization is building an on-premise private cloud. As part of this project they intend to implement RAID (Redundant Array of Independent Disks) on several of the most important servers. What RAID level provides redundancy and fault tolerance, while maintaining read speeds even during a drive failure?", "options": {"A": "0", "B": "1", "C": "3", "D": "5"}, "correct": "B", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 256 (Security Operations)"}, {"id": "ppt_258", "number": 258, "question": "Which of the following describes combining non-sensitive data collected from separate database sources in order to access sensitive information?", "options": {"A": "Aggregation.", "B": "The ACID test.", "C": "Inference.", "D": "Polyinstantiation."}, "correct": "A", "explanation": "Answer (A) is correct.  The ACID test is a database test. Inference is the result of aggregation, therefore (C) is incorrect. Polyinstantiation occurs when items appear differently to people of different security levels (typically, people of different clearance levels).", "source": "powerpoint", "source_label": "PPT Slide 258 (Software Development Security)"}, {"id": "ppt_259", "number": 259, "question": "A piece of software transmits remotely across a network to a local system and executes there. What kind of software is this?", "options": {"A": "A worm.", "B": "A backdoor program.", "C": "Mobile code.", "D": "A logic bomb."}, "correct": "C", "explanation": "Mobile Code: Software programs or parts of programs obtained from remote systems, transmitted across a network, and executed on a local system without explicit installation or execution by the recipient. Examples of mobile codes include scripts downloaded over a network (for example JavaScript, VBScript), Java applets, ActiveX controls, Flash animations, and macros embedded within Microsoft Office documents.", "source": "powerpoint", "source_label": "PPT Slide 259 (Software Development Security)"}, {"id": "ppt_261", "number": 261, "question": "A malicious software attack that frequently requires human action to introduce and attaches itself to another program to facilitate replication and distribution is best described as what?", "options": {"A": "A Vishing Attack", "B": "A Worm Attack", "C": "A Logic Bomb Attack", "D": "A Virus Attack"}, "correct": "D", "explanation": "Answer (D) is correct.  Vishing is a social engineering attack. A worm does not need to attach itself to another program to spread, and a logic bomb usually does not replicate.", "source": "powerpoint", "source_label": "PPT Slide 261 (Software Development Security)"}, {"id": "ppt_262", "number": 262, "question": "Which answer below lists the SDLC phases in their proper order?", "options": {"A": "Gathering Requirements, Testing, System Specifications, System Development.", "B": "Testing, System Design, System Development, System Implementation.", "C": "Gathering Requirements, System Design, Testing, System Operation.", "D": "Gathering Requirements, System Design, System Specifications, and System development."}, "correct": "C", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 262 (Software Development Security)"}, {"id": "ppt_263", "number": 263, "question": "Budget\u00a0overruns", "options": {"A": "Schedule overruns", "B": "Introduction of Malware", "C": "User Intervention", "D": "Which two are the greatest problems for software development companies?"}, "correct": "A", "explanation": "1 and 2 2 and 4 3 and 4 1 and 4 Answer (A) is correct.  Malware comes later, and User Intervention is too strong a term, almost sounding like users are stopping development.", "source": "powerpoint", "source_label": "PPT Slide 263 (Software Development Security)"}, {"id": "ppt_264", "number": 264, "question": "Which answer best describes Software development methods?", "options": {"A": "The Spiral system preceded the Waterfall system.", "B": "The use of components is an advanced form of the Software reuse principle.", "C": "CASE tools are used to help project managers plan system development timeframes.", "D": "Fourth generation Languages use natural languages, such as English, to tell computer systems how to build computer code."}, "correct": "B", "explanation": "Answer (B) is correct.  Spiral followed waterfall, so Answer (A) is incorrect.  CASE tools are used by programmers and other groups to turn their graphical designs into code.  4GL languages use big code blocks to make building code faster, and are not English speech to direct computer code.", "source": "powerpoint", "source_label": "PPT Slide 264 (Software Development Security)"}, {"id": "ppt_265", "number": 265, "question": "Which statement about programming languages is most accurate?", "options": {"A": "Assembly language programs run very quickly and are easily portable to other systems.", "B": "Fortran, COBOL and C++ are considered Fourth Generation Languages.", "C": "Fortran, COBOL and C++ are considered Third Generation Languages.", "D": "Programs written in JavaScript expose less of their code for public viewing than those written in Visual Basic."}, "correct": "C", "explanation": "Assembly languages run quickly, but are not easily portable, so Answer (A) is incorrect.  Answer (B) is also incorrect, as Fortran, COBOL and C++ are considered 3rd Generation languages. JavaScript is a scripting language and exposes more code than VB, which is compiled to CIL (Common Intermediate Language), which is in turn compiled to native code by the JIT(Just in Time) compiler before execution.", "source": "powerpoint", "source_label": "PPT Slide 265 (Software Development Security)"}, {"id": "ppt_266", "number": 266, "question": "What is the most accurate about information and data stored at any organization?", "options": {"A": "It should be kept only as long as it is required.", "B": "Best practice suggests it should be archived for at least 7 years.", "C": "It should be erased when additional disk space is needed.", "D": "They should be annually archived to cheaper cloud storage alternatives."}, "correct": "A", "explanation": "Because a company sets its own archiving and data destruction policies, Answers (B) and (D) are likely out of line for many companies.  Answer (C) is obviously wrong, as it does not take into account appropriate data retention needs.", "source": "powerpoint", "source_label": "PPT Slide 266 (Software Development Security)"}, {"id": "ppt_267", "number": 267, "question": "A server has been successfully compromised by a threat actor who installed a ring zero rootkit. What is the only way to ensure the system is secure?", "options": {"A": "Implement multifactor authentication", "B": "Change the root password of the system", "C": "Remove the network interface card from the server", "D": "Rebuild the system from the original installation medium"}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 267 (Software Development Security)"}, {"id": "ppt_268", "number": 268, "question": "When purchasing proprietary software from a vendor, source code escrow can be used to protect against which of the following?", "options": {"A": "System data loss", "B": "Vendor bankruptcy", "C": "Copyright violations", "D": "Loss of Trade Secret"}, "correct": "B", "explanation": "Answer (B) is correct. Here, \u201csoftware escrow\u201d means a trusted 3rd party, who will (only) give you the source code if it\u2019s appropriate \u2013 such as if the vendor is not able to support it because they\u2019ve gone bankrupt. (A) is incorrect, because having the source code cannot help you with data loss. (C) and (D) are incorrect, as the intellectual property belongs to the vendor, not to you.", "source": "powerpoint", "source_label": "PPT Slide 268 (Software Development Security)"}, {"id": "ppt_270", "number": 270, "question": "Which SDLC phase is occurring when the source code has been generated and system test scenarios are fabricated and used?", "options": {"A": "Functional Requirements Definition", "B": "Development and Implementation", "C": "Documentation and Common Program Controls", "D": "System Design Specifications"}, "correct": "B", "explanation": "Functional requirements come before source code development, as do Documentation and System Design specifications.", "source": "powerpoint", "source_label": "PPT Slide 270 (Software Development Security)"}, {"id": "ppt_271", "number": 271, "question": "Which of the following describes management\u2019s decision that a system has an acceptable level of risk and can be put into production?", "options": {"A": "Requirements Testing Completion", "B": "Capacity Testing", "C": "Certification", "D": "Accreditation"}, "correct": "D", "explanation": "Answer (D) is correct, as this is the proper definition of Accreditation. Certification occurs before Accreditation, as should Capacity testing. Requirements Testing Completion is a distractor.", "source": "powerpoint", "source_label": "PPT Slide 271 (Software Development Security)"}, {"id": "ppt_272", "number": 272, "question": "Which type of backup system takes the most time in restoration?", "options": {"A": "Differential", "B": "Interdependent", "C": "Incremental", "D": "Full"}, "correct": "C", "explanation": "Incrementals take longest because you have to restore each incremental in proper order after first restoring a full backup. Differential systems restore faster because you only need to restore one of them after first restoring the full.  Interdependent is a distractor.", "source": "powerpoint", "source_label": "PPT Slide 272 (Software Development Security)"}, {"id": "ppt_273", "number": 273, "question": "Which of the following is most likely to be an insider attack?", "options": {"A": "Logic bomb", "B": "Worm", "C": "Virus", "D": "Trojan horse"}, "correct": "A", "explanation": "Answer (A) is correct.  A virus, worm or Trojan can contain a logic bomb, but a logic bomb is a piece of code that will set off a malicious function (such as deleting files) when specified conditions are met \u2013 after a particular time and date, or after a specific action is taken, for example. They are most frequently set by disgruntled employees, particularly ones who suspect they might be terminated. Trojans that are set to activate on a certain date are more frequently called \u201ctime bombs\u201d than \u201clogic bombs.\u201d", "source": "powerpoint", "source_label": "PPT Slide 273 (Software Development Security)"}, {"id": "ppt_274", "number": 274, "question": "A new system is being developed, and the development staff is aware that much of the data to be generated by this new system has genuine confidentiality and privacy concerns. At what point should the controls be designed?", "options": {"A": "At the initial project meetings.", "B": "As soon as the functional design phase commences.", "C": "At a point before the completed software is pushed to the end users.", "D": "Prior to the completion of the Security Accreditation phase."}, "correct": "B", "explanation": "Answer (B) is correct. Controls are designed as soon as the system is broken down into functional sections. Answer (A) is not right, as it is too early, and Answers (C) and (D) are too late.", "source": "powerpoint", "source_label": "PPT Slide 274 (Software Development Security)"}, {"id": "ppt_275", "number": 275, "question": "There are normally three stages in the product evaluation process. Which of the following is NOT true with respect to this process?", "options": {"A": "Certification and accreditation take place at different times.", "B": "Certification is formal acceptance, wherein management agrees that the product can be put into production.", "C": "The order of the three activities is evaluation, certification, and accreditation.", "D": "TCSEC, Common Criteria, and ITSEC were all developed to assist organizations in evaluating prospective products."}, "correct": "B", "explanation": "Answer (B) is the correct answer, as Accreditation, and not Certification, is the formal acceptance and management\u2019s decision to put a system into production.  The other items are all true evaluation concepts.", "source": "powerpoint", "source_label": "PPT Slide 275 (Software Development Security)"}, {"id": "ppt_276", "number": 276, "question": "Actions to be followed to rectify or mitigate the exposures.", "options": {"A": "How and when the new system will be deployed.", "B": "How to set the stages of deployment.", "C": "Whether anyone else found the same exposures.", "D": "Once a Security Practitioner has determined the potential exposures of a newly purchased system, he or she should consult with management and the system and data owners in order to determine:"}, "correct": "A", "explanation": "1 and 2 1 and 4 2 and 3 3 and 4", "source": "powerpoint", "source_label": "PPT Slide 276 (Software Development Security)"}, {"id": "ppt_277", "number": 277, "question": "A company is concerned about custom/targeted malware being injected into their IT systems via USB sticks or email. Of the options below, what is the company's best course of action to mitigate this specific threat?", "options": {"A": "Configure signature-based antivirus to update every 30 minutes", "B": "Fuzzing new files for vulnerabilities if they are not digitally signed", "C": "Implement application execution in a sandbox for unknown software", "D": "Enforcing S/MIME for email and automatically encrypting USB drives upon insertion"}, "correct": "C", "explanation": "Signature based antivirus will not stop CUSTOM malware.\u000b(B) Fuzzing is used to test input validation and will not help in this situation. (C) A reasonable answer. Any unknown applications are immediately sent to an isolated sandbox. (D) Encrypting the drives doesn\u2019t stop the malware from attempting to access the system.", "source": "powerpoint", "source_label": "PPT Slide 277 (Software Development Security)"}, {"id": "ppt_278", "number": 278, "question": "After the company\u2019s flagship software was compromised, management decided that they need to improve the security practices within their software development team. Without a deep understanding of the current security practices within the company\u2019s SDLC, of the options below, what would be the most helpful?", "options": {"A": "OWASP\u2019s SAMM", "B": "CIS Top 20", "C": "ISO\u2019s 27005", "D": "SOC1 Report"}, "correct": "A", "explanation": "20 best practices for defending against cyber threats An internationally recognized risk management framework Reports on the company\u2019s controls that safeguard financial reporting SAMM is an open framework developed by OWASP that is used to measure and improve an organizations security within the software development lifecycle. Software Assurance Maturity Model (explanation below)", "source": "powerpoint", "source_label": "PPT Slide 278 (Software Development Security)"}, {"id": "ppt_279", "number": 279, "question": "Which of these is incorrect?", "options": {"A": "SOAR (Security Orchestration Automation and Response) is a security solution that is designed to automatically respond and resolve minor security incidents on the network.", "B": "SAST (Static Application Security Testing) is used to secure software by analyzing the source code of an application while its is running in a test environment.", "C": "OWASP's SAMM (Software Assurance Maturity Model) is an open framework that allows developers to measure and improve security strategies that are implemented during the SSDLC.", "D": "IDE (Integrated Development Environment) is a software application that provides comprehensive facilities to computer programmers for software development."}, "correct": "B", "explanation": "SAST is for testing software in a non-running state. DAST (dynamic) is used to test running software.", "source": "powerpoint", "source_label": "PPT Slide 279 (Software Development Security)"}, {"id": "ppt_280", "number": 280, "question": "A document that appears to be malicious has been discovered in an email that was sent to a company\u2019s Chief Financial Officer (CFO). Which of the following would be BEST to allow a security analyst to gather and confirm it is a malicious document without executing any code it may contain?", "options": {"A": "Search for matching file hashes on malware websites.", "B": "Open the document on an air-gapped network.", "C": "View the document\u2019s metadata for origin clues.", "D": "Detonate the document in an analysis sandbox."}, "correct": "A", "explanation": "Detonation/execution of a file in a sandbox would give you the ability to analyze its behavior in a controlled environment, which is good. However, the question specifically told us NOT to execute any of the code, so that leaves us with (A).", "source": "powerpoint", "source_label": "PPT Slide 280 (Software Development Security)"}, {"id": "ppt_281", "number": 281, "question": "An investigation has revealed that the worm gained access to the company SQL server using well-known credentials. It then spread throughout the network and managed to infect over a dozen systems before it was contained. What is the best preventative measure the company could take to prevent this from happening again?", "options": {"A": "Air gap the SQL server from the network", "B": "Block all remote access services on the network gateway", "C": "Establish routine backups for all company servers", "D": "Change the default application password"}, "correct": "D", "explanation": "\u201cWell known credentials\u201d indicates we have a common/predictable/default password on our hands. We should change that password ASAP and then deploy IPS/antimalware tools.", "source": "powerpoint", "source_label": "PPT Slide 281 (Software Development Security)"}, {"id": "ppt_283", "number": 283, "question": "Several team members are collaborating on the same project. They bring their code together with an automation tool that also ensures that it is validated (tested) and tracked through version control. Of the options below, what most accurately describes this process?", "options": {"A": "Continuous monitoring", "B": "Continuous validation", "C": "Continuous integration", "D": "Continuous delivery"}, "correct": "C", "explanation": "Constant/automatic detection of security problems and service failures. Automatic compliance testing and frequent checks to ensure it meets design goals. Quickly applying changes, keep track of changes/versions, and constant testing. Consistent testing of infrastructure that supports the app, such as network. Word \u201cvalidate\u201d is there to throw you off. Continuous validation has to do with compliance and design goals. Continuous integration is more focused on multiple developers working in parallel.", "source": "powerpoint", "source_label": "PPT Slide 283 (Software Development Security)"}, {"id": "ppt_284", "number": 284, "question": "A company\u2019s Chief Information Officer (CIO) is meeting with the Chief Information Security Officer (CISO) to plan some activities to enhance the skill levels of the company\u2019s developers. Which of the following would be MOST suitable for training the developers?", "options": {"A": "A gamified capture-the-flag competition", "B": "A phishing simulation and awareness campaign", "C": "Physical security training with authorized pen-testers", "D": "Basic awareness training and tabletop exercises"}, "correct": "A", "explanation": "Capture the Flag (CTF) is usually used in ethical hacker training programs and gamified competitions. Participants must complete a series of challenges within a virtualized computing environment to discover a flag. The flag will represent either finding threat actor activity (for blue team exercises) or discovering a vulnerability (for red team exercises). Besides (A), none of the other options would enhance the \u201cSKILL LEVELS\u201d of the developers.", "source": "powerpoint", "source_label": "PPT Slide 284 (Software Development Security)"}]}};

        // Domain definitions
        const DOMAINS = {
            "Security and Risk Management": "D1",
            "Asset Security": "D2",
            "Security Architecture and Engineering": "D3",
            "Communication and Network Security": "D4",
            "Identity and Access Management": "D5",
            "Security Assessment and Testing": "D6",
            "Security Operations": "D7",
            "Software Development Security": "D8"
        };

        const DOMAIN_WEIGHTS = {
            "Security and Risk Management": 0.16,
            "Asset Security": 0.10,
            "Security Architecture and Engineering": 0.13,
            "Communication and Network Security": 0.13,
            "Identity and Access Management": 0.13,
            "Security Assessment and Testing": 0.12,
            "Security Operations": 0.13,
            "Software Development Security": 0.10
        };

        const BOOTCAMP_SCHEDULE = {
            monday: ["Security and Risk Management", "Asset Security"],
            tuesday: ["Security Architecture and Engineering"],
            wednesday: ["Security Architecture and Engineering", "Communication and Network Security"],
            thursday: ["Communication and Network Security", "Identity and Access Management", "Security Assessment and Testing"],
            friday: ["Security Operations", "Software Development Security"]
        };

        class CISSPStudyApp {
            constructor() {
                this.questions = [];
                this.currentQuiz = null;
                this.currentQuestionIndex = 0;
                this.quizAnswers = {};
                this.state = this.loadState();
                this.init();
            }

            init() {
                this.loadQuestions();
                this.setupEventListeners();
                this.renderDashboard();
                this.renderBootcampOptions();
                this.renderDomainCheckboxes();
                this.renderDifficultyCheckboxes();
                this.updateRewrongStatus();
                this.updateHistory();
            }

            loadState() {
                const saved = localStorage.getItem('cissp_state');
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('Failed to load state:', e);
                    }
                }
                return {
                    domainStats: {},
                    wrongAnswers: {},
                    quizHistory: [],
                    sessions: [],
                    totalAnswered: 0,
                    totalCorrect: 0,
                    streak: 0,
                    catLevels: {},
                    lastSessionDate: null,
                    lastSessionDomains: []
                };
            }

            saveState() {
                localStorage.setItem('cissp_state', JSON.stringify(this.state));
            }

            loadQuestions() {
                // Flatten all questions from the embedded data
                this.questions = [];
                for (const domain in QUESTIONS_DATA.domains) {
                    const domainData = QUESTIONS_DATA.domains[domain];
                    ['associate', 'professional', 'expert'].forEach(difficulty => {
                        if (domainData[difficulty]) {
                            domainData[difficulty].forEach(q => {
                                this.questions.push({
                                    ...q,
                                    domain,
                                    difficulty
                                });
                            });
                        }
                    });
                }
            }

            setupEventListeners() {
                // Tab switching
                document.querySelectorAll('.nav-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        const tabName = e.target.dataset.tab;
                        this.showTab(tabName);
                    });
                });

                // Bootcamp day selection
                document.getElementById('bootcampDay').addEventListener('change', (e) => {
                    document.getElementById('bootcampStartBtn').disabled = !e.target.value;
                    this.renderBootcampInfo(e.target.value);
                });

                // Export/Import
                document.getElementById('exportBtn').addEventListener('click', () => this.exportState());
                document.getElementById('importBtn').addEventListener('click', () => this.importState());
            }

            showTab(tabName) {
                // Hide all tabs
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                document.querySelectorAll('.nav-tab').forEach(tab => {
                    tab.classList.remove('active');
                });

                // Show selected tab
                document.getElementById(tabName + '-tab').classList.add('active');
                document.querySelector('[data-tab="' + tabName + '"]').classList.add('active');

                // Refresh tab content
                if (tabName === 'dashboard') this.renderDashboard();
                if (tabName === 'history') this.updateHistory();
                if (tabName === 'rewrong') this.updateRewrongStatus();
            }

            renderDashboard() {
                // Update stats
                document.getElementById('totalAnswered').textContent = this.state.totalAnswered;
                document.getElementById('totalCorrect').textContent = this.state.totalCorrect;
                const accuracy = this.state.totalAnswered > 0 
                    ? Math.round((this.state.totalCorrect / this.state.totalAnswered) * 100)
                    : 0;
                document.getElementById('overallAccuracy').textContent = accuracy + '%';

                // Render domain performance
                const domainPerf = document.getElementById('domainPerformance');
                domainPerf.innerHTML = '';
                
                for (const domain in DOMAINS) {
                    const stats = this.state.domainStats[domain] || { correct: 0, total: 0, byDifficulty: {} };
                    const catLevel = this.state.catLevels[domain] || 'associate';
                    const domainAccuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                    
                    const row = document.createElement('div');
                    row.className = 'domain-row';
                    row.innerHTML = '<div class="domain-name">' + domain + '</div>' +
                        '<div class="domain-bar">' +
                        '<div class="progress-bar">' +
                        '<div class="progress-fill" style="width: ' + domainAccuracy + '%"></div>' +
                        '</div>' +
                        '</div>' +
                        '<div class="domain-stats">' +
                        stats.correct + '/' + stats.total + ' (' + domainAccuracy + '%)' +
                        '<span class="cat-badge ' + catLevel + '">' + catLevel + '</span>' +
                        '</div>';
                    domainPerf.appendChild(row);
                }

                // Last session summary
                const lastSessionDiv = document.getElementById('lastSessionSummary');
                if (this.state.quizHistory.length > 0) {
                    const lastSession = this.state.quizHistory[this.state.quizHistory.length - 1];
                    lastSessionDiv.innerHTML = '<p><strong>Date:</strong> ' + new Date(lastSession.date).toLocaleDateString() + '</p>' +
                        '<p><strong>Score:</strong> ' + lastSession.score + '%</p>' +
                        '<p><strong>Questions:</strong> ' + lastSession.correct + '/' + lastSession.total + '</p>' +
                        '<p><strong>Domains:</strong> ' + lastSession.domains.join(', ') + '</p>' +
                        '<p><strong>Time:</strong> ' + Math.round(lastSession.elapsed / 60) + ' minutes</p>';
                } else {
                    lastSessionDiv.innerHTML = '<p class="text-muted">No sessions yet. Start a quiz to begin!</p>';
                }
            }

            renderBootcampOptions() {
                // Day selection is already in HTML
            }

            renderBootcampInfo(day) {
                const domainDiv = document.getElementById('bootcampInfo');
                const filterDiv = document.getElementById('bootcampSourceFilter');
                if (!day) {
                    domainDiv.innerHTML = '';
                    filterDiv.style.display = 'none';
                    return;
                }

                const hw = HOMEWORK_DATA[day];
                if (!hw) {
                    domainDiv.innerHTML = '<p class="text-muted">No homework data for this day.</p>';
                    filterDiv.style.display = 'none';
                    return;
                }
                let html = '<p><strong>' + hw.domain + '</strong></p>';
                html += '<p>' + hw.count + ' total questions from course materials.</p>';
                domainDiv.innerHTML = html;

                // Show source filter and update counts
                filterDiv.style.display = 'block';
                document.getElementById('hwPdfCount').textContent = hw.pdf_count;
                document.getElementById('hwPptCount').textContent = hw.ppt_count;
                this.updateHwCount();
            }

            renderDomainCheckboxes() {
                const container = document.getElementById('domainCheckboxes');
                let html = '';
                for (const domain in DOMAINS) {
                    html += '<label style="display: flex; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">' +
                        '<input type="checkbox" name="domain" value="' + domain + '" checked style="margin-right: 0.5rem;">' +
                        domain + ' (' + DOMAINS[domain] + ')' +
                        '</label>';
                }
                container.innerHTML = html;
            }

            renderDifficultyCheckboxes() {
                const container = document.getElementById('difficultyCheckboxes');
                const difficulties = ['associate', 'professional', 'expert'];
                let html = '';
                difficulties.forEach(d => {
                    const label = d.charAt(0).toUpperCase() + d.slice(1);
                    html += '<label style="display: flex; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">' +
                        '<input type="checkbox" name="difficulty" value="' + d + '" checked style="margin-right: 0.5rem;">' +
                        label +
                        '</label>';
                });
                container.innerHTML = html;
            }

            updateHwCount() {
                const day = document.getElementById('bootcampDay').value;
                if (!day) return;
                const hw = HOMEWORK_DATA[day];
                if (!hw) return;
                const sources = Array.from(document.querySelectorAll('input[name="hwSource"]:checked')).map(el => el.value);
                let count = 0;
                if (sources.includes('pdf')) count += hw.pdf_count;
                if (sources.includes('ppt')) count += hw.ppt_count;
                document.getElementById('hwTotalCount').textContent = count;
                document.getElementById('bootcampStartBtn').disabled = count === 0;
            }

            startBootcampQuiz() {
                const day = document.getElementById('bootcampDay').value;
                if (!day) return;

                const hw = HOMEWORK_DATA[day];
                if (!hw) {
                    alert('No homework data for this day');
                    return;
                }

                const sources = Array.from(document.querySelectorAll('input[name="hwSource"]:checked')).map(el => el.value);
                let allQuestions = [];

                // Add PDF questions
                if (sources.includes('pdf') && hw.pdf_questions) {
                    hw.pdf_questions.forEach(q => {
                        const opts = ['A) ' + q.options.A, 'B) ' + q.options.B, 'C) ' + q.options.C, 'D) ' + q.options.D];
                        allQuestions.push({
                            id: q.id,
                            number: q.number,
                            question: q.question,
                            options: opts,
                            correct: q.correct,
                            accept_also: q.accept_also || null,
                            domain: hw.domain,
                            difficulty: 'course',
                            source: 'practice-exam-pdf',
                            source_label: q.source_label,
                            isHomework: true
                        });
                    });
                }

                // Add PPT questions
                if (sources.includes('ppt') && hw.ppt_questions) {
                    hw.ppt_questions.forEach(q => {
                        const optKeys = Object.keys(q.options).sort();
                        const opts = optKeys.map(k => k + ') ' + q.options[k]);
                        allQuestions.push({
                            id: q.id,
                            number: q.number,
                            question: q.question,
                            options: opts,
                            correct: q.correct,
                            explanation: q.explanation || '',
                            domain: hw.domain,
                            difficulty: 'course',
                            source: 'powerpoint',
                            source_label: q.source_label,
                            isHomework: true
                        });
                    });
                }

                if (allQuestions.length === 0) {
                    alert('No questions selected. Check at least one source.');
                    return;
                }

                this.currentQuiz = {
                    mode: 'homework',
                    questions: allQuestions,
                    bootcampDay: day,
                    startTime: Date.now(),
                    domains: [hw.domain],
                    sessionPerformance: {},
                    domainAccuracy: {}
                };

                this.currentQuestionIndex = 0;
                this.quizAnswers = {};
                this.showQuestion();
                document.getElementById('quizModal').classList.add('active');
            }

            startCustomQuiz() {
                const selectedDomains = Array.from(document.querySelectorAll('input[name="domain"]:checked')).map(el => el.value);
                const selectedDifficulties = Array.from(document.querySelectorAll('input[name="difficulty"]:checked')).map(el => el.value);
                const count = parseInt(document.getElementById('questionCount').value);
                const mode = document.getElementById('quizMode').value;

                if (selectedDomains.length === 0 || selectedDifficulties.length === 0) {
                    alert('Please select at least one domain and difficulty level');
                    return;
                }

                this.startQuiz(selectedDomains, selectedDifficulties, count, mode, null);
            }

            startContinueQuiz() {
                // Continue from weakest domains
                const weakDomains = Object.entries(this.state.domainStats)
                    .sort((a, b) => {
                        const accA = a[1].total > 0 ? a[1].correct / a[1].total : 0;
                        const accB = b[1].total > 0 ? b[1].correct / b[1].total : 0;
                        return accA - accB;
                    })
                    .slice(0, 3)
                    .map(e => e[0]);

                const domains = weakDomains.length > 0 ? weakDomains : Object.keys(DOMAINS);
                this.startQuiz(domains, ['associate', 'professional', 'expert'], 20, 'weak-first', null);
            }

            startQuiz(domains, difficulties, count, mode, bootcampDay) {
                // Filter questions
                const filtered = this.questions.filter(q => 
                    domains.includes(q.domain) && difficulties.includes(q.difficulty)
                );

                if (filtered.length === 0) {
                    alert('No questions match your criteria');
                    return;
                }

                // Shuffle and limit
                const quizQuestions = this.shuffleArray(filtered).slice(0, Math.min(count, filtered.length));

                this.currentQuiz = {
                    questions: quizQuestions,
                    domains,
                    difficulties,
                    mode,
                    bootcampDay,
                    startTime: Date.now(),
                    sessionPerformance: {},
                    domainAccuracy: {}
                };

                this.currentQuestionIndex = 0;
                this.quizAnswers = {};
                this.showQuestion();

                // Hide modals and show quiz
                document.getElementById('quizModal').classList.add('active');
            }

            startReQuiz() {
                const selectedDomains = Array.from(document.querySelectorAll('input[name="rewrongDomain"]:checked')).map(el => el.value);
                const wrongIds = Object.keys(this.state.wrongAnswers).filter(id => {
                    const w = this.state.wrongAnswers[id];
                    return selectedDomains.includes(w.domain) && !w.mastered;
                });

                if (wrongIds.length === 0) {
                    alert('No unmastered wrong answers in the selected domains');
                    return;
                }

                // Shuffle so order varies each time
                for (let i = wrongIds.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [wrongIds[i], wrongIds[j]] = [wrongIds[j], wrongIds[i]];
                }

                this.currentQuiz = {
                    mode: 're-quiz',
                    startTime: Date.now(),
                    wrongIds
                };

                this.currentQuestionIndex = 0;
                this.quizAnswers = {};
                this.showQuestion();

                document.getElementById('quizModal').classList.add('active');
            }

            showQuestion() {
                const quiz = this.currentQuiz;
                const qIndex = this.currentQuestionIndex;

                let question;
                if (quiz.mode === 're-quiz') {
                    const wrongId = quiz.wrongIds[qIndex];
                    const wrongData = this.state.wrongAnswers[wrongId];
                    question = {
                        id: wrongId,
                        question: wrongData.question,
                        domain: wrongData.domain,
                        difficulty: wrongData.difficulty,
                        correct: wrongData.correct,
                        options: wrongData.options || [],
                        explanation: wrongData.explanation,
                        memory_hook: wrongData.memoryHook,
                        isReQuiz: true,
                        wrongData
                    };
                } else {
                    question = quiz.questions[qIndex];
                }

                const isLast = qIndex === (quiz.mode === 're-quiz' ? quiz.wrongIds.length - 1 : quiz.questions.length - 1);
                const progress = qIndex + 1;
                const total = quiz.mode === 're-quiz' ? quiz.wrongIds.length : quiz.questions.length;

                let html = '<div class="quiz-progress">' +
                    '<div class="progress-text">' +
                    '<span>Question ' + progress + ' of ' + total + '</span>' +
                    '<span class="progress-stats">' + (this.quizAnswers[qIndex] ? '✓ Answered' : 'Pending') + '</span>' +
                    '</div>' +
                    '<div class="progress-bar">' +
                    '<div class="progress-fill" style="width: ' + ((progress / total) * 100) + '%"></div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="question-card">' +
                    '<div class="question-header">' +
                    '<div><div class="question-number">' + (question.isHomework ? '#' + question.number : 'Q' + (qIndex + 1)) + '</div></div>' +
                    '<div class="question-meta">' +
                    '<span class="badge domain">' + (question.source_label || question.domain) + '</span>' +
                    '<span class="badge difficulty">' + (question.isHomework ? (question.source === 'powerpoint' ? 'PPT' : 'PDF') : question.difficulty) + '</span>' +
                    '</div>' +
                    '</div>' +
                    '<div class="question-text">' + question.question + '</div>' +
                    '<div class="options">';

                if (question.options && question.options.length > 0) {
                    // Shuffle options for re-quiz
                    const options = quiz.mode === 're-quiz' ? this.shuffleArray([...question.options]) : question.options;
                    
                    options.forEach((option, idx) => {
                        const isSelected = this.quizAnswers[qIndex] === option;
                        const selectedClass = isSelected ? 'selected' : '';
                        const escapedOption = option.replace(/'/g, "\\\'");
                        
                        html += '<label class="option ' + selectedClass + '">' +
                            '<input type="radio" name="answer_' + qIndex + '" value="' + escapedOption + '" onchange="app.selectAnswer(' + qIndex + ', \'' + escapedOption + '\')">' +
                            option +
                            '</label>';
                    });
                } else {
                    html += '<p class="text-muted">No options available for this question</p>';
                }

                html += '</div></div>' +
                    '<div class="flex gap-2" style="justify-content: space-between;">' +
                    '<div>' +
                    '<button class="btn btn-secondary" onclick="app.previousQuestion()" ' + (qIndex === 0 ? 'disabled' : '') + '>' +
                    'Previous' +
                    '</button>' +
                    '</div>' +
                    '<div>' +
                    '<button class="btn btn-primary" onclick="app.nextQuestion()" ' + (!this.quizAnswers[qIndex] ? 'disabled' : '') + '>' +
                    (isLast ? 'Finish' : 'Next') +
                    '</button>' +
                    '</div>' +
                    '</div>';

                document.getElementById('quizContent').innerHTML = html;
            }

            selectAnswer(qIndex, answer) {
                this.quizAnswers[qIndex] = answer;
            }

            nextQuestion() {
                const quiz = this.currentQuiz;
                const isLast = this.currentQuestionIndex === (quiz.mode === 're-quiz' ? quiz.wrongIds.length - 1 : quiz.questions.length - 1);

                if (isLast) {
                    this.finishQuiz();
                } else {
                    this.currentQuestionIndex++;
                    this.showQuestion();
                }
            }

            previousQuestion() {
                if (this.currentQuestionIndex > 0) {
                    this.currentQuestionIndex--;
                    this.showQuestion();
                }
            }

            finishQuiz() {
                const quiz = this.currentQuiz;
                const elapsed = Date.now() - quiz.startTime;
                let correct = 0;
                let wrongIds = [];

                if (quiz.mode === 're-quiz') {
                    quiz.wrongIds.forEach((wrongId, idx) => {
                        const wrongData = this.state.wrongAnswers[wrongId];
                        const userAnswer = this.quizAnswers[idx];
                        
                        if (userAnswer === wrongData.correct) {
                            correct++;
                            wrongData.mastered = true;
                            wrongData.timesAnsweredCorrect = (wrongData.timesAnsweredCorrect || 0) + 1;
                        } else {
                            wrongData.mastered = false;
                            wrongIds.push(wrongId);
                        }
                        wrongData.lastTested = new Date().toISOString().split('T')[0];
                        wrongData.timesWrong = (wrongData.timesWrong || 0) + 1;
                    });
                } else {
                    quiz.questions.forEach((question, idx) => {
                        const userAnswer = this.quizAnswers[idx];
                        const correctOption = question.options.find(o => o.startsWith(question.correct + ')'));

                        // Check if answer is correct (including accept_also for multi-answer questions)
                        let isCorrect = (userAnswer === correctOption);
                        if (!isCorrect && question.accept_also && userAnswer) {
                            const acceptLetters = question.accept_also.split(' or ').map(l => l.trim());
                            const userLetter = userAnswer.charAt(0);
                            isCorrect = acceptLetters.includes(userLetter);
                        }

                        if (isCorrect) {
                            correct++;
                        } else {
                            // Track wrong answer
                            const wrongId = (question.isHomework ? 'hw_' : 'web_') + question.id + '_' + Date.now();
                            this.state.wrongAnswers[wrongId] = {
                                id: wrongId,
                                question: question.question,
                                domain: question.domain,
                                difficulty: question.difficulty,
                                correct: correctOption,
                                options: question.options,
                                explanation: question.explanation || '',
                                memoryHook: question.memory_hook || '',
                                source: question.isHomework ? 'course-material' : 'web-quiz',
                                mastered: false,
                                timesWrong: 1,
                                lastTested: new Date().toISOString().split('T')[0]
                            };
                            wrongIds.push(wrongId);
                        }
                    });

                    // Update domain stats
                    quiz.domains.forEach(domain => {
                        if (!this.state.domainStats[domain]) {
                            this.state.domainStats[domain] = { correct: 0, total: 0, byDifficulty: {} };
                        }
                        const domainQuestions = quiz.questions.filter(q => q.domain === domain);
                        const domainCorrect = domainQuestions.filter(q => {
                            const correctOption = q.options.find(o => o.startsWith(q.correct + ')'));
                            const userAnswer = this.quizAnswers[quiz.questions.indexOf(q)];
                            let match = (userAnswer === correctOption);
                            if (!match && q.accept_also && userAnswer) {
                                const acceptLetters = q.accept_also.split(' or ').map(l => l.trim());
                                match = acceptLetters.includes(userAnswer.charAt(0));
                            }
                            return match;
                        }).length;

                        this.state.domainStats[domain].total += domainQuestions.length;
                        this.state.domainStats[domain].correct += domainCorrect;
                    });

                    // Update CAT levels
                    for (const domain in quiz.domainAccuracy) {
                        const acc = quiz.domainAccuracy[domain];
                        const accuracy = acc.total > 0 ? acc.correct / acc.total : 0;
                        
                        if (accuracy > 0.8) {
                            this.state.catLevels[domain] = 'expert';
                        } else if (accuracy > 0.6) {
                            this.state.catLevels[domain] = 'professional';
                        } else {
                            this.state.catLevels[domain] = 'associate';
                        }
                    }
                }

                const total = quiz.mode === 're-quiz' ? quiz.wrongIds.length : quiz.questions.length;
                const score = Math.round((correct / total) * 100);

                // Update global stats
                this.state.totalAnswered += total;
                this.state.totalCorrect += correct;

                // Add to history
                const historyEntry = {
                    date: new Date().toISOString(),
                    score,
                    correct,
                    total,
                    elapsed,
                    domains: quiz.domains || ['Re-Quiz'],
                    difficulties: quiz.difficulties || ['mixed'],
                    mode: quiz.mode
                };

                this.state.quizHistory.push(historyEntry);
                this.state.lastSessionDate = new Date().toISOString().split('T')[0];
                this.state.lastSessionDomains = quiz.domains || [];

                this.saveState();

                // Show results
                this.showResults(score, correct, total, elapsed, wrongIds);
            }

            showResults(score, correct, total, elapsed, wrongIds) {
                const minutes = Math.round(elapsed / 60000);
                let message = score >= 80 ? 'Excellent work!' : score >= 70 ? 'Good effort!' : score >= 60 ? 'Keep practicing!' : 'Study more and retry';
                
                let html = '<div class="results-container">' +
                    '<div class="results-score">' + score + '%</div>' +
                    '<div class="results-message">' + message + '</div>' +
                    '<div class="results-details">' +
                    '<div class="stat-card"><div class="stat-value">' + correct + '</div><div class="stat-label">Correct</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + (total - correct) + '</div><div class="stat-label">Incorrect</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + minutes + 'm</div><div class="stat-label">Time</div></div>' +
                    '</div>';

                if (wrongIds && wrongIds.length > 0) {
                    html += '<p class="text-muted">You have ' + wrongIds.length + ' question(s) to review. Use "Re-Quiz Wrong" tab to practice them again.</p>';
                } else {
                    html += '<p class="text-success" style="color: var(--success);">Perfect score! Congratulations!</p>';
                }
                html += '</div>';

                document.getElementById('resultsContent').innerHTML = html;
                document.getElementById('quizModal').classList.remove('active');
                document.getElementById('resultsModal').classList.add('active');
            }

            updateRewrongStatus() {
                const wrongIds = Object.keys(this.state.wrongAnswers);
                const container = document.getElementById('rewrongStatus');
                const filterDiv = document.getElementById('rewrongDomainFilter');
                const checkboxDiv = document.getElementById('rewrongDomainCheckboxes');

                if (wrongIds.length === 0) {
                    container.innerHTML = '<p class="text-muted">No wrong answers yet. Complete a quiz first!</p>';
                    document.getElementById('rewrongStartBtn').disabled = true;
                    filterDiv.style.display = 'none';
                    return;
                }

                const unmastered = wrongIds.filter(id => !this.state.wrongAnswers[id].mastered);
                const mastered = wrongIds.length - unmastered.length;

                // Build domain breakdown from wrong answers
                const domainCounts = {};
                const domainUnmastered = {};
                wrongIds.forEach(id => {
                    const w = this.state.wrongAnswers[id];
                    const d = w.domain || 'Unknown';
                    domainCounts[d] = (domainCounts[d] || 0) + 1;
                    if (!w.mastered) {
                        domainUnmastered[d] = (domainUnmastered[d] || 0) + 1;
                    }
                });

                container.innerHTML = '<p><strong>Total Wrong Answers:</strong> ' + wrongIds.length + '</p>' +
                    '<p><strong>Still Learning:</strong> ' + unmastered.length + '</p>' +
                    '<p><strong>Mastered:</strong> ' + mastered + '</p>';

                // Render domain checkboxes with counts
                filterDiv.style.display = 'block';
                let cbHtml = '';
                const sortedDomains = Object.keys(domainCounts).sort((a, b) => (domainUnmastered[b] || 0) - (domainUnmastered[a] || 0));
                sortedDomains.forEach(domain => {
                    const total = domainCounts[domain];
                    const still = domainUnmastered[domain] || 0;
                    const pct = Math.round((still / total) * 100);
                    const barColor = pct > 60 ? 'var(--danger)' : pct > 30 ? 'var(--warning)' : 'var(--success)';
                    cbHtml += '<label style="display: flex; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">' +
                        '<input type="checkbox" name="rewrongDomain" value="' + domain + '" checked onchange="app.updateRewrongCount()" style="margin-right: 0.5rem;">' +
                        '<span style="flex: 1;">' + domain + '</span>' +
                        '<span style="display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">' +
                        '<span style="width: 60px; height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden;">' +
                        '<span style="display:block; width:' + pct + '%; height:100%; background:' + barColor + ';"></span></span>' +
                        still + ' of ' + total + ' unmastered</span>' +
                        '</label>';
                });
                checkboxDiv.innerHTML = cbHtml;

                this.rewrongAutoSelect();
                this.updateRewrongCount();
            }

            rewrongSelectAll(checked) {
                document.querySelectorAll('input[name="rewrongDomain"]').forEach(cb => cb.checked = checked);
                this.updateRewrongCount();
            }

            rewrongAutoSelect() {
                // Auto-select domains with the most unmastered wrong answers
                const wrongIds = Object.keys(this.state.wrongAnswers);
                const domainUnmastered = {};
                wrongIds.forEach(id => {
                    const w = this.state.wrongAnswers[id];
                    if (!w.mastered) {
                        const d = w.domain || 'Unknown';
                        domainUnmastered[d] = (domainUnmastered[d] || 0) + 1;
                    }
                });

                // Select domains that have at least 1 unmastered, prioritize those with most
                const sorted = Object.entries(domainUnmastered).sort((a, b) => b[1] - a[1]);
                const topDomains = sorted.filter(([d, count]) => count > 0).map(([d]) => d);

                document.querySelectorAll('input[name="rewrongDomain"]').forEach(cb => {
                    cb.checked = topDomains.includes(cb.value);
                });
                this.updateRewrongCount();
            }

            updateRewrongCount() {
                const selectedDomains = Array.from(document.querySelectorAll('input[name="rewrongDomain"]:checked')).map(el => el.value);
                const wrongIds = Object.keys(this.state.wrongAnswers).filter(id => {
                    const w = this.state.wrongAnswers[id];
                    return selectedDomains.includes(w.domain) && !w.mastered;
                });
                document.getElementById('rewrongCount').textContent = wrongIds.length;
                document.getElementById('rewrongStartBtn').disabled = wrongIds.length === 0;
            }

            importBank() {
                const content = document.getElementById('bankInput').value;
                const regex = /### Q(\d+) \| Domain (\d+) \|.*?\*\*Question:\*\*\s*(.+?)\n.*?\*\*Correct Answer:\*\*\s*(.+?)\n.*?\*\*Concept:\*\*\s*(.+?)\n.*?\*\*Why Wrong:\*\*\s*(.+?)\n.*?\*\*Memory Hook:\*\*\s*(.+?)\n/gs;

                let match;
                let imported = 0;
                while ((match = regex.exec(content)) !== null) {
                    const qNumber = match[1];
                    const domain = parseInt(match[2]);
                    const question = match[3].trim();
                    const correctAnswer = match[4].trim();
                    const concept = match[5].trim();
                    const whyWrong = match[6].trim();
                    const memoryHook = match[7].trim();

                    const domainNames = Object.keys(DOMAINS);
                    const domainName = domainNames[domain - 1];
                    const wrongId = 'bank_' + qNumber + '_' + domain;

                    if (!this.state.wrongAnswers[wrongId]) {
                        this.state.wrongAnswers[wrongId] = {
                            id: wrongId,
                            question,
                            domain: domainName || 'Unknown',
                            difficulty: 'professional',
                            correct: correctAnswer,
                            options: [],
                            explanation: whyWrong,
                            memoryHook,
                            source: 'bank',
                            mastered: false,
                            timesWrong: 1,
                            lastTested: new Date().toISOString().split('T')[0]
                        };
                        imported++;
                    }
                }

                this.saveState();
                document.getElementById('bankStatus').innerHTML = '<p style="color: var(--success); margin-top: 1rem;">✓ Imported ' + imported + ' question(s) from WRONG-ANSWER-BANK.md</p>';

                setTimeout(() => {
                    document.getElementById('bankInput').value = '';
                    document.getElementById('bankStatus').innerHTML = '';
                }, 3000);
            }

            updateHistory() {
                const container = document.getElementById('historyContent');
                
                if (this.state.quizHistory.length === 0) {
                    container.innerHTML = '<p class="text-muted">No quiz history yet.</p>';
                    return;
                }

                let html = '';
                const reversed = [...this.state.quizHistory].reverse();
                reversed.forEach(entry => {
                    const date = new Date(entry.date);
                    const dateStr = date.toLocaleDateString();
                    const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    html += '<div class="history-row">' +
                        '<div class="history-date">' + dateStr + '</div>' +
                        '<div class="history-score">' + entry.score + '%</div>' +
                        '<div class="text-muted">' + entry.correct + '/' + entry.total + '</div>' +
                        '<div class="text-muted">' + entry.domains.join(', ') + '</div>' +
                        '<div class="text-muted">' + timeStr + '</div>' +
                        '</div>';
                });

                container.innerHTML = html;
            }

            exportSessionResults() {
                const lastSession = this.state.quizHistory[this.state.quizHistory.length - 1];
                if (!lastSession) return;

                const wrongAnswersForSession = Object.values(this.state.wrongAnswers)
                    .filter(w => w.source === 'web-quiz' && w.lastTested === new Date().toISOString().split('T')[0])
                    .slice(-lastSession.total + lastSession.correct);

                let markdown = '## ' + new Date().toLocaleDateString() + ' — Domains ' + lastSession.domains.join(', ') + '\n';
                markdown += '<!-- Generated: ' + new Date().toLocaleDateString() + ' | Entries: ' + wrongAnswersForSession.length + ' | Domains: ' + lastSession.domains.join(', ') + ' -->\n\n';

                wrongAnswersForSession.forEach(w => {
                    markdown += '### Q | ' + DOMAINS[w.domain] + '\n';
                    markdown += '**Question:** ' + w.question + '\n';
                    markdown += '**Correct Answer:** ' + w.correct + '\n';
                    markdown += '**Difficulty:** ' + w.difficulty + '\n';
                    markdown += '**Concept:** [concept]\n';
                    markdown += '**Why Wrong:** ' + w.explanation + '\n';
                    markdown += '**Memory Hook:** ' + (w.memoryHook || '[Your memory hook]') + '\n';
                    markdown += '**Mastered:** No\n';
                    markdown += '**Times Wrong:** 1\n';
                    markdown += '**Last Tested:** ' + new Date().toISOString().split('T')[0] + '\n\n';
                });

                this.showExportModal(markdown);
            }

            showExportModal(content) {
                const modal = document.createElement('div');
                modal.className = 'modal active';
                modal.innerHTML = '<div class="modal-content">' +
                    '<h2>Export Results for WRONG-ANSWER-BANK.md</h2>' +
                    '<div class="code-block" style="position: relative; margin: 1rem 0;">' +
                    '<button class="copy-btn" onclick="this.textContent=\'Copied!\'; setTimeout(() => this.textContent=\'Copy\', 2000); navigator.clipboard.writeText(document.querySelector(\'.code-content\').textContent)">Copy</button>' +
                    '<div class="code-content">' + content + '</div>' +
                    '</div>' +
                    '<div class="modal-footer">' +
                    '<button class="btn btn-secondary" onclick="this.closest(\'.modal\').remove()">Close</button>' +
                    '</div>' +
                    '</div>';
                document.body.appendChild(modal);
            }

            exportState() {
                const data = JSON.stringify(this.state, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'cissp-state-' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
            }

            importState() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const imported = JSON.parse(event.target.result);
                            this.state = Object.assign({}, this.state, imported);
                            this.saveState();
                            alert('State imported successfully!');
                            location.reload();
                        } catch (error) {
                            alert('Failed to import state: ' + error.message);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            closeModal() {
                document.getElementById('quizModal').classList.remove('active');
                document.getElementById('resultsModal').classList.remove('active');
            }

            shuffleArray(arr) {
                const shuffled = [...arr];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const temp = shuffled[i];
                    shuffled[i] = shuffled[j];
                    shuffled[j] = temp;
                }
                return shuffled;
            }
        }

        // Initialize app
        const app = new CISSPStudyApp();

        // Close modals on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                app.closeModal();
            }
        });
    </script>
</body>
</html>
