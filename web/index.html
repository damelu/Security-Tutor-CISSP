ndard (AES)."}, "correct": "C", "explanation": "The IEEE standards were WEP, then WPA, then WPA2.  The TKIP was first used with WPA and AES was first used in WPA2. WPA2\u2019s support of AES required a change to the hardware.", "source": "powerpoint", "source_label": "PPT Slide 148 (Communication and Network Security)"}, {"id": "ppt_151", "number": 151, "question": "If you used a system that included Network Intrusion Detection (NIDS), Host Intrusion Detection (HIDS), and Host Intrusion Prevention (HIPS) capabilities, which of the following would be MOST difficult to successfully monitor?", "options": {"A": "Web server traffic using the HIDS on the Web Server.", "B": "Database server traffic using the HIPS on the Database server.", "C": "Incoming E-Commerce traffic using the NIDS on the corporate DMZ.", "D": "Outgoing Telnet and FTP traffic using the NIDS within the DMZ."}, "correct": "C", "explanation": "Network devices will have difficulties inspecting encrypted traffic. While (C) doesn\u2019t say its encrypted, its safe to assume it is as TLS1.2 is a requirement for PCI-DSS.", "source": "powerpoint", "source_label": "PPT Slide 151 (Communication and Network Security)"}, {"id": "ppt_152", "number": 152, "question": "What is the MAIN security advantage of installing website control filters to block sites such as Facebook, or fantasy sports sites?", "options": {"A": "Making your employees more productive since they are not wasting time on the blocked social networking sites.", "B": "Deterring employees from betting on sports events.", "C": "Stopping leakage of personal information.", "D": "Avoiding malware."}, "correct": "D", "explanation": "Answers (A) and (B) are concerns for HR or management, and aren\u2019t strongly tied to the security that a web filter provides. While (C) isn\u2019t terrible, the company probably doesn\u2019t care about an employee leaking their personal information. Furthermore, a DLP would be best suited to this task. Answer (D) is correct. By avoiding those websites we greatly reduce the risk of malware.", "source": "powerpoint", "source_label": "PPT Slide 152 (Communication and Network Security)"}, {"id": "ppt_153", "number": 153, "question": "Your company has a border router/firewall to connect its network to the Internet. It also has a 64-port switch to connect all your internal users and printers. To isolate your general users from seeing the normal, but sensitive, traffic among Human Resources (HR) employees, you place the HR employees into a separate VLAN. What risks remain with the use of the VLAN?", "options": {"A": "None, the data is encrypted.", "B": "None, the data being communication is air gapped.", "C": "The HR data might be exposed through VLAN leaking.", "D": "The HR data might be exposed through a denial of service."}, "correct": "C", "explanation": "802.1Q and Inter-Switch Link Protocol (ISL) Tagging Attacks allow a user on a VLAN to get unauthorized access to another VLAN. This is commonly referred to as \u201cVLAN leaking.\u201d", "source": "powerpoint", "source_label": "PPT Slide 153 (Communication and Network Security)"}, {"id": "ppt_154", "number": 154, "question": "What routing technique allows multiple devices to share the same IPv6 address while routing packets to the nearest host?", "options": {"A": "Unicast", "B": "Broadcast", "C": "Multicast", "D": "Anycast"}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 154 (Communication and Network Security)"}, {"id": "ppt_155", "number": 155, "question": "To contain an ongoing incident where your E-mail server is being attacked, which answer is BEST?", "options": {"A": "Disconnect the E-mail server from the network.", "B": "Use network segmentation to isolate the E-mail server.", "C": "Put new and tighter E-mail filtering  rules into your firewall.", "D": "Put more specific E-mail rules into your border router."}, "correct": "A", "explanation": "When an important server, such as an Email server with lots of sensitive information, is being attacked, you need to work fast.  Disconnecting it from the network is the best way.  The other ways will take too much time.", "source": "powerpoint", "source_label": "PPT Slide 155 (Communication and Network Security)"}, {"id": "ppt_156", "number": 156, "question": "A hacker sniffs network traffic and then uses a faked IP address and TCP header information to insert packets onto the network.  Of the options below, what best illustrates this attack?", "options": {"A": "IP Spoofing", "B": "Session hijacking", "C": "Fraggle", "D": "Smurf"}, "correct": "B", "explanation": "This is the classic definition of Session Hijacking.  IP spoofing doesn\u2019t typically include the TCP header and Fraggle and Smurf attacks certainly don\u2019t.", "source": "powerpoint", "source_label": "PPT Slide 156 (Communication and Network Security)"}, {"id": "ppt_157", "number": 157, "question": "An unknown threat actor added a rogue Certificate Authority (CA) to your Public Key Infrastructure (PKI) cache. How would your web browser react?", "options": {"A": "Not trust any of the certificates the rogue CA had signed.", "B": "Always prompt you to reject it, as the rogue CA\u2019s certificate is in your browser\u2019s cache.", "C": "Always trust any certificate the rogue CA had previously signed.", "D": "Not cause any harm, as rogue CAs aren\u2019t effective."}, "correct": "C", "explanation": "Once a CA is in your PKI cache (normally in your browser), any Certificates that the rogue CA has signed will be trusted.", "source": "powerpoint", "source_label": "PPT Slide 157 (Communication and Network Security)"}, {"id": "ppt_158", "number": 158, "question": "Which attack uses options in the \u201cping\u201d command to create a denial-of-service attack?", "options": {"A": "An Overlapping fragment attack.", "B": "The Fraggle attack.", "C": "The Smurf attack.", "D": "The Double Teardrop attack."}, "correct": "C", "explanation": "They are describing a Smurf attack! This attack uses ping (ICMP echo replies) to overwhelm a target and cause a DoS. Fraggle is similar but it uses UDP messages instead of ICMP. Answers (A) and (D) are fragmentation attacks.", "source": "powerpoint", "source_label": "PPT Slide 158 (Communication and Network Security)"}, {"id": "ppt_159", "number": 159, "question": "As the result of a business merger, a root certificate authority from company A and a root certificate authority from company B need to be configured so that they will trust certificates generated by each other. Of the options below would best describe this process?", "options": {"A": "Subordinate CA to Subordinate CA Trust.", "B": "Cross-certification.", "C": "RA to RA Cooperation.", "D": "Certificate Authority Reciprocity."}, "correct": "B", "explanation": "Everything except (B) is complete nonsense.", "source": "powerpoint", "source_label": "PPT Slide 159 (Communication and Network Security)"}, {"id": "ppt_160", "number": 160, "question": "Which list contains one IP Networking port number in the \u201cWell known\u201d range, one in the \u201cRegistered\u201d range, and one in the \u201cDynamic\u201d range?", "options": {"A": "69         1007      and      50001", "B": "1443     8080     and      49152", "C": "23         80          and      1443", "D": "809       1812     and      53652"}, "correct": "D", "explanation": "Well known -- 0 to 1,023;   \u000bRegistered -- 1,024 to 49,151, \u000bDynamic/ephemeral --  49,152 to 65,535.", "source": "powerpoint", "source_label": "PPT Slide 160 (Communication and Network Security)"}, {"id": "ppt_161", "number": 161, "question": "What application layer device provides translation services for different environments?", "options": {"A": "A Voice over IP (VOIP) to Plain old Telephone Service (POTS) gateway.", "B": "An Ethernet to Token Ring bridge.", "C": "An ASCII to EBCDIC gateway.", "D": "A Router connecting two different LAN segments."}, "correct": "A", "explanation": "Since VOIP is an Layer 7 (Application), VOIP to POTS is application-layer translation. - Layer 2 (data link) - Layer 6 (presentation) - Layer 3 (network)", "source": "powerpoint", "source_label": "PPT Slide 161 (Communication and Network Security)"}, {"id": "ppt_162", "number": 162, "question": "Which statement below BEST describes the purpose of a Software Defined Network?", "options": {"A": "It is used to separate traditional network traffic into three components: raw data, the way in which the data are sent, and the purpose the data serve.", "B": "It is used to provide redundancy in cloud environments.", "C": "It abstracts network traffic into three layers which are called Application, Communications, and Interface.", "D": "It creatively uses TCP/IP networking standards to move data over different paths."}, "correct": "A", "explanation": "Answer (A) is the most accurate. \u000b(B) A SDN provides many things to cloud environments, not just redundancy.  (C) is wrong because the middle layer is called Control, not Communications. (D) does not really describe a SDN.", "source": "powerpoint", "source_label": "PPT Slide 162 (Communication and Network Security)"}, {"id": "ppt_163", "number": 163, "question": "Which statement BEST describes the differences among  different network cabling media?", "options": {"A": "Coaxial cable has more environmental protection than Shielded Twisted Pair (STP)", "B": "Twisted pair copper cabling comes in two modes, Unshielded Twisted Pair (UTP) and Shielded Twisted Pair (STP).", "C": "Fiber Optic cabling comes in two modes, single-mode and multi-mode.", "D": "Shielded Twisted Pair (STP) is more resistant to EMI than fiberoptic cables."}, "correct": "A", "explanation": "Answer (A) is correct, as it correctly compared different types of cabling media.  Answers (B) and (C) are wrong because they do not compare different types of media, but are otherwise accurate. Answer (D) is completely incorrect as fiberoptic is immune to EMI.", "source": "powerpoint", "source_label": "PPT Slide 163 (Communication and Network Security)"}, {"id": "ppt_164", "number": 164, "question": "Which of the following uses the User Datagram Protocol (UDP) to create a denial-of-service attack?", "options": {"A": "A Session Hijacking attack.", "B": "The Double Teardrop attack.", "C": "The Fraggle attack.", "D": "The Smurf attack."}, "correct": "C", "explanation": "The Fraggle attack uses UDP messages to cause a DoS. \u000bSession Hijacking is a layer 5 TCP attack. Smurf uses ICMP, and a Teardrop is a fragmentation attack (layer 3).", "source": "powerpoint", "source_label": "PPT Slide 164 (Communication and Network Security)"}, {"id": "ppt_165", "number": 165, "question": "Which are true regarding Software Defined Networks? (pick two)", "options": {"A": "Decouple the control and data planes, logically centralize network intelligence and state, and abstract the infrastructure from the applications.", "B": "Separate traditional network traffic into two areas: Clear-Text and Covered-Data.", "C": "Separate traditional network traffic into three components: raw data, how the data is sent, and what purpose the data serves.", "D": "Map the data into two planes, usually called the infrastructure and communications planes.", "E": "It abstracts policy from the actual device configuration to create new software profiles."}, "correct": "A", "explanation": "(B) is nonsense. (D) SDNs map into 3 planes, not two. (E) is backwards, as policy comes from the software and not the devices.", "source": "powerpoint", "source_label": "PPT Slide 165 (Communication and Network Security)"}, {"id": "ppt_166", "number": 166, "question": "Which of the following best describes IPSEC?", "options": {"A": "A protocol used by virtual private networks (VPNs) that can both tunnel and encrypt.", "B": "A protocol used by local area networks (LANs) that can both tunnel and encrypt.", "C": "A local area network (LAN) protocol that can encrypt but not tunnel.", "D": "A virtual private network (VPN) protocol that can only Tunnel."}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 166 (Communication and Network Security)"}, {"id": "ppt_168", "number": 168, "question": "A company has decided to adopt the CYOD (choose your own device) deployment model, where the company allows the employee to choose from a range of cellular devices. Considering this deployment model, what should the security team consider before the phones are deployed?", "options": {"A": "The most common set of MDM configurations will become the effective set of enterprise mobile security controls.", "B": "All devices will need to support SCEP-based enrollment; therefore, the heterogeneity of the chosen architecture may unnecessarily expose private keys to adversaries.", "C": "Certain devices are inherently less secure than others, so compensatory controls will be needed to address the delta between device vendors.", "D": "MDMs typically will not support heterogeneous deployment environments, so multiple MDMs will need to be installed and configured."}, "correct": "C", "explanation": "Different phones will have different security postures, features, and control mechanisms. Some may require compensatory controls.", "source": "powerpoint", "source_label": "PPT Slide 168 (Communication and Network Security)"}, {"id": "ppt_169", "number": 169, "question": "A 100 terabyte storage area network (SAN) needs to be deployed at your organization to support future growth. Management has dictated that you will need to use ethernet switches to minimize the cost of the installation. Which of the options below would be the most suitable for this deployment?", "options": {"A": "Fibre Channel", "B": "iSCSI", "C": "OSPF", "D": "Infiniband"}, "correct": "B", "explanation": "-  A protocol that can go over Ethernet and is considered the cheap alternative to Fibre Channel. - Requires non-ethernet dedicated Fibre Channel switches - This is a routing protocol and has nothing to do with switches - Requires non-ethernet dedicated InfiniBand switches If it was an answer, another valid option would have been FCoE (Fibre Channel over Ethernet)", "source": "powerpoint", "source_label": "PPT Slide 169 (Communication and Network Security)"}, {"id": "ppt_170", "number": 170, "question": "An organization is worried that the SCADA network that controls the environmental systems could be compromised if the staff\u2019s WiFi network was breached. What would be the best option to mitigate this threat?", "options": {"A": "Install a smart meter of the staff WiFi.", "B": "Place the environmental systems in the same DHCP scope as the staff WiFi.", "C": "Implement Zigbee on the staff WiFi access points.", "D": "Segment the staff WiFi network from the environmental systems network."}, "correct": "D", "explanation": "We should isolate/separate/segment those networks!", "source": "powerpoint", "source_label": "PPT Slide 170 (Communication and Network Security)"}, {"id": "ppt_171", "number": 171, "question": "A company has maintained highly detailed records of all of their authorized network devices and is planning to use Wi-Fi for all laptops that need network access. What could replace a pre-shared key on an access point and stop a script kiddie from being able to brute force the password?", "options": {"A": "WPA2-BPDU", "B": "WPA-EAP", "C": "IP filtering", "D": "Wi-fi Protected Setup"}, "correct": "B", "explanation": "A BPDU is a type of message found in the Spanning Tree Protocol, and has nothing to do with Wi-Fi or WPA2. This is a distractor and is complete nonsense. Also known as enterprise mode, or 802.1x, this would require each user to have an unique username and password. With this replacing the pre-shared key mechanism, the script kiddie would have to know the username in addition to brute forcing the password, and that would most likely be outside the scope of their ability. Alternatively or additionally, the 802.1x system allows users to authenticate with TLS certificates, and we can be sure that no script kiddie could bypass that. Not a terrible answer, but this wouldn\u2019t \u201creplace\u201d a pre-shared key. Also, IP filtering isn\u2019t done on most access points. Instead they rely on MAC filtering! Wi-fi Protected Setup allows users to input an eight digit pin number found on the bottom of the access point, or press a button on the access point, to allow a device to connect WITHOUT putting in the password. This mechanism does not replace a pre-shared key and is entirely unrelated to it.", "source": "powerpoint", "source_label": "PPT Slide 171 (Communication and Network Security)"}, {"id": "ppt_172", "number": 172, "question": "An admin is deploying access points that will use PKI for authentication. What needs to be configured for this to work?", "options": {"A": "HTTPS Captive portal", "B": "WPS \u2013 Wi-fi protected setup", "C": "802.1x \u2013 Enterprise mode", "D": "PSK \u2013 Pre-Shared key"}, "correct": "C", "explanation": "Using PKI (certificates) to authenticate into the access point will require an AAA system (a RADIUS or TACACS server must be on the network and configured properly). This process is described in the standard 802.1x, and is also referred to as \u201centerprise authentication/mode\u201d.", "source": "powerpoint", "source_label": "PPT Slide 172 (Communication and Network Security)"}, {"id": "ppt_173", "number": 173, "question": "The OSI model starts with Application (layer 7) at the top and ends with Physical (layer 1) at the bottom. What is the correct order for the TCP/IP model, from top to bottom?", "options": {"A": "Application, Network, Data-link, Physical", "B": "Application, Presentation, Session, Transport", "C": "Application, Internet, Transport, Host Access", "D": "Application, Transport, Internet, Network Access"}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 173 (Communication and Network Security)"}, {"id": "ppt_174", "number": 174, "question": "What best describes the function of OSI layer 3?", "options": {"A": "Provides connectionless communication using logical \u000b     addresses", "B": "Provides error detection through the FCS for frames \u000b     transmitted", "C": "Provides sequencing and acknowledgments for connection-\u000b     oriented communications", "D": "Provides encryption and compression for the data received"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 174 (Communication and Network Security)"}, {"id": "ppt_175", "number": 175, "question": "A smart switch has the ability to monitor electrical levels and shut off power to a building in the event of a power surge or other similar situations. The switch was installed on a wired network in a local office and is monitored via a cloud application. The switch is already isolated on a separate VLAN and has an automatic patching routine. Which of the following steps should also be taken to harden the smart switch?", "options": {"A": "Set up an air gap for the switch.", "B": "Change the default password for the switch.", "C": "Place the switch in a Faraday cage.", "D": "Install a cable lock on the switch."}, "correct": "B", "explanation": "Hardening: configuring the device for least functionality and thereby increasing security.\u000b(Stop unnecessary services, close unnecessary ports, and change the default password) Air gapping the switch (A) would cut it off from the cloud application, so this seems like a bad idea. A faraday cage (C) is used to block wireless signals, and probably isn\u2019t very useful in this situation. A cable lock (D) will only help prevent against physical theft, and that isn\u2019t typically part of the hardening process, nor does the question indicate we are dealing with anything physical. (B) Remains by far our strongest answer.", "source": "powerpoint", "source_label": "PPT Slide 175 (Communication and Network Security)"}, {"id": "ppt_176", "number": 176, "question": "A computer on the company network was infected with malware and the user says they haven\u2019t used the device for anything but browsing the internet. They did not download anything or open any emails on the infected computer. Of the options below, what might help a technician find where the malware came from?", "options": {"A": "The DNS logs", "B": "The web server logs", "C": "The SIP traffic logs", "D": "The SNMP logs"}, "correct": "A", "explanation": "The DNS logs will reveal which websites the user went to.", "source": "powerpoint", "source_label": "PPT Slide 176 (Communication and Network Security)"}, {"id": "ppt_180", "number": 180, "question": "In order to give employees appropriate access rights, a company might choose to determine what tasks need to be accomplished, and then to define what access rights are necessary to accomplish said tasks. What type of access control system would most accurately fit this situation?", "options": {"A": "Rule-based access control and need-to-know.", "B": "Role-based access control.", "C": "Need-to-know and least privilege.", "D": "Non-discretionary access control."}, "correct": "B", "explanation": "Role-based access control means determining what people belong in what roles, and then defining what resources the people in these roles should be able to access. While (C) might be tempting, least privilege shouldn\u2019t be considered an access control system.", "source": "powerpoint", "source_label": "PPT Slide 180 (Identity and Access Management)"}, {"id": "ppt_181", "number": 181, "question": "What answer lists 3 control categories?", "options": {"A": "Preventative, physical, detective", "B": "Physical, administrative, technical", "C": "Deterrent, preventative, compensating", "D": "Administrative, directive, deterrent"}, "correct": "C", "explanation": "The 7 control categories (The 7 C\u2019s) are directive, deterrent, detective, compensating, corrective, recovery, and preventative.  The 3 Types (3 T\u2019s) are Administrative, Technical or Logical, and Physical.", "source": "powerpoint", "source_label": "PPT Slide 181 (Identity and Access Management)"}, {"id": "ppt_182", "number": 182, "question": "Which of the following devices has an embedded microchip which can store enormous amounts of data, double as an access card for doors, and an authenticator for a computer?", "options": {"A": "Smart Card.", "B": "Proximity card, or \u201cprox card.\u201d", "C": "PIN card.", "D": "Magnetic-stripe Card."}, "correct": "A", "explanation": "The clue in the question is \u201cstore enormous amounts of data.\u201d  A proximity card and a Mag Stripe card can be used as access cards for doors and even as an authentication mechanism for a computer, but neither can store enormous amounts of data. Pin cards can\u2019t store enormous amounts of data, and also don\u2019t typically open doors.", "source": "powerpoint", "source_label": "PPT Slide 182 (Identity and Access Management)"}, {"id": "ppt_183", "number": 183, "question": "Which statement BEST describes an access control?", "options": {"A": "A hidden device that permits identity spoofing.", "B": "A deployment of encryption to protect \t \t  \t  authorization systems.", "C": "A mechanism that helps protect systems by            \t  controlling unauthorized user activities.", "D": "A systems device that records all user login       \t    \t  attempts."}, "correct": "C", "explanation": "Barring a better answer, such as \u201cthe selective restriction of access to objects by subjects,\u201d Answer (C) is correct. Answer (A) is a distractor, Answer (B) is incorrect because it is too narrow, and answer (D) describes a log rather than an access control.", "source": "powerpoint", "source_label": "PPT Slide 183 (Identity and Access Management)"}, {"id": "ppt_184", "number": 184, "question": "Which of the following operations security activities requires the least amount of training and experience?", "options": {"A": "Maintaining operational resilience.", "B": "Controlling user accounts.", "C": "Protecting valuable assets.", "D": "Managing security services effectively."}, "correct": "B", "explanation": "Most of the work involved in controlling user accounts is clerical.", "source": "powerpoint", "source_label": "PPT Slide 184 (Identity and Access Management)"}, {"id": "ppt_185", "number": 185, "question": "To create an effective access control system for your organization\u2019s desktops, what must be created?", "options": {"A": "The company\u2019s computer organizational placement chart.", "B": "A list that shows which users have requested special permissions.", "C": "A set of firewall rules that either permit or deny different computer systems access to specific services.", "D": "A set of Kerberos rules that the Kerberos Ticket Granting Server (TGS) uses to allow users access to certain files."}, "correct": "C", "explanation": "Allowing differing computers to have differing levels of access to systems is normally done with Rule-based access control.  Rule-based control for desktops is usually best done with firewall rule sets.", "source": "powerpoint", "source_label": "PPT Slide 185 (Identity and Access Management)"}, {"id": "ppt_186", "number": 186, "question": "Which answer below contains two of the MOST accurate biometric systems?", "options": {"A": "Retinal scans and hand geometry.", "B": "Iris Scans and keystroke dynamics.", "C": "Fingerprint readers and facial recognition.", "D": "Iris scans and vascular pattern scans."}, "correct": "D", "explanation": "(D) is the correct answer. We are looking for the best combo.  Retina and Iris scans are commonly agreed to be some of the best due to their high reliability and their low risk for compromise.  That allows us to eliminate (C).  Focusing on the second half of the combo then, keystroke dynamics isn\u2019t in the same league as a hand scan, so eliminate (B).  Between hand geometry and vascular patterns, vascular patterns is more reliable, so (D) is better than (A).", "source": "powerpoint", "source_label": "PPT Slide 186 (Identity and Access Management)"}, {"id": "ppt_187", "number": 187, "question": "In the context of the Confidentiality, Integrity and Availability (CIA) triad, \u201cPerfect availability\u201d of a resource means which of the following?", "options": {"A": "Availability 24 hours a day, 7 days a week (24/7)", "B": "Availability whenever authorized users require access to the resource in order to do their jobs.", "C": "Availability as appropriate to support the Business Continuity Plan /Disaster Recovery Plan (BCP/DR).", "D": "Full availability even to users in branch offices who have to remote in to access said resources."}, "correct": "B", "explanation": "In the student manual, availability is defined as \u201caim[ing] at ensuring that systems are up and running so that persons can use them when they are needed.\u201d Leaving aside the issue that the need for availability extends beyond \u201csystems,\u201d note: \u201cwhen they are needed.\u201d would only be appropriate if the resource were needed 24/7. (C) does not extend far enough. (D) is a distractor. \u201cUsers in branch offices\u201d need the same kind of availability that other \u201cusers\u201d do.", "source": "powerpoint", "source_label": "PPT Slide 187 (Identity and Access Management)"}, {"id": "ppt_188", "number": 188, "question": "If a system\u2019s security goal is that no subject can gain access to any object without authorization, which of the following should be implemented?", "options": {"A": "The security kernel implementing the reference monitor concept.", "B": "The ring protection mechanism.", "C": "Virtual memory mapping and process isolation.", "D": "Correct management of memory and storage."}, "correct": "A", "explanation": "Answer (A) is correct. Answer (B) is too general, Answer (C) describes how applications work with the OS, and Answer (D) is a distractor.", "source": "powerpoint", "source_label": "PPT Slide 188 (Identity and Access Management)"}, {"id": "ppt_189", "number": 189, "question": "Which of the following is the best example of two-factor authentication?", "options": {"A": "Requiring a user to use both a digital fingerprint and an iris scan to get logged in.", "B": "Requiring a user to provide a 14 character password and also punch in a 8 character access key to a cipher lock located at the entrance door.", "C": "Requiring a token device to be inserted in a special slot at the entrance door, as well as a keyless entry device.", "D": "Requiring a token device and a fingerprint."}, "correct": "D", "explanation": "Answer (D) is correct, as it is \u201csomething you have,\u201d a token, and \u201csomething you are,\u201d a fingerprint.  The rest are single factor, Answer (A) using two biometrics, Answer (B) using two things you know and Answer (C) with two things you have. Dual-factor and multi-factor authentication require \u201cproof\u201d that you are using items from more than one category.", "source": "powerpoint", "source_label": "PPT Slide 189 (Identity and Access Management)"}, {"id": "ppt_191", "number": 191, "question": "What best describes role-based access control?", "options": {"A": "It is unique to mandatory access control systems.", "B": "It is often implemented by modern firewalls.", "C": "It is a set of technologies focusing on provisioning and decommissioning user credentials.", "D": "It is configured based on the user\u2019s job function."}, "correct": "D", "explanation": "Role-based control is used in MAC, DAC and NDAC systems. Access necessary based on user roles can be implemented in part by firewalls, but this does not make firewalls role-based rather than rule-based access control. Role-based access control is not itself a set of technologies, although it can be implemented via various technologies.", "source": "powerpoint", "source_label": "PPT Slide 191 (Identity and Access Management)"}, {"id": "ppt_192", "number": 192, "question": "Alice has just successfully logged into a system using Kerberos. She wants to edit a file located on server K, which is in the same domain that she is.  Which action best describes how this will be done?", "options": {"A": "Alice can access the file without logging into Server K.", "B": "Alice logs into Server K and accesses the file.", "C": "Alice goes back to the Kerberos system, gets a special ticket for Server K, and uses it to log into Server K.  Server K will then decide whether Alice can edit her requested file.", "D": "Alice goes back to the Kerberos system, gets a special ticket for Server K, and uses it to log into Server K. Since she is an authenticated user, she will be automatically allowed to edit the requested file."}, "correct": "C", "explanation": "Answer (A) is wrong because Alice does need to log into Server K, even though this is \u201cbehind the scenes\u201d and invisible to Alice herself. Answer (B) is wrong because she still needs to get a service ticket from Kerberos. Answer (D) is wrong because authentication does not automatically grant authorization.", "source": "powerpoint", "source_label": "PPT Slide 192 (Identity and Access Management)"}, {"id": "ppt_193", "number": 193, "question": "When a company is considering adopting a biometric system, which is the LEAST important consideration?", "options": {"A": "Technology type.", "B": "Reliability and accuracy.", "C": "User acceptance.", "D": "Resistance to users counterfeiting their credentials."}, "correct": "A", "explanation": ". (B) (C) and (D) are all more important than (A).\u000bWhat TYPE of technology it happens to be is the LEAST important concern of the options above.", "source": "powerpoint", "source_label": "PPT Slide 193 (Identity and Access Management)"}, {"id": "ppt_194", "number": 194, "question": "Which statement BEST describes how \u201cRole-based access control\u201d is typically used?", "options": {"A": "It only occurs in discretionary access control systems (DACs).", "B": "Since it is based on the user\u2019s job function, it can be used in many situations.", "C": "It is always used in mandatory access control systems (MACs).", "D": "It is the accepted method for limiting users to certain tasks at certain times of the day."}, "correct": "B", "explanation": "Role Based Access Control can work with both Discretionary and Mandatory Access Control systems, so Answer (A) is not correct.  Answer (C) takes things a step too far when it says \u201calways\u201d used with MAC, as role-based control is typically optional in that environment. Furthermore answer (D) has too narrow of a focus and there are many other acceptable ways to apply time restrictions.", "source": "powerpoint", "source_label": "PPT Slide 194 (Identity and Access Management)"}, {"id": "ppt_195", "number": 195, "question": "In a SAML 2.0 system, when a user across the internet is attempting to access a web service, which of the following happens?", "options": {"A": "The web server uses a federated login system to authenticate the user.", "B": "The web service provides both authentication and authorization.", "C": "The web service uses a direct connection to an Active Directory (AD) server to provide authentication.", "D": "Web Server connects back to the user\u2019s home login system to determine whether the user should be allowed to access the desired service."}, "correct": "A", "explanation": "Allowing for Federated Logins is a major attribute of SAML 2.0. SAML 2.0 was designed to prevent the web service from having to do authentication and authorization itself. Instead, it uses the Identity Provider (IdP) for this. Answers (B), (C), and (D) are therefore all incorrect.", "source": "powerpoint", "source_label": "PPT Slide 195 (Identity and Access Management)"}, {"id": "ppt_196", "number": 196, "question": "The correct ordering of steps with respect to user access to an object is:", "options": {"A": "Identification, authorization, auditing.", "B": "Identification, authentication, authorization.", "C": "Authorization, setup of auditing for the session, authentication.", "D": "Authentication, setup of auditing for the session, access."}, "correct": "B", "explanation": "Remember the acronym, IAAA,  which can remind you that you need to \u201cpresent unique Identity first, then Authentication proves uniqueness, then Authorization provides Access to an Object, and then finally Auditing records the access to the object.\u201d", "source": "powerpoint", "source_label": "PPT Slide 196 (Identity and Access Management)"}, {"id": "ppt_201", "number": 201, "question": "What could be used to allow for secure authentication to several service providers without the need to send a password to each?", "options": {"A": "CHAP", "B": "PAP", "C": "Oauth", "D": "SAML"}, "correct": "D", "explanation": "The question clearly describes SSO (single sign-on).\u000b\u000bPAP and CHAP both involve sending a password, so those can be ruled out. Oauth is used for sending authorizations from one web service or cloud server to another, but doesn\u2019t handle authentication on its own. To give Oauth that functionality, we would need to also leverage OpenID Connect. SAML is an XML-based format used to exchange authentication information and thereby achieve identity federations (SSO). It doesn\u2019t actually send your password from one system to another in the process. Instead it tokenizes credentials across multiple parties.", "source": "powerpoint", "source_label": "PPT Slide 201 (Identity and Access Management)"}, {"id": "ppt_203", "number": 203, "question": "Which listing puts some of the steps of a penetration test in their correct order?", "options": {"A": "Fuzzing, vulnerability mapping, pivoting", "B": "Discovery, fuzzing, vulnerability scanning", "C": "Enumeration, vulnerability mapping, exploitation", "D": "Exploitation, discovery, vulnerability scanning"}, "correct": "C", "explanation": "The correct and logical order: Discovery Enumeration Vulnerability mapping Exploitation Document findings Fuzzing is used to test input validation and while it might be occasionally used in the exploitation process, it is not its own step in any standard pen-test.", "source": "powerpoint", "source_label": "PPT Slide 203 (Security Assessment and Testing)"}, {"id": "ppt_204", "number": 204, "question": "Which of the following testing methods would allow you to begin the implementation of a software security program on COTS (commercial off the shelf) software that had little oversight in the past?", "options": {"A": "SCA - Software Composition Analysis", "B": "DAST \u2013 Dynamic Application Security Testing", "C": "SAST - Static Application Security Testing", "D": "IAST - Interactive App Security Testing"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 204 (Security Assessment and Testing)"}, {"id": "ppt_205", "number": 205, "question": "Synthetic monitoring would most typically involve external agents performing which of the following?", "options": {"A": "Scripted transactions against a File Transfer Protocol (FTP) application.", "B": "Batch jobs against email applications.", "C": "Batch jobs against a telecommunications network (telnet) application.", "D": "Scripted transactions against a web application."}, "correct": "D", "explanation": "Synthetic transaction monitoring usually involves running scripts, most typically against a web application rather than for ftp, email, or telnet applications.", "source": "powerpoint", "source_label": "PPT Slide 205 (Security Assessment and Testing)"}, {"id": "ppt_206", "number": 206, "question": "Which of the following will cause the fewest security flaws?", "options": {"A": "Design flaws in the proposed system documentation.", "B": "Poor programming.", "C": "Misconfiguration of security infrastructures.", "D": "Functional bugs in security infrastructures."}, "correct": "A", "explanation": "Answers  (B), (C), and (D) all point to areas that cause major and numerous security flaws. The word \u201cproposed\u201d in answer (A) is the key \u2013 this system is still being designed and we can\u2019t accurately determine if the flaws will continue to exist by the time this system is done development.", "source": "powerpoint", "source_label": "PPT Slide 206 (Security Assessment and Testing)"}, {"id": "ppt_207", "number": 207, "question": "Which of the following is not a type of test coverage analysis that would provide structural-coverage metrics?", "options": {"A": "Statement coverage", "B": "Dynamic coverage", "C": "Path coverage", "D": "Loop coverage"}, "correct": "B", "explanation": "The different forms of test coverage analysis include: Statement coverage Decision (branch) coverage Condition coverage Multi-condition coverage Loop coverage Path coverage Data flow coverage.", "source": "powerpoint", "source_label": "PPT Slide 207 (Security Assessment and Testing)"}, {"id": "ppt_208", "number": 208, "question": "What are the two main testing strategies in software testing?", "options": {"A": "Negative    and       Positive cases", "B": "Static          and       Negative cases", "C": "Positive      and       Dynamic cases", "D": "Known       and       Unknown cases"}, "correct": "A", "explanation": "Positive testing determines whether your application is working as expected, and negative testing ensures that your application can gracefully handle invalid input or unexpected behaviors.", "source": "powerpoint", "source_label": "PPT Slide 208 (Security Assessment and Testing)"}, {"id": "ppt_209", "number": 209, "question": "In a testing environment that seeks to verify the accuracy of installed controls, which of the following is most correct?", "options": {"A": "The white-hat tester is an external tester and the black-hat tester is an internal tester.", "B": "A blind test is done so that insiders don\u2019t know that they are being tested by external testers.", "C": "The most effective test would be a double-blind test.", "D": "A black-hat blind test will produce better results than a white hat blind test."}, "correct": "C", "explanation": "A \u201cdouble-blind\u201d test is one in which the tester has little to no knowledge of the systems, and the internal staff is unaware that there is testing going on. This kind of test therefore most effectively mimics a real attack (i.e. one conducted by an outside black-hat). Answer (A) is wrong; you don\u2019t want black-hats \u201ctesting\u201d anything. (B) is backwards. The answer to (D) depends on the skills of the tester / hacker.", "source": "powerpoint", "source_label": "PPT Slide 209 (Security Assessment and Testing)"}, {"id": "ppt_210", "number": 210, "question": "Which technique would a black-hat tester normally use initially?", "options": {"A": "Static Source Code Analysis (SAST) Tools.", "B": "Fuzz testing tools, or \u201cfuzzing.\u201d", "C": "No-Op / NOP sleds, slides or ramps.", "D": "Reverse Engineering."}, "correct": "B", "explanation": "Answer (B) is Correct. Fuzz Testing Tools send random data, usually in larger chunks than expected by the application, to the input channels of an application in order to try to crash it. SAST tools are for source code analysis, which a hacker would be unlikely to have. NOP, or \u201cno-operation\u201d sleds are a sequence of NOP instructions meant to \u201cslide\u201d the CPU\u2019s instruction execution flow to its final destination whenever the program branches to a memory address anywhere on the sled. This technique is often used in software exploits \u2013 i.e. not an \u201cinitial\u201d technique. Similarly, a hacker may use reverse engineering, but if so, that would come much later.", "source": "powerpoint", "source_label": "PPT Slide 210 (Security Assessment and Testing)"}, {"id": "ppt_211", "number": 211, "question": "Which of the following describes penetration testing steps in their proper sequence?", "options": {"A": "Discovery, enumeration, exploitation, Key Performance Indicators (KPIs), reporting.", "B": "Enumeration, discovery, vulnerability scanning, reporting.", "C": "Key Performance Indicators (KPIs), vulnerability scanning, exploitation, reporting.", "D": "Discovery, enumeration, vulnerability scanning, exploitation."}, "correct": "D", "explanation": "Answer (D) is correct.  KPIs are not always provided, but if they are, they are provided as the last step.  This eliminates Answers (A) and (C).  Answer (B) has Enumeration and Discovery backwards. The correct and logical order: Discovery Enumeration Vulnerability mapping Exploitation Document findings", "source": "powerpoint", "source_label": "PPT Slide 211 (Security Assessment and Testing)"}, {"id": "ppt_213", "number": 213, "question": "How often are SOC reports typically done?", "options": {"A": "One month after initial product installation and installed controls are tested.", "B": "The quarter after initial product installation and installed controls are tested .", "C": "Every year after initial product installation and installed controls are tested.", "D": "Twice a year after initial product installation and controls are tested."}, "correct": "C", "explanation": "SOC reports are normally done annually.", "source": "powerpoint", "source_label": "PPT Slide 213 (Security Assessment and Testing)"}, {"id": "ppt_214", "number": 214, "question": "Monitor an application\u2019s availability 24 x 7.", "options": {"A": "Monitor critical databases for queries and availability.", "B": "Objectively measure Service Level Requirements (SLRs).", "C": "Monitor performance of proposed Identity as a Service (IDaaS)cloud solutions.", "D": "Which answer describes synthetic monitoring\u2019s greatest benefits?"}, "correct": "A", "explanation": "1 and 2 1 and 3 1, 2, and 4 2, 4, and 4 #3 is wrong, as a SLR documents what the client wants in an SLA, not the actual performance of the service. Similarly, #4 is not correct as Synthetic testing is about providing scripts to monitor running systems.", "source": "powerpoint", "source_label": "PPT Slide 214 (Security Assessment and Testing)"}, {"id": "ppt_215", "number": 215, "question": "Which answer below is MOST accurate with respect to testing newly developed software?", "options": {"A": "With a little practice, complicated new software systems can  be exhaustively tested", "B": "Expected test results should be objective and according to pre-defined specifications", "C": "Examining the \u201cTop 5 Most Often Occurring\u201d cases is a BEST PRACTICE for software testing", "D": "Best practices involve end-users in software testing as soon as new code can be tested"}, "correct": "B", "explanation": "(A) has been shown to be false; almost no software can be exhaustively tested. (D) is wrong because testing that frequently will cause huge delays and redesigns of the intended system.", "source": "powerpoint", "source_label": "PPT Slide 215 (Security Assessment and Testing)"}, {"id": "ppt_216", "number": 216, "question": "Statement Coverage --there are enough test cases so that each program statement will be tested at least once.", "options": {"A": "Decision Coverage -- financial decisions about whether to move forward with the development can be determined from the software testing.", "B": "Condition Coverage -- testing that entry into and exit from each program loop is tested at least once.", "C": "Multi-Condition -- test cases exercise all possible combinations of conditions in program decisions.", "D": "Which answer below best describes Structural Coverage testing?"}, "correct": "D", "explanation": "1 and 2 2 and 3 3 and 4 1 and 4 Definitions can be found in the notes.", "source": "powerpoint", "source_label": "PPT Slide 216 (Security Assessment and Testing)"}, {"id": "ppt_217", "number": 217, "question": "Management is looking for a security solution that can continuously determine the effectiveness of the security controls around the network. They would also like to know if the organization is protected against the latest day to day network threats. What would be best suited to this task?", "options": {"A": "Penetration testers", "B": "Breach attack simulations", "C": "Automated risk hunting", "D": "Advanced persistent tests"}, "correct": "B", "explanation": "BAS (breach attack simulations) are SaaS applications that can be launched from the cloud and from agents within the network. Instead of just scanning for vulnerabilities, they generate a wide range of intrusive traffic that is aimed at virtual machines created for the BAS applications. The intrusive traffic is monitored carefully by the BAS apps and can report not just on the effectiveness of the network controls, but can also give detailed insight as to how an attacker could pivot through the network. These are essentially the next generation form of vulnerability scanners. Furthermore, since they are SaaS, they receive frequent updates to test for the latest network threats. (A) Not the worst answer, but continuous pen-tests seem expensive and less effective when compared with (B). (C) and (D) are distractors.", "source": "powerpoint", "source_label": "PPT Slide 217 (Security Assessment and Testing)"}, {"id": "ppt_218", "number": 218, "question": "The Chief Risk officer is looking through logs for a specific IoC (Indicator of Compromise) that they read about online. What best describes this activity?", "options": {"A": "Risk analysis", "B": "Log aggregation", "C": "Threat hunting", "D": "Vulnerability scanning"}, "correct": "C", "explanation": "Threat hunting: a defense activity where security personnel proactively search through networks and logs to isolate and detect advanced threats that would evade existing security mechanisms.", "source": "powerpoint", "source_label": "PPT Slide 218 (Security Assessment and Testing)"}, {"id": "ppt_219", "number": 219, "question": "A CSO is interested in determining the security posture of a cloud provider who may provide service to their organization in the future. Which of the following would the CSO want to review?", "options": {"A": "PCI DSS standards", "B": "SOC 2 report", "C": "CSF framework", "D": "SLA contract"}, "correct": "B", "explanation": "A service organization controls (SOC) report (not to be confused with the other SOC acronym, security operations center) is a way to verify that an organization is following some specific best practices before you outsource a business function to that organization.", "source": "powerpoint", "source_label": "PPT Slide 219 (Security Assessment and Testing)"}, {"id": "ppt_220", "number": 220, "question": "Which security testing method provides continuous monitoring and analysis of an application's runtime behavior to detect and prioritize vulnerabilities efficiently?", "options": {"A": "Fuzz Testing", "B": "Black Box Testing", "C": "Static Application Security Testing (SAST)", "D": "Interactive Application Security Testing (IAST)"}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 220 (Security Assessment and Testing)"}, {"id": "ppt_221", "number": 221, "question": "A contracted individual that emulates a threat and reports an aggregated list of risks would best be described as?", "options": {"A": "Blind tester", "B": "Black hat hacker", "C": "Vulnerability scanner", "D": "Penetration tester"}, "correct": "D", "explanation": "Pen-testers emulate external threats to identify weaknesses in part and in whole.\u000bFurthermore, they should always have a carefully written contract that clearly and completely identifies the rules of engagement and expectations of the test.", "source": "powerpoint", "source_label": "PPT Slide 221 (Security Assessment and Testing)"}]}, "friday": {"domain": "Domains 7 & 8: Security Operations / Software Development Security", "pdf_count": 46, "ppt_count": 55, "count": 101, "pdf_questions": [{"id": "pdf_2", "number": 2, "question": "Why is projection lighting mounted at the same height as the barbed wire topping of a fence?", "options": {"A": "It makes it easier to observe an intruder climbing over the fence.", "B": "It increases the field of view for those observing the scene.", "C": "It lowers the height and cost of observation towers.", "D": "It blinds the approaching intruder\u2019s view of the scene."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q2"}, {"id": "pdf_5", "number": 5, "question": "Which of the following backup processing alternatives describes a computing facility with telecommunications equipment, some systems, but minimal data?", "options": {"A": "Company-owned hot site", "B": "Commercial hot site", "C": "Cold site", "D": "Warm site"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q5"}, {"id": "pdf_14", "number": 14, "question": "What is the recommended frequency that a system recovery plan be tested in a stable data processing environment?", "options": {"A": "Once to validate the plan", "B": "When applications are modified", "C": "Prior to all audits", "D": "Quarterly or semiannually QUESTIONS 15\u201316 REFER TO THE FOLLOWING INFORMATION ABZ Organization is constructing a new secure facility and has elected to install a two- tier access control system, which will consist of proximity badges and biometric devices. The system security professional is tasked with acquiring the access control systems. The only requirements are to keep cost as low as possible and minimize system down time."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q14"}, {"id": "pdf_25", "number": 25, "question": "Which of the following is TRUE for an effective Incident Response Plan?", "options": {"A": "Conduct a Business Impact Analysis (BIA) prior to developing the plan.", "B": "The plan should be part of a Disaster Recovery Plan (DRP).", "C": "Establish a leader who has a thorough understanding of the plan.", "D": "The plan should be developed by an outside consulting agency."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q25"}, {"id": "pdf_28", "number": 28, "question": "Computer generated evidence is NOT considered reliable because it is", "options": {"A": "stored on volatile media.", "B": "too complex for jurors to understand.", "C": "seldom comprehensive enough to validate.", "D": "too difficult to detect electronic tampering."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q28"}, {"id": "pdf_39", "number": 39, "question": "In which order are successful business continuity planning project process phases accomplished?", "options": {"A": "Plan development, testing, Business Impact Analysis (BIA), risk analysis, and maintenance", "B": "Requirement analysis, design, implementation, testing, and maintenance", "C": "Plan design, requirement analysis, plan testing, implementation, and maintenance", "D": "Requirement analysis, recovery strategy selection, user training, and maintenance"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q39"}, {"id": "pdf_49", "number": 49, "question": "Log file review", "options": {"A": "should be performed only after a Return on Investment (ROI) calculation.", "B": "can help identify attack precursors.", "C": "requires a high degree of technical skill.", "D": "is only necessary for servers."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q49"}, {"id": "pdf_51", "number": 51, "question": "Why is the investigation of computer crime involving malicious damage especially challenging?", "options": {"A": "Information stored in a computer is intangible evidence.", "B": "Evidence may be destroyed in an attempt to restore the system.", "C": "Isolating criminal activity in a detailed audit log is difficult.", "D": "Reports resulting from common user error often obscure the actual violation."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q51"}, {"id": "pdf_53", "number": 53, "question": "Which one of the following is concerned with the frequency, length, and origin-destination patterns of the communications between systems?", "options": {"A": "Masking analysis", "B": "Protocol analysis", "C": "Traffic analysis", "D": "Pattern analysis"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q53"}, {"id": "pdf_55", "number": 55, "question": "When disposing of classified data, file wipe programs exist that actually overwrite media that can be used on all media types EXCEPT", "options": {"A": "flash drives.", "B": "hard drives.", "C": "tape drives.", "D": "optical drives."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q55"}, {"id": "pdf_56", "number": 56, "question": "An Information Technology (IT) department has just been notified they will be audited in six weeks. How should they prepare?", "options": {"A": "Reviewing the system documentation will be enough for a successful audit", "B": "Notify staff the week before the audit will be performed", "C": "No additional work is needed if a continuous compliance program is in place", "D": "Implement a continuous compliance program right away"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q56"}, {"id": "pdf_58", "number": 58, "question": "Why can surge suppressors that protect stand-alone computers and peripherals cause damage to computers and peripherals on a network?", "options": {"A": "Stand-alone surge protectors are used only to filter electricity to the computers plugged into it.", "B": "Only stand-alone surge suppressors signal a warning so that orderly shutdown can take place.", "C": "Stand-alone surge suppressors divert the high surge voltage to the ground where it can enter the network communications lines.", "D": "Stand-alone surge suppressors could overload the electrical circuits during a surge and result in a fire."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q58"}, {"id": "pdf_59", "number": 59, "question": "In the event of a disaster, in what order should services be recovered?", "options": {"A": "Executive functions first", "B": "Highest to lowest business impact", "C": "Lowest to highest business impact", "D": "Decreasing complexity of restoration"}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q59"}, {"id": "pdf_63", "number": 63, "question": "The MAIN reason for validating a vendor\u2019s Information Technology (IT) security policies and procedures is to verify the", "options": {"A": "use of approved operating systems and specific computer hardware.", "B": "vendor is not a liability to the company\u2019s technology operations.", "C": "vendor is financially stable and viable.", "D": "vendor has implemented a corporate strategy and vision statement."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q63"}, {"id": "pdf_65", "number": 65, "question": "When establishing a process to track and analyze violations, which one of the following is often used to keep the quantity of data to manageable levels?", "options": {"A": "Quantity baseline", "B": "Maximum log size", "C": "Circular logging", "D": "Clipping levels"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q65"}, {"id": "pdf_71", "number": 71, "question": "What two factors should a backup program track to ensure the serviceability of backup tape media?", "options": {"A": "The initial usage date of the media and the number of uses", "B": "The physical characteristics and rotation cycle of the media", "C": "The manufacturer and model number of the tape media", "D": "The frequency of usage and magnetic composition"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q71"}, {"id": "pdf_80", "number": 80, "question": "Comparing the starting and ending locations of partitions on a disk, as reported by the partition table, is an example of", "options": {"A": "a consistency check.", "B": "an integrity check.", "C": "a file system check.", "D": "an atomic check."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q80"}, {"id": "pdf_86", "number": 86, "question": "What is the PRIMARY benefit of capturing all network traffic during an attack, as opposed to only capturing alerts?", "options": {"A": "Attacks can be stopped before they occur.", "B": "Attack captures can be easily compressed.", "C": "Attacks using proxies can be easily traced.", "D": "Attacks can be repeated later in test environments for analysis."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q86"}, {"id": "pdf_90", "number": 90, "question": "What is the MAIN purpose of periodically testing the Incident Response Plan?", "options": {"A": "To identify flaws in the plan and make it effective over time by updating it", "B": "To satisfy auditors as the test reports generated are required for compliance", "C": "To help the system administrators to identify any weaknesses present in their applications in advance", "D": "To help prevent the occurrence of security incidents in the future"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q90"}, {"id": "pdf_93", "number": 93, "question": "Which of the following is the LEAST important information to record when logging a security violation?", "options": {"A": "User\u2019s name", "B": "UserID", "C": "Type of violation", "D": "Date and time of the violation"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q93"}, {"id": "pdf_97", "number": 97, "question": "As the Chief Information Security Officer (CISO) for an organization, which of the following is of LEAST concern during an incident response?", "options": {"A": "The affected system Recovery Time Objective (RTO) because that is a Business Impact Analysis issue and is irrelevant during an incident response.", "B": "The affected system Recovery Point Objective (RPO) because that only deals with how long a system can go between backups.", "C": "Alerting Law Enforcement because they may take over the investigation and reduce workload on the organization.", "D": "Monitoring the situation to assess the effectiveness of the press briefing at controlling news reports that may disclose sensitive information."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q97"}, {"id": "pdf_105", "number": 105, "question": "When conducting a risk assessment, which one of the following is NOT an acceptable social engineering practice?", "options": {"A": "Shoulder surfing", "B": "Misrepresentation", "C": "Asking the CEO to email his private key to the assessor.", "D": "Dumpster diving"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q105"}, {"id": "pdf_106", "number": 106, "question": "Removing unnecessary processes, segregating inter-process communications, and reducing executing privileges to increase system security is commonly called", "options": {"A": "Hardening.", "B": "Segmenting.", "C": "Aggregating.", "D": "Kerneling."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q106"}, {"id": "pdf_110", "number": 110, "question": "Which of the following could BEST be utilized to validate the continued need for access to system resources?", "options": {"A": "Periodically review and recertify privileged users", "B": "Periodically review audit and access logs", "C": "Periodically review processes that grant access", "D": "Periodically review data classifications by management"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q110"}, {"id": "pdf_117", "number": 117, "question": "Which of the following MUST be true before the least privilege principle applies?", "options": {"A": "The individual must have a need to know.", "B": "The object\u2019s label must be updated with the subject\u2019s clearance level.", "C": "The object\u2019s label must grant the subject access to the object.", "D": "The individual must be assigned to a leadership position in the organization."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q117"}, {"id": "pdf_125", "number": 125, "question": "Which one of the following evidence collection methods is MOST likely to be acceptable in a court case?", "options": {"A": "Providing a full system backup inventory", "B": "Creating a file-level archive of all files", "C": "Providing a bit-level image of the hard drive", "D": "Copying all files accessed at the time of the incident"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q125"}, {"id": "pdf_10", "number": 10, "question": "The best practice to prevent logging clutter in application security is to", "options": {"A": "log an exception when the exception is wrapped with another exception and propagate.", "B": "catch and log exceptions at every level in the software.", "C": "catch and log exceptions only at points at which exceptions are actually handled.", "D": "disable debug level logging in a production environment."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q10", "accept_also": "C or D"}, {"id": "pdf_17", "number": 17, "question": "When the results of process execution depend on the behavior of other processes on the system, the process may be vulnerable to", "options": {"A": "shared memory corruption.", "B": "a poorly designed locking strategy.", "C": "poor data validation.", "D": "a race condition."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q17"}, {"id": "pdf_31", "number": 31, "question": "Which one of the following is the BEST defense against worms?", "options": {"A": "Differentiating systems along the lines exploited by the attack", "B": "Placing limits on sharing, writing, and executing programs", "C": "Keeping data objects small, simple, and obvious as to their intent", "D": "Limiting connectivity by means of well-managed access controls"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q31"}, {"id": "pdf_32", "number": 32, "question": "The MAIN goal of implementing change management processes in an organization is to", "options": {"A": "ensure that the entire environment is safe and free of problems and errors.", "B": "help prepare for documentation for the auditors.", "C": "help provide the statistics of changes to upper management for cost- benefit analysis.", "D": "provide feedback to the Information Technology (IT) support staff to improve their technical skills."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q32"}, {"id": "pdf_36", "number": 36, "question": "Which one of the following describes a covert timing channel?", "options": {"A": "Modulated to carry an unintended information signal that can only be detected by special, sensitive receivers", "B": "Used by a supervisor to monitor the productivity of a user without their knowledge", "C": "Provides the timing trigger to activate a malicious program disguised as a legitimate function", "D": "Allows one process to signal information to another by modulating its own use of system resources"}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q36"}, {"id": "pdf_41", "number": 41, "question": "An active content module that attempts to monopolize and exploit system resources is called a", "options": {"A": "Macro virus.", "B": "Hostile applet.", "C": "Plug-in worm.", "D": "Cookie."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q41"}, {"id": "pdf_42", "number": 42, "question": "One example of a security countermeasure against Structured Query Language (SQL) injection attacks is", "options": {"A": "To deploy an Intrusion Detection System (IDS).", "B": "To encrypt communications using Secure Sockets Layer (SSL).", "C": "Anti-virus deployment.", "D": "User input validation."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q42"}, {"id": "pdf_43", "number": 43, "question": "Patch management", "options": {"A": "can only be performed by automated systems.", "B": "is a vendor responsibility.", "C": "requires accurate asset information.", "D": "is only necessary for desktop computers."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q43"}, {"id": "pdf_50", "number": 50, "question": "An effective countermeasure against Trojan horse malware is", "options": {"A": "a key logger.", "B": "a cryptologically strong password.", "C": "a Host-based Intrusion Prevention System (HIPS).", "D": "an Intrusion Detection System (IDS) in the network perimeter."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q50"}, {"id": "pdf_52", "number": 52, "question": "In what way can web applets pose a security threat?", "options": {"A": "Their transport can interrupt the secure distribution of World Wide Web pages over the Internet by removing Secure Sockets Layer (SSL) and Secure HyperText Transfer Protocol (S-HTTP).", "B": "Client execution environment may not provide the ability to limit system access that an applet could have on a client system.", "C": "Executables from the Internet may attempt an unintentional attack when they are downloaded on a client system because of bad programming.", "D": "Client execution environment will check the bytecode at runtime or provide other safety mechanisms for program isolation from the client system."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q52"}, {"id": "pdf_64", "number": 64, "question": "Which one of the following is the FIRST step in auditing source code?", "options": {"A": "Validate whether the implementation meets the design", "B": "Matching as-built to as-designed", "C": "Identify the internal Application Programming Interface (API) for getting input", "D": "Analyze to determine whether there is a vulnerability"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q64", "accept_also": "A or B"}, {"id": "pdf_66", "number": 66, "question": "Patch management processes are", "options": {"A": "standard for every organization.", "B": "unique for every organization.", "C": "effective only in large organizations.", "D": "built around automated deployment systems."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q66"}, {"id": "pdf_73", "number": 73, "question": "Requests for adding or modifying functional requirements during software development can BEST be managed by using", "options": {"A": "quality management processes.", "B": "change management policies.", "C": "management oversight standards.", "D": "risk management plans."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q73"}, {"id": "pdf_78", "number": 78, "question": "Why is it important that system owners categorize their information and systems in conjunction with their initial Certification and Accreditation (C&A) efforts?", "options": {"A": "To determine what level of protection is required and what controls are needed to protect the system", "B": "To determine the budget that is required to complete the initial certification assessment", "C": "To develop a better project plan and method for allowing changes to be made to the system", "D": "To determine whether their system is compatible with legacy systems in their inventory"}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q78"}, {"id": "pdf_79", "number": 79, "question": "The MOST dangerous consequence of a buffer overflow vulnerability is", "options": {"A": "Denial of Service (DoS).", "B": "arbitrary code execution.", "C": "disclosure of confidential information.", "D": "damage to the organizational brand."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q79"}, {"id": "pdf_81", "number": 81, "question": "An Internet worm that causes several computer systems to become unresponsive is seeking to reduce which of the following?", "options": {"A": "Confidentiality", "B": "Integrity", "C": "Availability", "D": "Denial of Service (DoS)"}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q81"}, {"id": "pdf_83", "number": 83, "question": "Using a System Development Life Cycle (SDLC) methodology in a software development project should", "options": {"A": "improve the quality of the software product.", "B": "include an exact schedule for the project.", "C": "increase the number of software vulnerabilities.", "D": "decrease the complexity of the software code."}, "correct": "A", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q83"}, {"id": "pdf_85", "number": 85, "question": "Many common vulnerabilities such as buffer overflows, Structured Query Language (SQL) injection, and command injections, can be traced to failure to", "options": {"A": "install the latest vendor patches.", "B": "maintain a hardened server configuration.", "C": "validate user input.", "D": "abide by organizational security policies."}, "correct": "C", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q85"}, {"id": "pdf_94", "number": 94, "question": "During the INITIAL stages of software development, a development team should analyze the vulnerabilities that could be encountered by the application produced. The method of analysis is termed", "options": {"A": "audit analysis.", "B": "threat modeling.", "C": "cost benefit analysis.", "D": "Software Development Life Cycle (SDLC)."}, "correct": "B", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q94"}, {"id": "pdf_100", "number": 100, "question": "Feeding fake information into a phishing site with the intent to make the phisher\u2019s haul less valuable is referred to as", "options": {"A": "reverse phishing.", "B": "Denial of Service (DoS).", "C": "takedown.", "D": "dilution."}, "correct": "D", "source": "practice-exam-pdf", "source_label": "Practice Exam PDF Q100"}], "ppt_questions": [{"id": "ppt_223", "number": 223, "question": "What should an incident response team do after measures have been applied to contain the escalation of a security breach?", "options": {"A": "Updating the risk register", "B": "Conducting a post-incident review", "C": "Updating the incident response plan", "D": "Restoring systems to their operational state"}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 223 (Security Operations)"}, {"id": "ppt_225", "number": 225, "question": "A technician in the SOC (security operations center) is updating the rules in the SIEM (system info event manager) to more accurately detect threats in the future. What stage of incident response are they presently involved in?", "options": {"A": "Containment", "B": "Eradication", "C": "Recovery", "D": "Preparation"}, "correct": "D", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 225 (Security Operations)"}, {"id": "ppt_226", "number": 226, "question": "A SOC technician determines that the malicious activity detected on a workstation is a false positive. Which of the following activities would allow the technician to ignore this same type of detected activity in the future?", "options": {"A": "Tuning", "B": "Aggregating", "C": "Quarantining", "D": "Archiving"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 226 (Security Operations)"}, {"id": "ppt_227", "number": 227, "question": "Which of the following is\u00a0MOST\u00a0important when deciding whether to build an alternate facility or to\u00a0subscribe to a third-party hot site?", "options": {"A": "Infrastructure complexity and system sensitivity", "B": "Location of a redundant processing facility and cost to build it", "C": "Criticality results from the business impact analysis", "D": "Daily cost of losing critical systems and recovery time objectives"}, "correct": "B", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 227 (Security Operations)"}, {"id": "ppt_228", "number": 228, "question": "Of the options below, which will most greatly impact the success of a disaster recovery test at a third-party hot site?", "options": {"A": "Equipment at the hot site is identical", "B": "Business management actively participates", "C": "Tests are scheduled on weekends", "D": "Internet Protocol addresses are predetermined"}, "correct": "B", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 228 (Security Operations)"}, {"id": "ppt_229", "number": 229, "question": "A technician at the SOC (security operations center) is using a SIEM to aggregate and correlate alert messages gathered from all across the network. What step of incident response are they most likely involved in?", "options": {"A": "Eradication", "B": "Preparation", "C": "Identification", "D": "Containment"}, "correct": "C", "explanation": "Prepare Identify Contain Eradicate Recover Lessons-learned We are here.", "source": "powerpoint", "source_label": "PPT Slide 229 (Security Operations)"}, {"id": "ppt_230", "number": 230, "question": "Which of the following answers describes a perimeter intrusion detection system (PIDS) that sends an electrical signal down a fence cable in order to detect movement?", "options": {"A": "Coaxial Strain-Sensitive Cable System.", "B": "Time-Domain Reflectometry System.", "C": "Motion Path Analysis System.", "D": "A Microwave Sensor System."}, "correct": "A", "explanation": "A Coaxial Strain-Sensitive Cable can detect when someone climbs on the fence or cuts the cable and these are frequently used as a perimeter-based physical detective controls.\u000bA TDR (answer B) is an electronic instrument that uses time-domain reflectometry to characterize and locate faults in metallic cables, as well as to locate discontinuities in a connector, printed circuit board, or any other electrical path. A motion-path analysis (answer C) system could refer to any number of things. Microwaves (answer D) can be used for motion detection, but this is not the motion detection system described.", "source": "powerpoint", "source_label": "PPT Slide 230 (Security Operations)"}, {"id": "ppt_231", "number": 231, "question": "What type of alternative site would be the most cost effective for an organization that was willing to accept an RTO (recovery time objective) of several weeks?", "options": {"A": "Cold Site", "B": "Warm Site", "C": "Hot Site", "D": "Mirrored Site"}, "correct": "A", "explanation": null, "source": "powerpoint", "source_label": "PPT Slide 231 (Security Operations)"}, {"id": "ppt_232", "number": 232, "question": "A leased recovery facility is equipped with power, HVAC, telephone capabilities, and some, but not all of the  equipment necessary for complete recovery.  What type of recovery site is this?", "options": {"A": "An External  Hot Site.", "B": "A Mobile  Hot Site.", "C": "A Warm  Site.", "D": "A Cold  Site."}, "correct": "C", "explanation": "This site does not have enough equipment to be a hot site (whether external or mobile) and it has more equipment than would a cold site.", "source": "powerpoint", "source_label": "PPT Slide 232 (Security Operations)"}, {"id": "ppt_234", "number": 234, "question": "Which answer below is the MOST accurate description of what audit logs provide with respect to security?", "options": {"A": "They contain valuable information on the operation of the system.", "B": "They alert security professionals whenever a failed login attempt occurs.", "C": "They provide ways to collect audit logs across multiple systems.", "D": "They collect information on how the Web Server E-Commerce system is holding up to recent increased activity."}, "correct": "A", "explanation": "Answer (A) is correct. Answers (B) and (D) are too limiting. Answer (C) is wrong, as it describes a coordinated system, such as a log aggregation tool (such as Splunk, for ex).", "source": "powerpoint", "source_label": "PPT Slide 234 (Security Operations)"}, {"id": "ppt_235", "number": 235, "question": "A degausser has been used to completely wipe a drive, but there is still data remaining on the drive.  Which answer below would be the BEST explanation for why this happened?", "options": {"A": "The degausser had inadequate magnetic erasure capabilities.", "B": "The degausser was used on a solid state drive.", "C": "There was insufficient power to run the degausser properly.", "D": "The flux mechanism inside the degausser failed during the wipe."}, "correct": "B", "explanation": "Answers (A), (C), and (D) might be true, but we know for sure that degaussers do not work on SSD drives, making (B) a stronger answer.", "source": "powerpoint", "source_label": "PPT Slide 235 (Security Operations)"}, {"id": "ppt_236", "number": 236, "question": "1.   Recovery Time Objective (RTO) .", "options": {"A": "2.   Differential Backup Time  (DBT).", "B": "3.   Recovery Point Objective (RPO).", "C": "4.   Maximum Tolerable Downtime (MTD).", "D": "Strategies for restoring technology after an outage has occurred are driven by which of the following?"}, "correct": "D", "explanation": "1, and 4 1, and 3 1, 2, and 4 1, 3, and 4 #1, #3, and #4 are all uses to inform the recovery strategy.\u000bRTO = how quickly an organization intends to restore a system MTD = how long an organization has to restore a system RPO = acceptable age of the files that are to be recovered from the backup in order for normal operations to resume (aka, the acceptable amount of data loss)", "source": "powerpoint", "source_label": "PPT Slide 236 (Security Operations)"}, {"id": "ppt_237", "number": 237, "question": "In this security solution, a person has to open on
