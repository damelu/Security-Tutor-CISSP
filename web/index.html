<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISSP Study Kit - Adaptive Quiz & Exam Prep</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-alt: #262c3a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-primary: #e8eef7;
            --text-secondary: #8b92b7;
            --border: #30363d;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
            --info: #58a6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Navigation */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            sticky: top 0;
            z-index: 100;
            padding: 1rem 0;
        }

        .nav-content {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 0.5rem 1.2rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background: var(--surface-alt);
        }

        .nav-tab.active {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .nav-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            background: var(--surface-alt);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            color: var(--text-primary);
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Main Content */
        .main {
            padding: 2rem 0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .card-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--surface-alt);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            border-color: var(--accent);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #2d9e47;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-danger:hover {
            background: #da3633;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.7rem;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 200px;
            font-family: 'Courier New', monospace;
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 1.5rem;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        /* Dashboard Stats */
        .stat-card {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: var(--surface-alt);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s;
        }

        /* Domain Performance */
        .domain-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--surface-alt);
            border-radius: 6px;
            margin-bottom: 0.8rem;
        }

        .domain-name {
            flex: 0 0 200px;
            font-weight: 500;
        }

        .domain-bar {
            flex: 1;
        }

        .domain-stats {
            flex: 0 0 150px;
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .cat-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 1rem;
        }

        .cat-badge.associate {
            background: rgba(58, 134, 255, 0.2);
            color: #58a6ff;
        }

        .cat-badge.professional {
            background: rgba(88, 166, 255, 0.2);
            color: #79c0ff;
        }

        .cat-badge.expert {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent);
        }

        /* Quiz */
        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .question-number {
            font-weight: 600;
            color: var(--accent);
        }

        .question-meta {
            display: flex;
            gap: 0.8rem;
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            background: var(--surface-alt);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .badge.domain {
            border-color: var(--accent);
            color: var(--accent);
        }

        .badge.difficulty {
            border-color: var(--warning);
            color: var(--warning);
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option {
            padding: 1rem;
            background: var(--surface-alt);
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .option input[type="radio"] {
            margin-right: 0.8rem;
            cursor: pointer;
        }

        .option.selected {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .option.correct {
            border-color: var(--success);
            background: rgba(63, 185, 80, 0.1);
        }

        .option.incorrect {
            border-color: var(--error);
            background: rgba(248, 81, 73, 0.1);
        }

        /* Explanation */
        .explanation {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--surface-alt);
            border-left: 4px solid var(--accent);
            border-radius: 4px;
        }

        .explanation-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .explanation-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Quiz Progress */
        .quiz-progress {
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--surface-alt);
            border-radius: 6px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .progress-stats {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 2rem 0;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        /* Results */
        .results-container {
            text-align: center;
            padding: 2rem;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .results-message {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .results-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        /* History */
        .history-row {
            display: grid;
            grid-template-columns: 100px 120px 150px auto 100px;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: var(--surface-alt);
            border-radius: 6px;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
        }

        .history-date {
            color: var(--text-secondary);
        }

        .history-score {
            color: var(--accent);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-tabs {
                width: 100%;
                justify-content: center;
            }

            .domain-row {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }

            .domain-name {
                flex: 1;
            }

            .domain-stats {
                flex: 1;
                text-align: left;
            }

            .history-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }

            .results-details {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Utility */
        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-secondary);
        }

        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }

        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }

        .flex {
            display: flex;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gap-1 { gap: 0.5rem; }
        .gap-2 { gap: 1rem; }

        .hidden {
            display: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        /* Copy Button */
        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.4rem 0.8rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .copy-btn:hover {
            background: var(--accent-hover);
        }

        .copy-btn.copied {
            background: var(--success);
        }

        .code-block {
            position: relative;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            overflow-x: auto;
        }

        .code-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-content">
            <a href="#" class="nav-brand">CISSP Study Kit</a>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="dashboard">Dashboard</button>
                <button class="nav-tab" data-tab="tonights">Tonight's Study</button>
                <button class="nav-tab" data-tab="quiz">Quiz</button>
                <button class="nav-tab" data-tab="rewrong">Re-Quiz Wrong</button>
                <button class="nav-tab" data-tab="bank">Bank Sync</button>
                <button class="nav-tab" data-tab="history">History</button>
            </div>
            <div class="nav-actions">
                <button class="btn-icon" id="exportBtn" title="Export State">📥</button>
                <button class="btn-icon" id="importBtn" title="Import State">📤</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Dashboard Tab -->
            <div class="tab-content active" id="dashboard-tab">
                <div class="card">
                    <div class="card-header">Dashboard</div>
                    <div class="grid grid-3">
                        <div class="stat-card">
                            <div class="stat-value" id="totalAnswered">0</div>
                            <div class="stat-label">Questions Answered</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalCorrect">0</div>
                            <div class="stat-label">Correct</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="overallAccuracy">0%</div>
                            <div class="stat-label">Overall Accuracy</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Domain Performance</div>
                    <div id="domainPerformance"></div>
                </div>

                <div class="card">
                    <div class="card-header">Last Session Summary</div>
                    <div id="lastSessionSummary"></div>
                </div>

                <div class="card">
                    <div class="card-header">Quick Actions</div>
                    <div class="flex gap-2" style="flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="app.startContinueQuiz()">
                            Continue Learning
                        </button>
                        <button class="btn btn-secondary" onclick="app.showTab('quiz')">
                            Start New Quiz
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tonight's Study Tab -->
            <div class="tab-content" id="tonights-tab">
                <div class="card">
                    <div class="card-header">Tonight's Bootcamp Study</div>
                    <div class="form-group">
                        <label class="form-label">Select Study Day:</label>
                        <select id="bootcampDay" class="form-select">
                            <option value="">Choose a day...</option>
                            <option value="monday">Monday: Domains 1 & 2</option>
                            <option value="tuesday">Tuesday: Domain 3</option>
                            <option value="wednesday">Wednesday: Domains 3 & 4</option>
                            <option value="thursday">Thursday: Domains 4, 5 & 6</option>
                            <option value="friday">Friday: Domains 7 & 8</option>
                        </select>
                    </div>
                    <div id="bootcampInfo"></div>
                    <button class="btn btn-primary" onclick="app.startBootcampQuiz()" id="bootcampStartBtn" disabled>
                        Start Bootcamp Quiz
                    </button>
                </div>
            </div>

            <!-- Quiz Tab -->
            <div class="tab-content" id="quiz-tab">
                <div class="card">
                    <div class="card-header">Configure Quiz</div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Select Domains:</label>
                            <div id="domainCheckboxes"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Number of Questions:</label>
                            <input type="number" id="questionCount" class="form-input" value="20" min="1" max="240">
                        </div>
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Difficulty Levels:</label>
                            <div id="difficultyCheckboxes"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Quiz Mode:</label>
                            <select id="quizMode" class="form-select">
                                <option value="random">Random</option>
                                <option value="weak-first">Weak Domains First</option>
                                <option value="cat">CAT Adaptive</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="app.startCustomQuiz()">Start Quiz</button>
                </div>
            </div>

            <!-- Re-Quiz Wrong Tab -->
            <div class="tab-content" id="rewrong-tab">
                <div class="card">
                    <div class="card-header">Re-Quiz Wrong Answers</div>
                    <div id="rewrongStatus"></div>
                    <div id="rewrongDomainFilter" style="display:none; margin: 1rem 0;">
                        <p style="font-weight: 600; margin-bottom: 0.5rem;">Filter by Domain:</p>
                        <div id="rewrongDomainCheckboxes"></div>
                        <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
                            <button class="btn btn-secondary" onclick="app.rewrongSelectAll(true)" style="font-size: 0.85rem; padding: 0.3rem 0.75rem;">Select All</button>
                            <button class="btn btn-secondary" onclick="app.rewrongSelectAll(false)" style="font-size: 0.85rem; padding: 0.3rem 0.75rem;">Clear All</button>
                            <button class="btn btn-secondary" onclick="app.rewrongAutoSelect()" style="font-size: 0.85rem; padding: 0.3rem 0.75rem;">Auto-Select Weakest</button>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="app.startReQuiz()" id="rewrongStartBtn" disabled>
                        Start Re-Quiz (<span id="rewrongCount">0</span> questions)
                    </button>
                </div>
            </div>

            <!-- Bank Sync Tab -->
            <div class="tab-content" id="bank-tab">
                <div class="card">
                    <div class="card-header">Import from WRONG-ANSWER-BANK.md</div>
                    <div class="form-group">
                        <label class="form-label">Paste WRONG-ANSWER-BANK.md Content:</label>
                        <textarea id="bankInput" class="form-textarea" placeholder="Paste your WRONG-ANSWER-BANK.md content here..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="app.importBank()">Import Questions</button>
                    <div id="bankStatus" class="mt-2"></div>
                </div>
            </div>

            <!-- History Tab -->
            <div class="tab-content" id="history-tab">
                <div class="card">
                    <div class="card-header">Quiz History</div>
                    <div id="historyContent"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Quiz Modal -->
    <div class="modal" id="quizModal">
        <div class="modal-content" id="quizContent"></div>
    </div>

    <!-- Results Modal -->
    <div class="modal" id="resultsModal">
        <div class="modal-content">
            <div id="resultsContent"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal()">Close</button>
                <button class="btn btn-primary" onclick="app.exportSessionResults()">Export Results</button>
            </div>
        </div>
    </div>

    <script>
        // Embedded questions data
        const QUESTIONS_DATA = {"version": "1.0", "generated": "2026-03-03", "domains": {"Security and Risk Management": {"weight": 0.15, "associate": [{"id": "srm_a_001", "question": "What is the primary purpose of a risk assessment in information security?", "options": ["A) To identify and quantify threats and vulnerabilities to organizational assets", "B) To ensure all security tools are installed and configured correctly", "C) To provide a comprehensive IT audit of all systems", "D) To comply with audit requirements only"], "correct": "A", "explanation": "Risk assessment identifies and quantifies threats and vulnerabilities affecting organizational assets. This is fundamental to security planning. B is a control implementation step, C is too broad (general audit), D is a side benefit, not the primary purpose.", "memory_hook": "RISK = Realize (identify) what threats and vulnerabilities exist to your assets"}, {"id": "srm_a_002", "question": "Which of the following BEST defines 'threat' in the context of risk management?", "options": ["A) A weakness in a system or process that could be exploited", "B) Any circumstance or event with potential to cause harm to an organization", "C) The likelihood that a vulnerability will be exploited", "D) A documented incident that has already occurred"], "correct": "B", "explanation": "A threat is any circumstance or event with potential to cause harm. A is a vulnerability, C is probability/likelihood (not threat itself), D is a realized incident, not a threat.", "memory_hook": "Threat = Thing that threatens (potential harm, not yet realized)"}, {"id": "srm_a_003", "question": "What does a vulnerability represent in risk management?", "options": ["A) The likelihood a threat will occur in a given year", "B) A weakness in systems, processes, or controls that could be exploited", "C) The financial impact if a security breach occurs", "D) The intentional act of exploiting a system weakness"], "correct": "B", "explanation": "A vulnerability is a weakness that could be exploited by a threat. A describes probability, C is impact/loss, D is an actual attack/exploitation.", "memory_hook": "Vulnerability = Void in your defenses (weakness to exploit)"}, {"id": "srm_a_004", "question": "Which risk analysis method uses historical data and statistical analysis?", "options": ["A) Qualitative risk analysis", "B) Quantitative risk analysis", "C) Subjective risk assessment", "D) Descriptive risk evaluation"], "correct": "B", "explanation": "Quantitative analysis uses numerical data, historical trends, and mathematical models. Qualitative (A) uses judgment and scoring without numerical values. C and D are not standard CISSP terminology for risk analysis methods.", "memory_hook": "Quantitative = Quantities (numbers, formulas, historical data)"}, {"id": "srm_a_005", "question": "What is the primary goal of a business continuity plan (BCP)?", "options": ["A) To eliminate all possible disruptions to business operations", "B) To ensure critical business functions can be resumed quickly after a disruption", "C) To provide insurance coverage for all potential incidents", "D) To replace disaster recovery planning entirely"], "correct": "B", "explanation": "BCP ensures critical functions resume quickly after disruption. A is impossible (can't eliminate all disruptions), C is not BCP's role, D is incorrect (BCP and DR are complementary).", "memory_hook": "BCP = Business Critical Plan (resume operations fast)"}, {"id": "srm_a_006", "question": "Which of the following is a key component of risk management governance?", "options": ["A) Regular risk assessments and documented policies", "B) Installing intrusion detection systems across all networks", "C) Eliminating all third-party vendor relationships", "D) Requiring all employees to pass annual certifications"], "correct": "A", "explanation": "Risk governance includes documented policies, regular assessments, and clear roles. B is a technical control, C is unrealistic business strategy, D is training but not core governance.", "memory_hook": "Governance = Guide + Guard (policy + assessment)"}, {"id": "srm_a_007", "question": "What does 'risk mitigation' mean?", "options": ["A) Completely eliminating all risk from operations", "B) Implementing controls to reduce the likelihood or impact of a risk", "C) Accepting risk without implementing any controls", "D) Transferring risk entirely to insurance companies"], "correct": "B", "explanation": "Mitigation implements controls to reduce risk. A is unrealistic (can't eliminate all), C is risk acceptance (not mitigation), D is risk transfer/insurance (different strategy).", "memory_hook": "Mitigate = Make it less bad (reduce likelihood or impact)"}, {"id": "srm_a_008", "question": "Which framework is commonly used for enterprise risk management across industries?", "options": ["A) COSO Enterprise Risk Management - Integrated Framework", "B) ISO 27001 Information Security Management System", "C) NIST Cybersecurity Framework only", "D) COBIT for risk management exclusively"], "correct": "A", "explanation": "COSO ERM is the widely recognized enterprise risk management framework. B is for info security specifically, C is for cybersecurity (not enterprise-wide), D is IT governance not enterprise RM.", "memory_hook": "COSO = Comprehensive Overall Systems Oversight (enterprise RM)"}, {"id": "srm_a_009", "question": "What is the relationship between a threat actor and a threat?", "options": ["A) They are the same thing in different contexts", "B) A threat actor is the entity that could realize a threat", "C) A threat is always external; threat actors are always internal", "D) There is no standard relationship in risk management"], "correct": "B", "explanation": "A threat actor is a person/entity (attacker, competitor, insider) that could carry out a threat. A confuses terms, C is incorrect (both can be internal/external), D is incorrect (relationship is defined).", "memory_hook": "Threat Actor = Agent/entity that acts on threat (realizes it)"}, {"id": "srm_a_010", "question": "Which of the following BEST describes 'residual risk'?", "options": ["A) Risk that remains after all security controls are implemented", "B) Risk that was not addressed in a previous risk assessment", "C) Risk that exceeds organizational risk appetite", "D) Risk that is transferred to third parties through insurance"], "correct": "A", "explanation": "Residual risk is the remaining risk after controls are applied. B is unaddressed risk (different concept), C is risk exceeding tolerance, D is transferred risk (not residual).", "memory_hook": "Residual = Remaining (what's left after controls)"}], "professional": [{"id": "srm_p_001", "question": "An organization discovers that several employee credentials have been compromised due to a weak password policy. The CISO discovers that most employees store passwords in spreadsheets. What should the organization address FIRST to manage this risk?", "options": ["A) Implement multi-factor authentication immediately on all systems", "B) Establish and enforce a strong password policy and educate employees on credential storage", "C) Terminate all employees who stored passwords insecurely", "D) Replace all identity management systems with a newer platform"], "correct": "B", "explanation": "First address root cause (weak policy, behavior). A is good but secondary, C is excessive, D is expensive without addressing policy/behavior first. Must fix the gap in governance/policy before controls.", "memory_hook": "Scenario First: Fix the POLICY and PEOPLE (root cause) before tools"}, {"id": "srm_p_002", "question": "A manufacturing organization has identified a critical dependency on a single third-party supplier for encryption keys. The organization's risk assessment shows this creates unacceptable operational risk. What is the MOST appropriate risk response?", "options": ["A) Accept the risk and document it as a known issue", "B) Immediately terminate the supplier relationship", "C) Implement redundancy by adding a backup supplier and establishing key escrow procedures", "D) Migrate all systems to in-house key generation within 30 days"], "correct": "C", "explanation": "Implement redundancy and backup procedures to mitigate the dependency risk. A ignores unacceptable risk, B is disruptive, D is rushed without proper planning. C balances risk reduction with business continuity.", "memory_hook": "Third-Party Risk: Add redundancy and backup (don't go single-source)"}, {"id": "srm_p_003", "question": "After a major security incident, the organization must decide between implementing expensive controls now versus waiting for budget approval next quarter. What should guide this decision?", "options": ["A) Always wait for budget approval to maintain fiscal discipline", "B) Implement only low-cost controls and defer expensive ones", "C) Perform a cost-benefit analysis considering the likelihood and impact of future incidents", "D) Implement all controls immediately regardless of cost"], "correct": "C", "explanation": "Use risk analysis (likelihood \u00d7 impact) versus control cost to decide. A and B may leave residual risk too high, D ignores financial responsibility. C balances security and business needs.", "memory_hook": "Post-Incident: Analyze cost of control vs. cost of future breach"}, {"id": "srm_p_004", "question": "A healthcare organization must comply with HIPAA while also maintaining a competitive advantage through proprietary data analytics. The two goals create conflicting security requirements. How should the organization approach this?", "options": ["A) Prioritize competitive advantage and comply with HIPAA minimally", "B) Maintain HIPAA compliance only and abandon analytics initiatives", "C) Align analytics requirements with HIPAA controls and re-architect to support both", "D) Use compensating controls only for HIPAA and rely on obscurity for analytics data"], "correct": "C", "explanation": "Integrate requirements by re-architecting to meet both. A violates compliance, B abandons business value, D relies on obscurity (weak control). C achieves both through proper design.", "memory_hook": "Conflicting Goals: Re-architect to satisfy both, not just one"}, {"id": "srm_p_005", "question": "An organization has identified that insider threat is a significant concern in a sensitive R&D department. Current controls rely mainly on access logs and annual reviews. What additional approach should be prioritized?", "options": ["A) Implement continuous user behavior analytics and anomaly detection", "B) Install hidden cameras to monitor all employee activity", "C) Require employees to sign non-disclosure agreements only", "D) Terminate employment for any minor policy violations"], "correct": "A", "explanation": "Continuous analytics and anomaly detection enable early detection of unusual behavior. B violates privacy/laws, C is passive, D is excessive. A provides real-time insight to detect threats.", "memory_hook": "Insider Threat: Use behavior analytics (catch unusual activity early)"}, {"id": "srm_p_006", "question": "An organization acquires a company with legacy systems that cannot meet current security standards for 18 months due to integration complexity. How should the security team manage this risk?", "options": ["A) Require immediate replacement of all legacy systems", "B) Isolate systems with compensating controls, document residual risk, and create a remediation timeline", "C) Accept the risk without controls during the integration period", "D) Defer security assessment until integration is complete"], "correct": "B", "explanation": "Implement compensating controls while building remediation plan with timeline. A is unrealistic, C ignores risk, D defers risk without mitigation. B balances business need with security.", "memory_hook": "Legacy Systems: Compensate + Document + Remediate (with timeline)"}, {"id": "srm_p_007", "question": "A financial services firm experiences a data breach affecting customer payment card data. The incident response team has contained the breach, but now must decide on breach notification strategy. What should drive this decision?", "options": ["A) Minimize notification to reduce brand damage and regulatory liability", "B) Comply with applicable laws, regulations, and customer notification requirements", "C) Notify only affected executives and financial stakeholders", "D) Wait until legal review is complete before any notification (6-12 months)"], "correct": "B", "explanation": "Laws (PCI-DSS, state breach notification, etc.) mandate timely notification. A violates regulations, C incomplete, D delays required notification. B ensures legal compliance and customer protection.", "memory_hook": "Breach Notification: LAW determines timing, not brand concerns"}, {"id": "srm_p_008", "question": "An organization plans to expand cloud services but cloud-specific risks are not well understood by the current risk team. What should the organization do FIRST?", "options": ["A) Hire experienced cloud security consultants to perform a comprehensive risk assessment", "B) Adopt the cloud vendor's security documentation as the risk assessment", "C) Postpone cloud expansion until executives have cloud certifications", "D) Use the same risk assessment methodology as on-premises systems"], "correct": "A", "explanation": "Cloud risks differ from on-premises (shared responsibility, data location, compliance). Get expert assessment first. B relies on vendor claims, C delays unnecessarily, D misses cloud-specific risks.", "memory_hook": "Cloud Risk: Get EXPERT assessment FIRST (shared responsibility differs)"}, {"id": "srm_p_009", "question": "A supply chain attack targets multiple organizations through a compromised software vendor. The affected software is integrated into critical infrastructure at your organization. What is the appropriate immediate response?", "options": ["A) Continue using the software while waiting for a patch", "B) Isolate systems, assess exposure, apply patches when available, and investigate for compromise", "C) Shut down all affected systems indefinitely", "D) Switch to a different vendor without verifying the new vendor's security"], "correct": "B", "explanation": "Isolate to prevent spread, assess scope, patch when safe, investigate for indicators of compromise. A allows continued exploitation, C is disruptive, D may introduce different risks. B balances containment and continuity.", "memory_hook": "Supply Chain Attack: Isolate \u2192 Assess \u2192 Patch \u2192 Investigate"}, {"id": "srm_p_010", "question": "An organization operates in multiple jurisdictions with different data protection regulations. Cost to fully comply with all is prohibitive. How should the organization approach this?", "options": ["A) Comply only with the strictest regulation globally (highest common baseline)", "B) Comply only with home country regulations", "C) Implement different controls per jurisdiction based on regulatory requirements", "D) Avoid operating in jurisdictions with strict regulations"], "correct": "A", "explanation": "Using the strictest (highest common baseline) simplifies compliance and often exceeds all requirements. B is incomplete, C is complex operationally, D limits business. A is practical and provides strong protection.", "memory_hook": "Multi-Jurisdiction: Use STRICTEST regulation as baseline (covers all)"}], "expert": [{"id": "srm_e_001", "question": "A CISO must balance implementing a robust security awareness program (expensive, 2-year ROI) versus immediately deploying expensive endpoint detection and response (EDR) tools. Both address insider threats but with different trade-offs: awareness reduces likelihood, EDR reduces detection time. Given constrained budget for one initiative, what BEST informs the prioritization?", "options": ["A) EDR is always superior because it provides technical detection without relying on employee behavior", "B) Analyze organizational threat model, insider threat history, detection capability gaps, and risk tolerance to determine which gap creates the highest residual risk", "C) Prioritize awareness because culture change is more sustainable long-term than tools", "D) Both have equal value; flip a coin or defer the decision until both can be funded"], "correct": "B", "explanation": "Expert decision requires analysis of organizational context: threat model (likelihood of insider threats), current gaps (detection capability vs. prevention), and risk tolerance. A is absolute (tools alone insufficient), C assumes culture is always best, D avoids decision. B uses proper risk-informed trade-off analysis.", "memory_hook": "Budget Trade-off: Analyze YOUR threat model, gaps, tolerance (context matters)"}, {"id": "srm_e_002", "question": "A manufacturing firm must decide between implementing zero-trust architecture (extensive controls, high operational friction) versus improving existing perimeter defenses (less disruptive, addresses known threats). The organization has legacy systems that don't support zero-trust. What factors BEST inform this decision?", "options": ["A) Always implement zero-trust as it is the modern best practice standard", "B) Stick with perimeter defense since legacy systems cannot support zero-trust", "C) Evaluate business risk tolerance, capability maturity, cost of operational friction, likelihood of breach scenarios, and develop phased approach aligning technology and process capability", "D) Implement zero-trust in new systems and defer legacy system decisions indefinitely"], "correct": "C", "explanation": "Expert approach considers organizational readiness, operational impact, and realistic phasing. A ignores business context and legacy constraints, B abandons security improvement, D creates inconsistent security posture. C addresses the trade-off holistically.", "memory_hook": "Architecture Decision: Phased approach matching org maturity (not best practice alone)"}, {"id": "srm_e_003", "question": "An organization's risk assessment identifies that a critical vendor has weak controls and poses significant risk, but replacing the vendor would disrupt operations for 18 months and cost 30 million dollars. Risk tolerance accepts some vendor risk. How should the organization BEST approach this multi-layered trade-off?", "options": ["A) Immediately replace the vendor regardless of cost and disruption; vendor risk is unacceptable", "B) Accept the vendor risk fully and do nothing; cost of mitigation exceeds value", "C) Implement enhanced monitoring, contractual SLAs with penalties, encryption of data in transit, and develop parallel alternative capability while negotiating vendor improvements", "D) Use insurance to transfer the vendor risk"], "correct": "C", "explanation": "Expert approach layers controls (monitoring, contract enforcement, encryption) while building long-term alternative capability. A ignores business constraints, B ignores residual risk, D transfers but doesn't reduce risk. C balances risk reduction with business reality.", "memory_hook": "Vendor Risk Trade-off: Layer controls + Build alternative + Monitor (no perfect solution)"}, {"id": "srm_e_004", "question": "A healthcare organization must balance HIPAA compliance (strict data isolation) with clinician need to access patient records across systems during emergencies. Implementing full data isolation achieves compliance but reduces care quality. How should the organization BEST resolve this compliance-versus-care conflict?", "options": ["A) Prioritize HIPAA compliance; implement strict data isolation and accept slower emergency response", "B) Prioritize care delivery; implement minimal controls to maximize data access", "C) Design access controls with emergency override capability, audit all overrides, maintain compliance documentation, and establish governance for exception handling", "D) Use compensating controls (encryption) to satisfy compliance while enabling broad access"], "correct": "C", "explanation": "Expert solution integrates compliance and business need: emergency access with logging and governance. A abandons care quality, B violates compliance, D uses encryption incorrectly (doesn't solve access control). C achieves both through proper architecture.", "memory_hook": "Compliance vs. Care: Emergency override + audit + governance (both achieved)"}, {"id": "srm_e_005", "question": "An organization faces a decision between implementing a Security Information and Event Management (SIEM) system (expensive, requires expertise, high operational overhead) versus using cloud-native detection services (less control, vendor dependency, lower cost). Both improve threat detection but create different risks. What BEST informs this strategic choice?", "options": ["A) Always choose SIEM for control; cloud dependency is too risky", "B) Always choose cloud services; they are modern and reduce operational burden", "C) Evaluate organizational detection maturity, data residency requirements, mean time to detect (MTTD) for priority threats, skill availability, total cost of ownership, and vendor lock-in tolerance", "D) Implement both redundantly to ensure detection capability"], "correct": "C", "explanation": "Expert approach requires context analysis: detection maturity (SIEM requires skills), data sovereignty (cloud may violate), priority threat MTTD (both can achieve), costs, and acceptable vendor risk. A and B are dogmatic, D is wasteful. C is proper trade-off analysis.", "memory_hook": "Tool Selection Trade-off: Analyze your org's maturity, constraints, tolerance"}, {"id": "srm_e_006", "question": "A CISO proposes a security investment that reduces breach probability from 10% to 5% but costs 5 million annually. The board argues this should not be funded because breach probability remains 5%. What is the BEST response that frames the trade-off properly?", "options": ["A) The CISO is wrong; if breaches can still occur, the investment is not justified", "B) Explain that 50% reduction in breach likelihood reduces expected loss even with 5% residual risk, and validate the decision through quantified risk analysis comparing avoided loss versus control cost", "C) State that all risks can never be eliminated and accept the breach will likely happen anyway", "D) Promise that the investment will reduce breaches to zero, or there is no justification"], "correct": "B", "explanation": "Expert response quantifies the value: 50% reduction in breach probability is significant; expected loss reduction must exceed control cost (Expected Loss = Probability \u00d7 Impact; reducing probability by 50% may provide strong ROI). A ignores risk reduction benefits, C is pessimistic, D promises impossible perfection. B properly frames the trade-off.", "memory_hook": "Risk Math: 50% reduction IS valuable (risk goes from 10% to 5% = 50% improvement)"}, {"id": "srm_e_007", "question": "An organization has invested heavily in a proprietary security architecture that now prevents adoption of cloud services, AI-driven security tools, and third-party integrations that competitors are adopting. The organization must decide whether to replace the architecture (expensive, risky transition) or accept competitive disadvantage. What BEST guides this strategic decision?", "options": ["A) Keep proprietary architecture; it is the organization's competitive advantage", "B) Replace architecture immediately despite risks; competitors are ahead", "C) Analyze business impact of not adopting new capabilities, competitive risk, cost and risk of transition, and timing that aligns with business strategy and technical readiness", "D) Maintain proprietary architecture but add bolt-on cloud services without integration"], "correct": "C", "explanation": "Expert approach balances innovation risk against business strategy: quantify competitive impact, transition cost/risk, and phasing aligned with business cycle. A ignores competitive landscape, B is reckless, D creates fragmented systems. C provides strategic framework.", "memory_hook": "Legacy Architecture: Quantify competitive impact + transition risk + align with strategy"}, {"id": "srm_e_008", "question": "A regulatory change increases compliance requirements faster than the organization can implement controls. The organization can either (1) request regulatory relief/exemption, (2) implement incomplete controls in phases, or (3) implement all controls immediately at high cost. What BEST informs prioritization among these paths?", "options": ["A) Always implement all controls immediately; regulatory compliance is non-negotiable", "B) Always request relief; implementation cost is too high", "C) Analyze regulatory flexibility options, resource availability, risk during phased implementation, penalties for non-compliance, and engage regulators early with realistic remediation plan", "D) Implement highest-risk controls only and ignore the rest"], "correct": "C", "explanation": "Expert approach: engage regulators (they may grant reasonable timelines), assess risk during interim phases, and prioritize highest-impact controls. A is absolutist, B ignores responsibility, D violates compliance. C is pragmatic and collaborative.", "memory_hook": "Compliance Gap: Engage regulator + phase high-risk controls + communicate"}, {"id": "srm_e_009", "question": "A CISO discovers that a strategic business unit is using shadow IT (unsanctioned SaaS services and cloud applications) that improves their productivity by 40% but creates significant compliance and security risks. Forcing immediate shutdown would harm business performance. How should the organization BEST address this multi-dimensional conflict?", "options": ["A) Allow shadow IT indefinitely; productivity gains outweigh security risks", "B) Immediately shut down all shadow IT services; unauthorized systems are never acceptable", "C) Conduct risk assessment on each service, categorize by risk/value, develop governance allowing low-risk high-value services with controls, phase out high-risk services while providing sanctioned alternatives", "D) Implement monitoring only without restricting access"], "correct": "C", "explanation": "Expert approach: acknowledge business value while managing risk through governance. Not all shadow IT is equally risky; segmentation and controlled adoption (with proper controls) may be optimal. A ignores risk, B ignores business need, D monitors but doesn't control. C balances both.", "memory_hook": "Shadow IT: Risk-value analysis + govern low-risk services + replace high-risk"}, {"id": "srm_e_010", "question": "An organization must decide how to allocate limited security budget across infrastructure hardening, detection capabilities, and incident response capacity. Each dollar spent reduces different types of risk: prevention, detection time, and recovery time. How should budget allocation be BEST prioritized?", "options": ["A) Allocate equally (33% each) as all are important", "B) Prioritize infrastructure hardening; prevention is always superior to detection", "C) Analyze organizational threat model, existing capability gaps, and business impact of different scenarios (undetected intrusion vs. slow recovery) to allocate based on risk reduction value per dollar", "D) Allocate all to incident response since prevention always fails eventually"], "correct": "C", "explanation": "Expert approach: different organizations have different risk profiles. An org with poor hardening faces higher intrusion likelihood; one with good hardening but poor detection faces long dwell time. Allocation must match YOUR gaps. A is arbitrary, B is dogmatic, D ignores prevention value. C is proper analysis.", "memory_hook": "Budget Allocation: Analyze YOUR gaps + scenarios (not equal split, not dogma)"}]}, "Asset Security": {"weight": 0.1, "associate": [{"id": "as_a_001", "question": "What is the PRIMARY objective of asset classification in information security?", "options": ["A) To assign ownership of IT equipment for accounting purposes", "B) To determine the appropriate level of protection and handling requirements based on value and sensitivity", "C) To comply with auditor requirements for asset inventory", "D) To manage depreciation schedules for financial reporting"], "correct": "B", "explanation": "Asset classification determines protection levels based on value/sensitivity. A is accounting focused, C is compliance as side effect not primary goal, D is financial management unrelated to security.", "memory_hook": "Classification = Calibrate protection level (based on value & sensitivity)"}, {"id": "as_a_002", "question": "Which of the following is an example of a 'tangible asset' in information security?", "options": ["A) Customer relationship database", "B) Proprietary algorithm or trade secret", "C) Physical server hardware", "D) Company reputation and brand value"], "correct": "C", "explanation": "Tangible assets are physical (server, hardware, equipment). A and B are information/intangible assets, D is reputation/intangible asset.", "memory_hook": "Tangible = Touch it (physical servers, equipment)"}, {"id": "as_a_003", "question": "What does 'data at rest' encryption protect against?", "options": ["A) Interception of data during network transmission", "B) Unauthorized access to stored data if physical storage is stolen or accessed", "C) Viewing data in applications or databases", "D) Deletion or modification of data files"], "correct": "B", "explanation": "Encryption at rest protects stored data from unauthorized reading if physical media is accessed/stolen. A is data in transit, C and D are not prevented by encryption alone.", "memory_hook": "At Rest = Resting data on disk (protect if stolen/accessed)"}, {"id": "as_a_004", "question": "Which of the following BEST describes 'data in transit' encryption?", "options": ["A) Encryption of data stored on servers and backup systems", "B) Encryption of data being transmitted across networks or communication channels", "C) Encryption of data within an application's memory", "D) Encryption of data in a database before being indexed"], "correct": "B", "explanation": "Data in transit refers to data being transmitted (network, channels). A is at rest, C is in use, D is pre-indexing preparation.", "memory_hook": "In Transit = Traveling on networks (protect during movement)"}, {"id": "as_a_005", "question": "What is the purpose of a 'data retention policy'?", "options": ["A) To keep all data indefinitely for historical analysis", "B) To define how long data should be kept based on legal, regulatory, and business requirements", "C) To prevent any data deletion for audit trail purposes", "D) To determine who can access archived data"], "correct": "B", "explanation": "Retention policy specifies appropriate retention periods based on requirements. A ignores costs/risks of indefinite storage, C prevents required deletion, D is access control not retention.", "memory_hook": "Retention Policy = Rules for how LONG to keep (legal/business based)"}, {"id": "as_a_006", "question": "Which of the following is a method for secure data destruction?", "options": ["A) Deleting files and emptying the recycle bin", "B) Removing files from the active directory", "C) Physical shredding or cryptographic erasure of storage media", "D) Moving data to archive storage"], "correct": "C", "explanation": "Secure destruction means physical shredding or cryptographic wiping (data unrecoverable). A and B leave recoverable data, D preserves data.", "memory_hook": "Secure Destruction = Shred it or cryptographically erase it (unrecoverable)"}, {"id": "as_a_007", "question": "What is the primary benefit of 'database encryption'?", "options": ["A) It prevents unauthorized database access at the application level", "B) It speeds up database query performance", "C) It protects data stored in the database from unauthorized viewing even if access is gained", "D) It eliminates the need for database access controls"], "correct": "C", "explanation": "Database encryption protects stored data confidentiality. A is access control (different), B is incorrect (encrypts slower), D is false (controls still needed), C is correct benefit.", "memory_hook": "Database Encryption = Protect stored data from viewing (even if accessed)"}, {"id": "as_a_008", "question": "Which term describes the process of permanently removing sensitive data from reports or documents before sharing?", "options": ["A) Masking", "B) Tokenization", "C) Redaction", "D) Anonymization"], "correct": "C", "explanation": "Redaction permanently removes/blocks sensitive data from documents. A is replacing with dummy data, B is replacing with tokens, D is removing identifiable information. C is the removing/blocking process.", "memory_hook": "Redaction = Remove/block out sensitive data (permanently hide)"}, {"id": "as_a_009", "question": "What is 'data masking' used for?", "options": ["A) Permanently destroying sensitive data", "B) Hiding real data values with fictitious but realistic data for testing and development", "C) Encrypting data in transit across networks", "D) Controlling who can access sensitive data"], "correct": "B", "explanation": "Masking replaces real data with realistic fake data for safe testing. A is destruction, C is encryption in transit, D is access control.", "memory_hook": "Masking = Make fake data (look real, for safe testing)"}, {"id": "as_a_010", "question": "Which of the following BEST describes 'tokenization' in data protection?", "options": ["A) Converting sensitive data into random tokens that map back to original data using a secure token server", "B) Breaking sensitive data into multiple pieces stored in different locations", "C) Encrypting data using a one-time token generated for each session", "D) Using tokens to authenticate users before accessing data"], "correct": "A", "explanation": "Tokenization replaces sensitive data with non-sensitive tokens using a token server. B is fragmentation, C is session encryption, D is authentication not tokenization.", "memory_hook": "Tokenization = Token replaces real data (with secure lookup table)"}], "professional": [{"id": "as_p_001", "question": "An organization stores sensitive customer PII (personally identifiable information) in a database used by 150 employees. Many employees don't need this data for their jobs. What should the organization implement FIRST to manage this risk?", "options": ["A) Encrypt the entire database with full-disk encryption", "B) Implement role-based access control (RBAC) to limit data access to only those who need it", "C) Move sensitive data to a separate encrypted vault", "D) Audit all employee access logs"], "correct": "B", "explanation": "Start with least privilege access control. A encrypts all but doesn't limit who can view, C is more complex than needed, D is monitoring not prevention. B addresses the core risk (unnecessary access).", "memory_hook": "Too Many Users: Apply RBAC FIRST (least privilege access)"}, {"id": "as_p_002", "question": "A company handles credit card data and must comply with PCI-DSS. The company wants to reduce the scope of PCI compliance by limiting systems handling raw credit card data. What is the BEST approach?", "options": ["A) Remove all systems from scope by moving to a PCI-compliant payment processor that tokenizes cards", "B) Encrypt credit card data in-transit and at-rest and rely on strong access controls", "C) Segregate credit card data to a small number of hardened systems and use tokenization for all other systems", "D) Use masking in production and hope compliance auditors accept it"], "correct": "A", "explanation": "Best practice: use third-party PCI-compliant processor (outsource compliance and risk). C also reduces scope but still retains some. A completely removes internal PCI responsibility. B maintains scope. D is risky.", "memory_hook": "PCI Compliance: Outsource to PCI-compliant processor (removes scope)"}, {"id": "as_p_003", "question": "An organization discovers that sensitive financial data has been classified as 'internal only' but is actually stored on shared network drives accessible to everyone in the company. What should the organization do FIRST after discovering this misclassification?", "options": ["A) Immediately reclassify the data to 'confidential' and notify all users", "B) Assess current exposure, understand who has accessed the data, restrict access immediately, and investigate for unauthorized disclosure", "C) Wait until the next annual classification review to update the classification", "D) Encrypt the data and leave the classification unchanged"], "correct": "B", "explanation": "Incident response: assess exposure first, restrict access, investigate for breach. A only fixes classification, C is too slow, D encrypts without understanding exposure. B is proper incident response.", "memory_hook": "Classification Error: Assess \u2192 Restrict \u2192 Investigate (then remediate)"}, {"id": "as_p_004", "question": "A healthcare organization must balance sharing patient data with other providers for care coordination while maintaining HIPAA confidentiality. Sharing is medically necessary but increases data exposure. What is the MOST appropriate approach?", "options": ["A) Don't share any data; confidentiality is more important than coordination", "B) Share unencrypted data with all providers that request it", "C) Implement data sharing agreements, require encryption, minimum necessary principle, and audit all access", "D) Share data only after anonymizing it completely"], "correct": "C", "explanation": "Balance medical need with privacy: agreements, encryption, minimum necessary, auditing. A prevents necessary care, B violates HIPAA, D may break clinical utility. C enables both care and privacy.", "memory_hook": "Care Coordination: Agreements + Encryption + Min-Necessary + Audit"}, {"id": "as_p_005", "question": "A company acquired sensitive data in merger and must migrate it from the seller's systems to buyer's systems. The data includes trade secrets and confidential information. What is CRITICAL during this migration?", "options": ["A) Complete the migration as quickly as possible to minimize business disruption", "B) Maintain data encryption throughout migration, verify data integrity, track chain of custody, and document all handling procedures", "C) Have the seller keep a copy of data for backup in case of issues", "D) Minimize documentation to avoid creating discoverable records"], "correct": "B", "explanation": "Data migration requires encryption, integrity verification, custody tracking, documentation. A prioritizes speed over security, C maintains unwanted copy, D violates proper records management. B ensures security and audit trail.", "memory_hook": "Data Migration: Encrypt \u2192 Verify \u2192 Track \u2192 Document (chain of custody)"}, {"id": "as_p_006", "question": "An organization uses a cloud provider to store sensitive data. The provider's data center is in a jurisdiction different from the organization's home country, creating data residency compliance concerns. How should the organization address this?", "options": ["A) Accept the risk and proceed with cloud storage", "B) Encrypt data before sending to cloud (provider can't decrypt), verify cloud location compliance requirements, and ensure contracts address data residency and sovereignty", "C) Move all data back to on-premises storage despite cloud benefits", "D) Use a different cloud provider without researching their data location practices"], "correct": "B", "explanation": "Encryption + contract verification addresses both confidentiality and residency concerns. A ignores compliance, C loses cloud benefits, D repeats the problem. B solves both issues.", "memory_hook": "Cloud Data Residency: Encrypt + Verify location + Contract controls"}, {"id": "as_p_007", "question": "A company stores sensitive data on removable media (USB drives, external drives) for business purposes. This practice is high-risk. How should the organization manage this?", "options": ["A) Prohibit all removable media use", "B) Require encryption, inventory tracking, access logging, and defined retention periods for data on removable media", "C) Allow removable media but audit it quarterly", "D) Use digital rights management (DRM) without encryption"], "correct": "B", "explanation": "Enable secure use of removable media through controls. A is restrictive, C is insufficient, D is incomplete. B balances business need with security through encryption, tracking, audit.", "memory_hook": "Removable Media: Encrypt + Track + Log + Define retention"}, {"id": "as_p_008", "question": "An organization must dispose of hardware that previously stored sensitive data. Simply removing the hard drive is not sufficient. What is the most appropriate disposal method?", "options": ["A) Donate the hardware to charity after removing the hard drive", "B) Physically destroy the hard drives or perform certified data wiping with verification before hardware disposal", "C) Delete all files and format the drives before reuse or disposal", "D) Use the hardware for lower-classification work instead of disposal"], "correct": "B", "explanation": "Proper disposal: physical destruction or certified wiping with verification. A donates without ensuring data destruction, C leaves recoverable data, D maintains exposure. B ensures data is unrecoverable.", "memory_hook": "Hardware Disposal: Destroy or certifiably wipe (with verification)"}, {"id": "as_p_009", "question": "A company implements database encryption but finds that application performance degrades by 30%. The database contains highly sensitive data. How should the organization approach this trade-off?", "options": ["A) Disable encryption to restore performance; performance is more important", "B) Disable encryption for less-sensitive data tables only", "C) Accept the performance degradation as the cost of security", "D) Evaluate transparent encryption options, optimize encryption algorithms, tune database configuration, and reassess performance; if still unacceptable, implement column-level encryption for only the most sensitive data"], "correct": "D", "explanation": "Don't choose between security and performance; optimize. A compromises security, B still reduces security, C accepts without optimizing. D seeks solutions through optimization and segmentation.", "memory_hook": "Encryption Performance Hit: Optimize algorithm + tune config + selective encryption"}, {"id": "as_p_010", "question": "After a data breach, an organization must notify customers about unauthorized access to their personal data. The organization is unsure how much detail to provide. How should it approach this?", "options": ["A) Provide minimal details to minimize customer concern", "B) Provide maximum detail including attack methods to help customers protect themselves", "C) Comply with applicable breach notification laws by providing specific, factual information about what data was affected and what actions customers should take", "D) Don't notify unless explicitly required by law"], "correct": "C", "explanation": "Notification must comply with legal requirements (which often mandate specific content). A may violate law, B may reveal attack tactics, D violates notification requirements. C balances transparency with legal compliance.", "memory_hook": "Breach Notification: Follow LAW requirements (specific, factual, actionable)"}], "expert": [{"id": "as_e_001", "question": "An organization must decide between implementing field-level encryption (encryption at the database column/field level) versus application-level encryption (encrypt before sending to database). Field-level enables some database functionality (queries, indexing); application-level provides better key management but breaks some features. How should this trade-off be resolved?", "options": ["A) Always use field-level encryption; it enables functionality", "B) Always use application-level encryption; it prevents database-level attacks", "C) Analyze data sensitivity, required database functionality, threat model, and implement segmented approach (high-sensitivity at application level, lower-sensitivity at field level) with risk acceptance for functionality gaps", "D) Use both simultaneously for defense-in-depth"], "correct": "C", "explanation": "Expert approach: no single answer fits all data types. Classify by sensitivity and requirements, segment approach accordingly. A and B are absolutist, D is redundant overhead. C tailors to organizational needs.", "memory_hook": "Encryption Level Trade-off: Segment by sensitivity + functionality needs"}, {"id": "as_e_002", "question": "A CISO must establish a data classification policy balancing security costs against business utility. Over-classification (too many levels) increases overhead; under-classification increases risk. Given limited resources, how should classification levels be BEST determined?", "options": ["A) Use industry-standard 5-level classification (top secret, secret, confidential, internal, public) for all organizations", "B) Analyze organizational data types, threat model, regulatory requirements, operational burden, and define minimum viable classification levels that address risks without excessive overhead", "C) Start with no classification and add levels only when breaches occur", "D) Use maximum classification levels (10+) to ensure all risks are covered"], "correct": "B", "explanation": "Expert approach: classification must be tailored to organizational context and risk tolerance. A uses external standard blindly, C is reactive, D is excessive. B balances security and operational reality.", "memory_hook": "Classification Levels: Risk-based (not industry standard, not excessive)"}, {"id": "as_e_003", "question": "An organization discovered that sensitive data classification tags are inconsistently applied due to unclear guidance and user burden. Reclassifying existing data would be enormous effort. However, inconsistent classification undermines controls (e.g., encryption policies based on tags). How should the organization BEST address this?", "options": ["A) Accept the current state and monitor for issues", "B) Immediately reclassify all existing data despite enormous effort", "C) Implement system-enforced default classification rules, automated tagging, phased reclassification of critical systems, and simplified guidance; prioritize highest-risk data first", "D) Abandon classification tagging and rely on access control alone"], "correct": "C", "explanation": "Pragmatic approach: automate and enforce going forward, gradually fix highest-risk existing data. A leaves risk, B is excessive, D removes useful control. C balances effort with risk.", "memory_hook": "Classification Inconsistency: Automate forward + phase historical cleanup"}, {"id": "as_e_004", "question": "An organization uses data masking in development environments to protect production data but finds that test scenarios increasingly require realistic data to detect bugs that synthetic data doesn't reveal. However, using unmasked production data in dev violates security policy. How should the organization resolve this?", "options": ["A) Use unmasked production data in dev; testing is more important than security policy", "B) Stick with masked data and accept that some bugs won't be detected in dev", "C) Implement hybrid approach: create dedicated masked but realistic dataset, subset of production data with residual sensitive values redacted, carefully controlled dev access, and document risk acceptance", "D) Build a test database from scratch with customer data simulator"], "correct": "C", "explanation": "Expert solution: balance test effectiveness with security through controlled subset approach. A violates policy, B accepts risk gaps, D is slow and may miss edge cases. C enables testing while maintaining security boundaries.", "memory_hook": "Masked Data Testing: Hybrid dataset + controlled access + risk docs"}, {"id": "as_e_005", "question": "An organization must choose between encrypt-everything-at-rest (higher overhead, simpler operations) versus selective encryption (lower overhead, requires classification discipline). Resource constraints allow only one approach. What BEST guides this choice?", "options": ["A) Always encrypt everything; operational simplicity justifies the cost", "B) Encrypt selectively; lower overhead is better", "C) Analyze organizational classification maturity, encryption performance impact, threat model (what data needs protecting?), and operational capability; choose approach matching organizational readiness", "D) Encrypt only systems that have experienced breaches before"], "correct": "C", "explanation": "Expert approach: organizational capacity and threat model determine approach. Mature classification \u2192 selective encryption (efficient). Weak classification \u2192 encrypt all (simpler). A and B are dogmatic, D is reactive. C is contextual.", "memory_hook": "Encrypt Everything vs Selective: Depends on YOUR maturity + threats"}, {"id": "as_e_006", "question": "A company faces multi-jurisdictional data residency requirements (EU GDPR, US regulations, China data localization laws requiring different data storage locations). Complying with all requirements while maintaining encryption and ensuring data utility creates significant complexity. How should the organization BEST approach this?", "options": ["A) Store all data in one location and accept regulatory violations", "B) Maintain separate data copies in each jurisdiction (massive overhead)", "C) Map data types to regulations, implement geo-distributed architecture with encryption enabling selective decryption by jurisdiction, establish data governance for residency compliance, and document risk decisions", "D) Avoid all jurisdictions with strict residency requirements"], "correct": "C", "explanation": "Expert approach: understand which regulations apply to which data, implement geo-aware architecture with encryption allowing compliance. A violates law, B is inefficient, D limits business. C is proper data sovereignty design.", "memory_hook": "Multi-Jurisdiction: Geo-aware architecture + encryption + data mapping"}, {"id": "as_e_007", "question": "An organization stores encryption keys for at-rest data encryption in the same system as the encrypted data (convenient, weak practice). Moving keys to a separate key management service (KMS) would improve security but requires significant architectural change and introduces dependency on KMS availability. How should the organization approach this trade-off?", "options": ["A) Keep keys local for simplicity and availability; data is encrypted even if keys are accessible", "B) Immediately migrate to external KMS despite architectural disruption", "C) Implement hybrid approach: migrate highest-sensitivity data keys to external KMS first, implement KMS redundancy and failover to address availability, and phase migration based on risk and operational readiness", "D) Accept the current risk and rely on access control to protect keys"], "correct": "C", "explanation": "Expert approach: improve incrementally while managing availability risk. A doesn't address key security, B is disruptive, D ignores key protection gap. C balances security improvement with operational reality.", "memory_hook": "Key Management: Migrate high-sensitivity first + redundancy + phase"}, {"id": "as_e_008", "question": "An organization uses tokenization for sensitive data but finds that tokenization reduces data utility for legitimate analytics and machine learning (which need characteristics of original data, not tokens). Creating a separate analytics dataset with real data increases breach risk. How should this be balanced?", "options": ["A) Use real data in production; tokenization is sufficient for analytics", "B) Abandon tokenization and rely on access con
