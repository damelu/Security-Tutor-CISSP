<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISSP Mission Control - Adaptive Quiz & Exam Prep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Core */
            --bg-0: #070b14;
            --bg-1: #0d1324;
            --bg-2: #121a30;
            --surface-1: #121c33;
            --surface-2: #17233f;
            --surface-3: #1e2d4f;
            --line-1: #26375f;
            --line-2: #314674;
            
            /* Brand */
            --brand-500: #4f7cff;
            --brand-400: #6f98ff;
            --brand-300: #93b3ff;
            --brand-glow: 79, 124, 255;
            
            /* Semantic */
            --ok-500: #28c48f;
            --warn-500: #f3b343;
            --danger-500: #ff5f6d;
            --info-500: #59b6ff;
            
            /* Text */
            --text-1: #eef3ff;
            --text-2: #b6c3e3;
            --text-3: #8e9dbe;
            
            /* Backward-compatible aliases (JS references these!) */
            --bg: var(--bg-0);
            --surface: var(--surface-1);
            --surface-alt: var(--surface-2);
            --accent: var(--brand-500);
            --accent-hover: var(--brand-400);
            --accent-light: var(--brand-300);
            --text-primary: var(--text-1);
            --text-secondary: var(--text-2);
            --text-muted: var(--text-3);
            --border: var(--line-1);
            --success: var(--ok-500);
            --success-light: #d1fae5;
            --warning: var(--warn-500);
            --warning-light: #fef3c7;
            --error: var(--danger-500);
            --error-light: #fee2e2;
            --info: var(--info-500);
            --bg-tertiary: var(--bg-2);
            --danger: var(--danger-500);
            --glow: 0 0 20px rgba(var(--brand-glow), 0.15);
            --glow-hover: 0 0 30px rgba(var(--brand-glow), 0.25);
            
            /* Radius */
            --r-xs: 8px;
            --r-sm: 12px;
            --r-md: 16px;
            --r-lg: 20px;
            
            /* Shadow */
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 12px 30px rgba(5, 10, 20, 0.35);
            --shadow-glow: 0 0 0 1px rgba(var(--brand-glow), 0.4), 0 12px 32px rgba(var(--brand-glow), 0.20);
            
            /* Motion */
            --dur-fast: 140ms;
            --dur-base: 220ms;
            --dur-slow: 360ms;
            --ease-standard: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at top, rgba(79, 124, 255, 0.06) 0%, transparent 60%), var(--bg-0);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Gradient header bar */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--brand-500), var(--brand-400), var(--brand-500));
            background-size: 200% 100%;
            z-index: 1000;
            animation: gradientShift 3s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--line-1);
            border-radius: var(--r-xs);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--line-2);
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            background: rgba(13, 19, 36, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line-1);
            z-index: 100;
            padding: 1rem 0;
        }

        .nav-content {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .nav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            white-space: nowrap;
            letter-spacing: -0.5px;
        }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            flex: 1;
        }

        .nav-tab {
            padding: 0.5rem 1rem;
            border-radius: 999px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all var(--dur-base) var(--ease-standard);
            white-space: nowrap;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background: rgba(79, 124, 255, 0.1);
        }

        .nav-tab.active {
            background: var(--brand-500);
            color: white;
            box-shadow: 0 0 20px rgba(79, 124, 255, 0.5);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-icon {
            padding: 0.5rem 1rem;
            border: 1px solid var(--line-1);
            background: var(--surface-1);
            color: var(--text-secondary);
            border-radius: var(--r-sm);
            cursor: pointer;
            font-size: 0.875rem;
            transition: all var(--dur-base) var(--ease-standard);
        }

        .btn-icon:hover {
            background: var(--surface-2);
            border-color: var(--brand-500);
            color: var(--text-primary);
        }

        /* Main Content */
        main {
            padding: 3rem 0;
            margin-top: 3px;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn var(--dur-base) var(--ease-standard);
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards */
        .card {
            background: var(--surface-1);
            border: 1px solid var(--line-1);
            border-radius: var(--r-sm);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            transition: all var(--dur-base) var(--ease-standard);
        }

        .card:hover {
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }

        .card-header {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        /* Stats */
        .stat-card {
            background: linear-gradient(135deg, rgba(79, 124, 255, 0.1), rgba(79, 124, 255, 0.05));
            border: 1px solid var(--line-1);
            border-radius: var(--r-sm);
            padding: 1.5rem;
            text-align: center;
            transition: all var(--dur-base) var(--ease-standard);
        }

        .stat-card:nth-child(2) {
            background: linear-gradient(135deg, rgba(40, 196, 143, 0.1), rgba(40, 196, 143, 0.05));
        }

        .stat-card:nth-child(3) {
            background: linear-gradient(135deg, rgba(147, 179, 255, 0.1), rgba(147, 179, 255, 0.05));
        }

        .stat-card:hover {
            box-shadow: var(--shadow-glow);
            transform: translateY(-4px);
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--brand-500);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .stat-card:nth-child(2) .stat-value {
            color: var(--ok-500);
        }

        .stat-card:nth-child(3) .stat-value {
            color: var(--brand-300);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 1.5rem;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--r-sm);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--dur-base) var(--ease-standard);
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-500), var(--brand-400));
            color: white;
            box-shadow: 0 4px 12px rgba(79, 124, 255, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(79, 124, 255, 0.4);
        }

        .btn-secondary {
            background: var(--surface-2);
            color: var(--text-primary);
            border: 1px solid var(--line-1);
        }

        .btn-secondary:hover {
            background: var(--surface-3);
            border-color: var(--brand-500);
        }

        .btn-success {
            background: var(--ok-500);
            color: white;
        }

        .btn-danger {
            background: var(--danger-500);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--surface-2);
            border: 1px solid var(--line-1);
            border-radius: var(--r-sm);
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all var(--dur-base) var(--ease-standard);
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--brand-500);
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.1);
        }

        .form-textarea {
            font-family: 'JetBrains Mono', monospace;
            min-height: 150px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            background: var(--surface-2);
            border: 1.5px solid var(--line-1);
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: all var(--dur-base) var(--ease-standard);
        }

        .checkbox-item:hover {
            background: var(--surface-3);
            border-color: var(--brand-500);
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 0.75rem;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--brand-500);
        }

        /* Code Block */
        .code-block {
            background: var(--bg-1);
            border: 1px solid var(--line-1);
            border-radius: var(--r-sm);
            padding: 1rem;
            overflow-x: auto;
        }

        .code-content {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .copy-btn {
            position: relative;
            padding: 0.5rem 1rem;
            background: var(--surface-1);
            border: 1px solid var(--line-1);
            color: var(--text-secondary);
            border-radius: var(--r-xs);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all var(--dur-base) var(--ease-standard);
        }

        .copy-btn:hover {
            background: var(--surface-2);
            border-color: var(--brand-500);
            color: var(--text-primary);
        }

        /* Progress Bar */
        .progress-bar {
            background: var(--surface-2);
            border-radius: var(--r-xs);
            height: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--brand-500), var(--brand-400));
            height: 100%;
            border-radius: var(--r-xs);
            transition: width var(--dur-slow) var(--ease-standard);
        }

        /* Domain Performance */
        .domain-row {
            padding: 1.5rem;
            background: var(--surface-2);
            border-radius: var(--r-sm);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            transition: all var(--dur-base) var(--ease-standard);
        }

        .domain-row:hover {
            background: var(--surface-3);
        }

        .domain-name {
            font-weight: 600;
            color: var(--text-primary);
            min-width: 150px;
        }

        .domain-bar {
            flex: 1;
            min-width: 200px;
        }

        .domain-stats {
            text-align: right;
            min-width: 100px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            background: var(--surface-2);
            border: 1px solid var(--line-1);
            border-radius: var(--r-xs);
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        .difficulty {
            padding: 0.25rem 0.75rem;
            font-size: 0.7rem;
            border-radius: var(--r-xs);
            font-weight: 600;
        }

        .difficulty:contains("Easy") {
            background: rgba(40, 196, 143, 0.15);
            color: var(--ok-500);
        }

        .difficulty:contains("Medium") {
            background: rgba(243, 179, 67, 0.15);
            color: var(--warn-500);
        }

        .difficulty:contains("Hard") {
            background: rgba(255, 95, 109, 0.15);
            color: var(--danger-500);
        }

        .cat-badge {
            background: rgba(79, 124, 255, 0.2);
            color: var(--brand-300);
            border: 1px solid var(--brand-500);
        }

        .associate {
            background: rgba(89, 182, 255, 0.15);
            color: var(--info-500);
            border: 1px solid var(--info-500);
        }

        .professional {
            background: rgba(79, 124, 255, 0.15);
            color: var(--brand-500);
            border: 1px solid var(--brand-500);
        }

        .expert {
            background: rgba(243, 179, 67, 0.15);
            color: var(--warn-500);
            border: 1px solid var(--warn-500);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 500;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            animation: modalFade var(--dur-base) var(--ease-standard);
        }

        @keyframes modalFade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface-1);
            border: 1px solid var(--line-1);
            border-radius: var(--r-md);
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp var(--dur-base) var(--ease-standard);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--line-1);
        }

        /* Quiz Elements */
        .question-card {
            background: var(--surface-1);
            border: 1px solid var(--line-1);
            border-radius: var(--r-sm);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--line-1);
        }

        .question-number {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--brand-500);
        }

        .question-text {
            font-size: 1.125rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            padding: 1.25rem;
            background: var(--surface-2);
            border: 2px solid var(--line-1);
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: all var(--dur-base) var(--ease-standard);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .option:hover {
            background: var(--surface-3);
            border-color: var(--brand-500);
        }

        .option input[type="radio"] {
            margin-top: 0.25rem;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--brand-500);
            flex-shrink: 0;
        }

        .option.selected {
            background: rgba(79, 124, 255, 0.15);
            border-color: var(--brand-500);
            box-shadow: var(--shadow-glow);
        }

        .option.correct {
            background: rgba(40, 196, 143, 0.15);
            border-color: var(--ok-500);
        }

        .option.incorrect {
            background: rgba(255, 95, 109, 0.15);
            border-color: var(--danger-500);
        }

        .explanation {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--surface-2);
            border-left: 4px solid var(--brand-500);
            border-radius: var(--r-sm);
        }

        .explanation-title {
            font-weight: 700;
            color: var(--brand-500);
            margin-bottom: 0.5rem;
        }

        .explanation-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.7;
        }

        /* Results */
        .results-container {
            text-align: center;
            padding: 2rem;
        }

        .results-score {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--brand-500);
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .results-message {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .results-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        /* Quiz Progress */
        .quiz-progress {
            margin-bottom: 2rem;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .progress-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            margin-top: 0.75rem;
        }

        /* Utility Classes */
        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-muted);
        }

        .fade-in {
            animation: fadeIn var(--dur-base) var(--ease-standard);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .mt-2 {
            margin-top: 1rem;
        }

        .gap-2 {
            gap: 1rem;
        }

        .flex {
            display: flex;
        }

        /* History */
        .history-row {
            padding: 1rem;
            background: var(--surface-2);
            border-radius: var(--r-sm);
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-date {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .history-score {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--brand-500);
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                gap: 1rem;
                padding: 0 1rem;
            }

            .nav-tabs {
                width: 100%;
                flex-wrap: wrap;
            }

            .nav-tab {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }

            .container {
                padding: 0 1rem;
            }

            .card {
                padding: 1.5rem;
            }

            .modal-content {
                padding: 1.5rem;
                max-width: calc(100vw - 2rem);
            }

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .question-card {
                padding: 1.5rem;
            }

            .results-score {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-content">

    <script>
        // Embedded questions data (generated quiz bank)
        const QUESTIONS_DATA = PLACEHOLDER_QUESTIONS_DATA;

        // Real course homework questions from Excel tracker + PDF
        const HOMEWORK_DATA = PLACEHOLDER_HOMEWORK_DATA;

        // Domain definitions
        const DOMAINS = {
            "Security and Risk Management": "D1",
            "Asset Security": "D2",
            "Security Architecture and Engineering": "D3",
            "Communication and Network Security": "D4",
            "Identity and Access Management": "D5",
            "Security Assessment and Testing": "D6",
            "Security Operations": "D7",
            "Software Development Security": "D8"
        };

        const DOMAIN_WEIGHTS = {
            "Security and Risk Management": 0.16,
            "Asset Security": 0.10,
            "Security Architecture and Engineering": 0.13,
            "Communication and Network Security": 0.13,
            "Identity and Access Management": 0.13,
            "Security Assessment and Testing": 0.12,
            "Security Operations": 0.13,
            "Software Development Security": 0.10
        };

        const BOOTCAMP_SCHEDULE = {
            monday: ["Security and Risk Management", "Asset Security"],
            tuesday: ["Security Architecture and Engineering"],
            wednesday: ["Security Architecture and Engineering", "Communication and Network Security"],
            thursday: ["Communication and Network Security", "Identity and Access Management", "Security Assessment and Testing"],
            friday: ["Security Operations", "Software Development Security"]
        };

        class CISSPStudyApp {
            constructor() {
                this.questions = [];
                this.currentQuiz = null;
                this.currentQuestionIndex = 0;
                this.quizAnswers = {};
                this.state = this.loadState();
                this.init();
            }

            init() {
                this.loadQuestions();
                this.setupEventListeners();
                this.renderDashboard();
                this.renderBootcampOptions();
                this.renderDomainCheckboxes();
                this.renderDifficultyCheckboxes();
                this.updateRewrongStatus();
                this.updateHistory();

                // Show auto-save status on load
                const el = document.getElementById('autoSaveStatus');
                if (el && this.state.totalAnswered > 0) {
                    el.textContent = 'Progress auto-saved in browser';
                }
            }

            loadState() {
                const saved = localStorage.getItem('cissp_state');
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('Failed to load state:', e);
                    }
                }
                return {
                    domainStats: {},
                    wrongAnswers: {},
                    quizHistory: [],
                    sessions: [],
                    totalAnswered: 0,
                    totalCorrect: 0,
                    streak: 0,
                    catLevels: {},
                    lastSessionDate: null,
                    lastSessionDomains: []
                };
            }

            saveState() {
                localStorage.setItem('cissp_state', JSON.stringify(this.state));
                const el = document.getElementById('autoSaveStatus');
                if (el) {
                    const now = new Date();
                    const time = now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                    el.textContent = 'Auto-saved ' + time;
                    el.style.color = 'var(--success)';
                    setTimeout(() => { el.style.color = 'var(--text-muted)'; }, 2000);
                }
            }

            loadQuestions() {
                // Flatten all questions from the embedded data
                this.questions = [];
                for (const domain in QUESTIONS_DATA.domains) {
                    const domainData = QUESTIONS_DATA.domains[domain];
                    ['associate', 'professional', 'expert'].forEach(difficulty => {
                        if (domainData[difficulty]) {
                            domainData[difficulty].forEach(q => {
                                this.questions.push({
                                    ...q,
                                    domain,
                                    difficulty
                                });
                            });
                        }
                    });
                }
            }

            setupEventListeners() {
                // Tab switching
                document.querySelectorAll('.nav-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        const tabName = e.target.dataset.tab;
                        this.showTab(tabName);
                    });
                });

                // Bootcamp day selection
                document.getElementById('bootcampDay').addEventListener('change', (e) => {
                    document.getElementById('bootcampStartBtn').disabled = !e.target.value;
                    this.renderBootcampInfo(e.target.value);
                });

                // Export/Import
                document.getElementById('exportBtn').addEventListener('click', () => this.exportState());
                document.getElementById('importBtn').addEventListener('click', () => this.importState());
            }

            showTab(tabName) {
                // Hide all tabs
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                document.querySelectorAll('.nav-tab').forEach(tab => {
                    tab.classList.remove('active');
                });

                // Show selected tab
                document.getElementById(tabName + '-tab').classList.add('active');
                document.querySelector('[data-tab="' + tabName + '"]').classList.add('active');

                // Refresh tab content
                if (tabName === 'dashboard') this.renderDashboard();
                if (tabName === 'history') this.updateHistory();
                if (tabName === 'rewrong') this.updateRewrongStatus();
            }

            renderDashboard() {
                // Update stats
                document.getElementById('totalAnswered').textContent = this.state.totalAnswered;
                document.getElementById('totalCorrect').textContent = this.state.totalCorrect;
                const accuracy = this.state.totalAnswered > 0 
                    ? Math.round((this.state.totalCorrect / this.state.totalAnswered) * 100)
                    : 0;
                document.getElementById('overallAccuracy').textContent = accuracy + '%';

                // Render domain performance
                const domainPerf = document.getElementById('domainPerformance');
                domainPerf.innerHTML = '';
                
                for (const domain in DOMAINS) {
                    const stats = this.state.domainStats[domain] || { correct: 0, total: 0, byDifficulty: {} };
                    const catLevel = this.state.catLevels[domain] || 'associate';
                    const domainAccuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                    
                    const row = document.createElement('div');
                    row.className = 'domain-row';
                    row.innerHTML = '<div class="domain-name">' + domain + '</div>' +
                        '<div class="domain-bar">' +
                        '<div class="progress-bar">' +
                        '<div class="progress-fill" style="width: ' + domainAccuracy + '%"></div>' +
                        '</div>' +
                        '</div>' +
                        '<div class="domain-stats">' +
                        stats.correct + '/' + stats.total + ' (' + domainAccuracy + '%)' +
                        '<span class="cat-badge ' + catLevel + '">' + catLevel + '</span>' +
                        '</div>';
                    domainPerf.appendChild(row);
                }

                // Last session summary
                const lastSessionDiv = document.getElementById('lastSessionSummary');
                if (this.state.quizHistory.length > 0) {
                    const lastSession = this.state.quizHistory[this.state.quizHistory.length - 1];
                    lastSessionDiv.innerHTML = '<p><strong>Date:</strong> ' + new Date(lastSession.date).toLocaleDateString() + '</p>' +
                        '<p><strong>Score:</strong> ' + lastSession.score + '%</p>' +
                        '<p><strong>Questions:</strong> ' + lastSession.correct + '/' + lastSession.total + '</p>' +
                        '<p><strong>Domains:</strong> ' + lastSession.domains.join(', ') + '</p>' +
                        '<p><strong>Time:</strong> ' + Math.round(lastSession.elapsed / 60) + ' minutes</p>';
                } else {
                    lastSessionDiv.innerHTML = '<p class="text-muted">No sessions yet. Start a quiz to begin!</p>';
                }
            }

            renderBootcampOptions() {
                // Day selection is already in HTML
            }

            renderBootcampInfo(day) {
                const domainDiv = document.getElementById('bootcampInfo');
                const filterDiv = document.getElementById('bootcampSourceFilter');
                if (!day) {
                    domainDiv.innerHTML = '';
                    filterDiv.style.display = 'none';
                    return;
                }

                const hw = HOMEWORK_DATA[day];
                if (!hw) {
                    domainDiv.innerHTML = '<p class="text-muted">No homework data for this day.</p>';
                    filterDiv.style.display = 'none';
                    return;
                }
                let html = '<p><strong>' + hw.domain + '</strong></p>';
                html += '<p>' + hw.count + ' total questions from course materials.</p>';
                domainDiv.innerHTML = html;

                // Show source filter and update counts
                filterDiv.style.display = 'block';
                document.getElementById('hwPdfCount').textContent = hw.pdf_count;
                document.getElementById('hwPptCount').textContent = hw.ppt_count;
                this.updateHwCount();
            }

            renderDomainCheckboxes() {
                const container = document.getElementById('domainCheckboxes');
                let html = '';
                for (const domain in DOMAINS) {
                    html += '<label style="display: flex; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">' +
                        '<input type="checkbox" name="domain" value="' + domain + '" checked style="margin-right: 0.5rem;">' +
                        domain + ' (' + DOMAINS[domain] + ')' +
                        '</label>';
                }
                container.innerHTML = html;
            }

            renderDifficultyCheckboxes() {
                const container = document.getElementById('difficultyCheckboxes');
                const difficulties = ['associate', 'professional', 'expert'];
                let html = '';
                difficulties.forEach(d => {
                    const label = d.charAt(0).toUpperCase() + d.slice(1);
                    html += '<label style="display: flex; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">' +
                        '<input type="checkbox" name="difficulty" value="' + d + '" checked style="margin-right: 0.5rem;">' +
                        label +
                        '</label>';
                });
                container.innerHTML = html;
            }

            updateHwCount() {
                const day = document.getElementById('bootcampDay').value;
                if (!day) return;
                const hw = HOMEWORK_DATA[day];
                if (!hw) return;
                const sources = Array.from(document.querySelectorAll('input[name="hwSource"]:checked')).map(el => el.value);
                let count = 0;
                if (sources.includes('pdf')) count += hw.pdf_count;
                if (sources.includes('ppt')) count += hw.ppt_count;
                document.getElementById('hwTotalCount').textContent = count;
                document.getElementById('bootcampStartBtn').disabled = count === 0;
            }

            startBootcampQuiz() {
                const day = document.getElementById('bootcampDay').value;
                if (!day) return;

                const hw = HOMEWORK_DATA[day];
                if (!hw) {
                    alert('No homework data for this day');
                    return;
                }

                const sources = Array.from(document.querySelectorAll('input[name="hwSource"]:checked')).map(el => el.value);
                let allQuestions = [];

                // Add PDF questions
                if (sources.includes('pdf') && hw.pdf_questions) {
                    hw.pdf_questions.forEach(q => {
                        const opts = ['A) ' + q.options.A, 'B) ' + q.options.B, 'C) ' + q.options.C, 'D) ' + q.options.D];
                        allQuestions.push({
                            id: q.id,
                            number: q.number,
                            question: q.question,
                            options: opts,
                            correct: q.correct,
                            accept_also: q.accept_also || null,
                            domain: hw.domain,
                            difficulty: 'course',
                            source: 'practice-exam-pdf',
                            source_label: q.source_label,
                            isHomework: true
                        });
                    });
                }

                // Add PPT questions
                if (sources.includes('ppt') && hw.ppt_questions) {
                    hw.ppt_questions.forEach(q => {
                        const optKeys = Object.keys(q.options).sort();
                        const opts = optKeys.map(k => k + ') ' + q.options[k]);
                        allQuestions.push({
                            id: q.id,
                            number: q.number,
                            question: q.question,
                            options: opts,
                            correct: q.correct,
                            explanation: q.explanation || '',
                            domain: hw.domain,
                            difficulty: 'course',
                            source: 'powerpoint',
                            source_label: q.source_label,
                            isHomework: true
                        });
                    });
                }

                if (allQuestions.length === 0) {
                    alert('No questions selected. Check at least one source.');
                    return;
                }

                this.currentQuiz = {
                    mode: 'homework',
                    questions: allQuestions,
                    bootcampDay: day,
                    startTime: Date.now(),
                    domains: [hw.domain],
                    sessionPerformance: {},
                    domainAccuracy: {}
                };

                this.currentQuestionIndex = 0;
                this.quizAnswers = {};
                this.showQuestion();
                document.getElementById('quizModal').classList.add('active');
            }

            startCustomQuiz() {
                const selectedDomains = Array.from(document.querySelectorAll('input[name="domain"]:checked')).map(el => el.value);
                const selectedDifficulties = Array.from(document.querySelectorAll('input[name="difficulty"]:checked')).map(el => el.value);
                const count = parseInt(document.getElementById('questionCount').value);
                const mode = document.getElementById('quizMode').value;

                if (selectedDomains.length === 0 || selectedDifficulties.length === 0) {
                    alert('Please select at least one domain and difficulty level');
                    return;
                }

                this.startQuiz(selectedDomains, selectedDifficulties, count, mode, null);
            }

            startContinueQuiz() {
                // Continue from weakest domains
                const weakDomains = Object.entries(this.state.domainStats)
                    .sort((a, b) => {
                        const accA = a[1].total > 0 ? a[1].correct / a[1].total : 0;
                        const accB = b[1].total > 0 ? b[1].correct / b[1].total : 0;
                        return accA - accB;
                    })
                    .slice(0, 3)
                    .map(e => e[0]);

                const domains = weakDomains.length > 0 ? weakDomains : Object.keys(DOMAINS);
                this.startQuiz(domains, ['associate', 'professional', 'expert'], 20, 'weak-first', null);
            }

            startQuiz(domains, difficulties, count, mode, bootcampDay) {
                // Filter questions
                const filtered = this.questions.filter(q => 
                    domains.includes(q.domain) && difficulties.includes(q.difficulty)
                );

                if (filtered.length === 0) {
                    alert('No questions match your criteria');
                    return;
                }

                // Shuffle and limit
                const quizQuestions = this.shuffleArray(filtered).slice(0, Math.min(count, filtered.length));

                this.currentQuiz = {
                    questions: quizQuestions,
                    domains,
                    difficulties,
                    mode,
                    bootcampDay,
                    startTime: Date.now(),
                    sessionPerformance: {},
                    domainAccuracy: {}
                };

                this.currentQuestionIndex = 0;
                this.quizAnswers = {};
                this.showQuestion();

                // Hide modals and show quiz
                document.getElementById('quizModal').classList.add('active');
            }

            startReQuiz() {
                const selectedDomains = Array.from(document.querySelectorAll('input[name="rewrongDomain"]:checked')).map(el => el.value);
                const wrongIds = Object.keys(this.state.wrongAnswers).filter(id => {
                    const w = this.state.wrongAnswers[id];
                    return selectedDomains.includes(w.domain) && !w.mastered;
                });

                if (wrongIds.length === 0) {
                    alert('No unmastered wrong answers in the selected domains');
                    return;
                }

                // Shuffle so order varies each time
                for (let i = wrongIds.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [wrongIds[i], wrongIds[j]] = [wrongIds[j], wrongIds[i]];
                }

                this.currentQuiz = {
                    mode: 're-quiz',
                    startTime: Date.now(),
                    wrongIds
                };

                this.currentQuestionIndex = 0;
                this.quizAnswers = {};
                this.showQuestion();

                document.getElementById('quizModal').classList.add('active');
            }

            showQuestion() {
                const quiz = this.currentQuiz;
                const qIndex = this.currentQuestionIndex;

                let question;
                if (quiz.mode === 're-quiz') {
                    const wrongId = quiz.wrongIds[qIndex];
                    const wrongData = this.state.wrongAnswers[wrongId];
                    question = {
                        id: wrongId,
                        question: wrongData.question,
                        domain: wrongData.domain,
                        difficulty: wrongData.difficulty,
                        correct: wrongData.correct,
                        options: wrongData.options || [],
                        explanation: wrongData.explanation,
                        memory_hook: wrongData.memoryHook,
                        isReQuiz: true,
                        wrongData
                    };
                } else {
                    question = quiz.questions[qIndex];
                }

                const isLast = qIndex === (quiz.mode === 're-quiz' ? quiz.wrongIds.length - 1 : quiz.questions.length - 1);
                const progress = qIndex + 1;
                const total = quiz.mode === 're-quiz' ? quiz.wrongIds.length : quiz.questions.length;

                let html = '<div class="quiz-progress">' +
                    '<div class="progress-text">' +
                    '<span>Question ' + progress + ' of ' + total + '</span>' +
                    '<span class="progress-stats">' + (this.quizAnswers[qIndex] ? '✓ Answered' : 'Pending') + '</span>' +
                    '</div>' +
                    '<div class="progress-bar">' +
                    '<div class="progress-fill" style="width: ' + ((progress / total) * 100) + '%"></div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="question-card">' +
                    '<div class="question-header">' +
                    '<div><div class="question-number">' + (question.isHomework ? '#' + question.number : 'Q' + (qIndex + 1)) + '</div></div>' +
                    '<div class="question-meta">' +
                    '<span class="badge domain">' + (question.source_label || question.domain) + '</span>' +
                    '<span class="badge difficulty">' + (question.isHomework ? (question.source === 'powerpoint' ? 'PPT' : 'PDF') : question.difficulty) + '</span>' +
                    '</div>' +
                    '</div>' +
                    '<div class="question-text">' + question.question + '</div>' +
                    '<div class="options">';

                if (question.options && question.options.length > 0) {
                    // Shuffle options for re-quiz
                    const options = quiz.mode === 're-quiz' ? this.shuffleArray([...question.options]) : question.options;
                    
                    options.forEach((option, idx) => {
                        const isSelected = this.quizAnswers[qIndex] === option;
                        const selectedClass = isSelected ? 'selected' : '';
                        const escapedOption = option.replace(/'/g, "\\\'");
                        
                        html += '<label class="option ' + selectedClass + '">' +
                            '<input type="radio" name="answer_' + qIndex + '" value="' + escapedOption + '" onchange="app.selectAnswer(' + qIndex + ', \'' + escapedOption + '\')">' +
                            option +
                            '</label>';
                    });
                } else {
                    html += '<p class="text-muted">No options available for this question</p>';
                }

                html += '</div></div>' +
                    '<div class="flex gap-2" style="justify-content: space-between;">' +
                    '<div>' +
                    '<button class="btn btn-secondary" onclick="app.previousQuestion()" ' + (qIndex === 0 ? 'disabled' : '') + '>' +
                    'Previous' +
                    '</button>' +
                    '</div>' +
                    '<div>' +
                    '<button class="btn btn-primary" onclick="app.nextQuestion()" ' + (!this.quizAnswers[qIndex] ? 'disabled' : '') + '>' +
                    (isLast ? 'Finish' : 'Next') +
                    '</button>' +
                    '</div>' +
                    '</div>';

                document.getElementById('quizContent').innerHTML = html;
            }

            selectAnswer(qIndex, answer) {
                this.quizAnswers[qIndex] = answer;
            }

            nextQuestion() {
                const quiz = this.currentQuiz;
                const isLast = this.currentQuestionIndex === (quiz.mode === 're-quiz' ? quiz.wrongIds.length - 1 : quiz.questions.length - 1);

                if (isLast) {
                    this.finishQuiz();
                } else {
                    this.currentQuestionIndex++;
                    this.showQuestion();
                }
            }

            previousQuestion() {
                if (this.currentQuestionIndex > 0) {
                    this.currentQuestionIndex--;
                    this.showQuestion();
                }
            }

            finishQuiz() {
                const quiz = this.currentQuiz;
                const elapsed = Date.now() - quiz.startTime;
                let correct = 0;
                let wrongIds = [];

                if (quiz.mode === 're-quiz') {
                    quiz.wrongIds.forEach((wrongId, idx) => {
                        const wrongData = this.state.wrongAnswers[wrongId];
                        const userAnswer = this.quizAnswers[idx];
                        
                        if (userAnswer === wrongData.correct) {
                            correct++;
                            wrongData.mastered = true;
                            wrongData.timesAnsweredCorrect = (wrongData.timesAnsweredCorrect || 0) + 1;
                        } else {
                            wrongData.mastered = false;
                            wrongIds.push(wrongId);
                        }
                        wrongData.lastTested = new Date().toISOString().split('T')[0];
                        wrongData.timesWrong = (wrongData.timesWrong || 0) + 1;
                    });
                } else {
                    quiz.questions.forEach((question, idx) => {
                        const userAnswer = this.quizAnswers[idx];
                        const correctOption = question.options.find(o => o.startsWith(question.correct + ')'));

                        // Check if answer is correct (including accept_also for multi-answer questions)
                        let isCorrect = (userAnswer === correctOption);
                        if (!isCorrect && question.accept_also && userAnswer) {
                            const acceptLetters = question.accept_also.split(' or ').map(l => l.trim());
                            const userLetter = userAnswer.charAt(0);
                            isCorrect = acceptLetters.includes(userLetter);
                        }

                        if (isCorrect) {
                            correct++;
                        } else {
                            // Track wrong answer
                            const wrongId = (question.isHomework ? 'hw_' : 'web_') + question.id + '_' + Date.now();
                            this.state.wrongAnswers[wrongId] = {
                                id: wrongId,
                                question: question.question,
                                domain: question.domain,
                                difficulty: question.difficulty,
                                correct: correctOption,
                                options: question.options,
                                explanation: question.explanation || '',
                                memoryHook: question.memory_hook || '',
                                source: question.isHomework ? 'course-material' : 'web-quiz',
                                mastered: false,
                                timesWrong: 1,
                                lastTested: new Date().toISOString().split('T')[0]
                            };
                            wrongIds.push(wrongId);
                        }
                    });

                    // Update domain stats
                    quiz.domains.forEach(domain => {
                        if (!this.state.domainStats[domain]) {
                            this.state.domainStats[domain] = { correct: 0, total: 0, byDifficulty: {} };
                        }
                        const domainQuestions = quiz.questions.filter(q => q.domain === domain);
                        const domainCorrect = domainQuestions.filter(q => {
                            const correctOption = q.options.find(o => o.startsWith(q.correct + ')'));
                            const userAnswer = this.quizAnswers[quiz.questions.indexOf(q)];
                            let match = (userAnswer === correctOption);
                            if (!match && q.accept_also && userAnswer) {
                                const acceptLetters = q.accept_also.split(' or ').map(l => l.trim());
                                match = acceptLetters.includes(userAnswer.charAt(0));
                            }
                            return match;
                        }).length;

                        this.state.domainStats[domain].total += domainQuestions.length;
                        this.state.domainStats[domain].correct += domainCorrect;
                    });

                    // Update CAT levels
                    for (const domain in quiz.domainAccuracy) {
                        const acc = quiz.domainAccuracy[domain];
                        const accuracy = acc.total > 0 ? acc.correct / acc.total : 0;
                        
                        if (accuracy > 0.8) {
                            this.state.catLevels[domain] = 'expert';
                        } else if (accuracy > 0.6) {
                            this.state.catLevels[domain] = 'professional';
                        } else {
                            this.state.catLevels[domain] = 'associate';
                        }
                    }
                }

                const total = quiz.mode === 're-quiz' ? quiz.wrongIds.length : quiz.questions.length;
                const score = Math.round((correct / total) * 100);

                // Update global stats
                this.state.totalAnswered += total;
                this.state.totalCorrect += correct;

                // Add to history
                const historyEntry = {
                    date: new Date().toISOString(),
                    score,
                    correct,
                    total,
                    elapsed,
                    domains: quiz.domains || ['Re-Quiz'],
                    difficulties: quiz.difficulties || ['mixed'],
                    mode: quiz.mode
                };

                this.state.quizHistory.push(historyEntry);
                this.state.lastSessionDate = new Date().toISOString().split('T')[0];
                this.state.lastSessionDomains = quiz.domains || [];

                this.saveState();

                // Show results
                this.showResults(score, correct, total, elapsed, wrongIds);
            }

            showResults(score, correct, total, elapsed, wrongIds) {
                const minutes = Math.round(elapsed / 60000);
                let message = score >= 80 ? 'Excellent work!' : score >= 70 ? 'Good effort!' : score >= 60 ? 'Keep practicing!' : 'Study more and retry';
                
                let html = '<div class="results-container">' +
                    '<div class="results-score">' + score + '%</div>' +
                    '<div class="results-message">' + message + '</div>' +
                    '<div class="results-details">' +
                    '<div class="stat-card"><div class="stat-value">' + correct + '</div><div class="stat-label">Correct</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + (total - correct) + '</div><div class="stat-label">Incorrect</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + minutes + 'm</div><div class="stat-label">Time</div></div>' +
                    '</div>';

                if (wrongIds && wrongIds.length > 0) {
                    html += '<p class="text-muted">You have ' + wrongIds.length + ' question(s) to review. Use "Re-Quiz Wrong" tab to practice them again.</p>';
                } else {
                    html += '<p class="text-success" style="color: var(--success);">Perfect score! Congratulations!</p>';
                }
                html += '</div>';

                document.getElementById('resultsContent').innerHTML = html;
                document.getElementById('quizModal').classList.remove('active');
                document.getElementById('resultsModal').classList.add('active');
            }

            updateRewrongStatus() {
                const wrongIds = Object.keys(this.state.wrongAnswers);
                const container = document.getElementById('rewrongStatus');
                const filterDiv = document.getElementById('rewrongDomainFilter');
                const checkboxDiv = document.getElementById('rewrongDomainCheckboxes');

                if (wrongIds.length === 0) {
                    container.innerHTML = '<p class="text-muted">No wrong answers yet. Complete a quiz first!</p>';
                    document.getElementById('rewrongStartBtn').disabled = true;
                    filterDiv.style.display = 'none';
                    return;
                }

                const unmastered = wrongIds.filter(id => !this.state.wrongAnswers[id].mastered);
                const mastered = wrongIds.length - unmastered.length;

                // Build domain breakdown from wrong answers
                const domainCounts = {};
                const domainUnmastered = {};
                wrongIds.forEach(id => {
                    const w = this.state.wrongAnswers[id];
                    const d = w.domain || 'Unknown';
                    domainCounts[d] = (domainCounts[d] || 0) + 1;
                    if (!w.mastered) {
                        domainUnmastered[d] = (domainUnmastered[d] || 0) + 1;
                    }
                });

                container.innerHTML = '<p><strong>Total Wrong Answers:</strong> ' + wrongIds.length + '</p>' +
                    '<p><strong>Still Learning:</strong> ' + unmastered.length + '</p>' +
                    '<p><strong>Mastered:</strong> ' + mastered + '</p>';

                // Render domain checkboxes with counts
                filterDiv.style.display = 'block';
                let cbHtml = '';
                const sortedDomains = Object.keys(domainCounts).sort((a, b) => (domainUnmastered[b] || 0) - (domainUnmastered[a] || 0));
                sortedDomains.forEach(domain => {
                    const total = domainCounts[domain];
                    const still = domainUnmastered[domain] || 0;
                    const pct = Math.round((still / total) * 100);
                    const barColor = pct > 60 ? 'var(--danger)' : pct > 30 ? 'var(--warning)' : 'var(--success)';
                    cbHtml += '<label style="display: flex; align-items: center; margin-bottom: 0.5rem; cursor: pointer;">' +
                        '<input type="checkbox" name="rewrongDomain" value="' + domain + '" checked onchange="app.updateRewrongCount()" style="margin-right: 0.5rem;">' +
                        '<span style="flex: 1;">' + domain + '</span>' +
                        '<span style="display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">' +
                        '<span style="width: 60px; height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden;">' +
                        '<span style="display:block; width:' + pct + '%; height:100%; background:' + barColor + ';"></span></span>' +
                        still + ' of ' + total + ' unmastered</span>' +
                        '</label>';
                });
                checkboxDiv.innerHTML = cbHtml;

                this.rewrongAutoSelect();
                this.updateRewrongCount();
            }

            rewrongSelectAll(checked) {
                document.querySelectorAll('input[name="rewrongDomain"]').forEach(cb => cb.checked = checked);
                this.updateRewrongCount();
            }

            rewrongAutoSelect() {
                // Auto-select domains with the most unmastered wrong answers
                const wrongIds = Object.keys(this.state.wrongAnswers);
                const domainUnmastered = {};
                wrongIds.forEach(id => {
                    const w = this.state.wrongAnswers[id];
                    if (!w.mastered) {
                        const d = w.domain || 'Unknown';
                        domainUnmastered[d] = (domainUnmastered[d] || 0) + 1;
                    }
                });

                // Select domains that have at least 1 unmastered, prioritize those with most
                const sorted = Object.entries(domainUnmastered).sort((a, b) => b[1] - a[1]);
                const topDomains = sorted.filter(([d, count]) => count > 0).map(([d]) => d);

                document.querySelectorAll('input[name="rewrongDomain"]').forEach(cb => {
                    cb.checked = topDomains.includes(cb.value);
                });
                this.updateRewrongCount();
            }

            updateRewrongCount() {
                const selectedDomains = Array.from(document.querySelectorAll('input[name="rewrongDomain"]:checked')).map(el => el.value);
                const wrongIds = Object.keys(this.state.wrongAnswers).filter(id => {
                    const w = this.state.wrongAnswers[id];
                    return selectedDomains.includes(w.domain) && !w.mastered;
                });
                document.getElementById('rewrongCount').textContent = wrongIds.length;
                document.getElementById('rewrongStartBtn').disabled = wrongIds.length === 0;
            }

            importBank() {
                const content = document.getElementById('bankInput').value;
                const regex = /### Q(\d+) \| Domain (\d+) \|.*?\*\*Question:\*\*\s*(.+?)\n.*?\*\*Correct Answer:\*\*\s*(.+?)\n.*?\*\*Concept:\*\*\s*(.+?)\n.*?\*\*Why Wrong:\*\*\s*(.+?)\n.*?\*\*Memory Hook:\*\*\s*(.+?)\n/gs;

                let match;
                let imported = 0;
                while ((match = regex.exec(content)) !== null) {
                    const qNumber = match[1];
                    const domain = parseInt(match[2]);
                    const question = match[3].trim();
                    const correctAnswer = match[4].trim();
                    const concept = match[5].trim();
                    const whyWrong = match[6].trim();
                    const memoryHook = match[7].trim();

                    const domainNames = Object.keys(DOMAINS);
                    const domainName = domainNames[domain - 1];
                    const wrongId = 'bank_' + qNumber + '_' + domain;

                    if (!this.state.wrongAnswers[wrongId]) {
                        this.state.wrongAnswers[wrongId] = {
                            id: wrongId,
                            question,
                            domain: domainName || 'Unknown',
                            difficulty: 'professional',
                            correct: correctAnswer,
                            options: [],
                            explanation: whyWrong,
                            memoryHook,
                            source: 'bank',
                            mastered: false,
                            timesWrong: 1,
                            lastTested: new Date().toISOString().split('T')[0]
                        };
                        imported++;
                    }
                }

                this.saveState();
                document.getElementById('bankStatus').innerHTML = '<p style="color: var(--success); margin-top: 1rem;">✓ Imported ' + imported + ' question(s) from WRONG-ANSWER-BANK.md</p>';

                setTimeout(() => {
                    document.getElementById('bankInput').value = '';
                    document.getElementById('bankStatus').innerHTML = '';
                }, 3000);
            }

            updateHistory() {
                const container = document.getElementById('historyContent');
                
                if (this.state.quizHistory.length === 0) {
                    container.innerHTML = '<p class="text-muted">No quiz history yet.</p>';
                    return;
                }

                let html = '';
                const reversed = [...this.state.quizHistory].reverse();
                reversed.forEach(entry => {
                    const date = new Date(entry.date);
                    const dateStr = date.toLocaleDateString();
                    const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    html += '<div class="history-row">' +
                        '<div class="history-date">' + dateStr + '</div>' +
                        '<div class="history-score">' + entry.score + '%</div>' +
                        '<div class="text-muted">' + entry.correct + '/' + entry.total + '</div>' +
                        '<div class="text-muted">' + entry.domains.join(', ') + '</div>' +
                        '<div class="text-muted">' + timeStr + '</div>' +
                        '</div>';
                });

                container.innerHTML = html;
            }

            exportSessionResults() {
                const lastSession = this.state.quizHistory[this.state.quizHistory.length - 1];
                if (!lastSession) return;

                const wrongAnswersForSession = Object.values(this.state.wrongAnswers)
                    .filter(w => w.source === 'web-quiz' && w.lastTested === new Date().toISOString().split('T')[0])
                    .slice(-lastSession.total + lastSession.correct);

                let markdown = '## ' + new Date().toLocaleDateString() + ' — Domains ' + lastSession.domains.join(', ') + '\n';
                markdown += '<!-- Generated: ' + new Date().toLocaleDateString() + ' | Entries: ' + wrongAnswersForSession.length + ' | Domains: ' + lastSession.domains.join(', ') + ' -->\n\n';

                wrongAnswersForSession.forEach(w => {
                    markdown += '### Q | ' + DOMAINS[w.domain] + '\n';
                    markdown += '**Question:** ' + w.question + '\n';
                    markdown += '**Correct Answer:** ' + w.correct + '\n';
                    markdown += '**Difficulty:** ' + w.difficulty + '\n';
                    markdown += '**Concept:** [concept]\n';
                    markdown += '**Why Wrong:** ' + w.explanation + '\n';
                    markdown += '**Memory Hook:** ' + (w.memoryHook || '[Your memory hook]') + '\n';
                    markdown += '**Mastered:** No\n';
                    markdown += '**Times Wrong:** 1\n';
                    markdown += '**Last Tested:** ' + new Date().toISOString().split('T')[0] + '\n\n';
                });

                this.showExportModal(markdown);
            }

            showExportModal(content) {
                const modal = document.createElement('div');
                modal.className = 'modal active';
                modal.innerHTML = '<div class="modal-content">' +
                    '<h2>Export Results for WRONG-ANSWER-BANK.md</h2>' +
                    '<div class="code-block" style="position: relative; margin: 1rem 0;">' +
                    '<button class="copy-btn" onclick="this.textContent=\'Copied!\'; setTimeout(() => this.textContent=\'Copy\', 2000); navigator.clipboard.writeText(document.querySelector(\'.code-content\').textContent)">Copy</button>' +
                    '<div class="code-content">' + content + '</div>' +
                    '</div>' +
                    '<div class="modal-footer">' +
                    '<button class="btn btn-secondary" onclick="this.closest(\'.modal\').remove()">Close</button>' +
                    '</div>' +
                    '</div>';
                document.body.appendChild(modal);
            }

            exportState() {
                const data = JSON.stringify(this.state, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'cissp-state-' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
            }

            importState() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const imported = JSON.parse(event.target.result);
                            this.state = Object.assign({}, this.state, imported);
                            this.saveState();
                            alert('State imported successfully!');
                            location.reload();
                        } catch (error) {
                            alert('Failed to import state: ' + error.message);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            closeModal() {
                document.getElementById('quizModal').classList.remove('active');
                document.getElementById('resultsModal').classList.remove('active');
            }

            shuffleArray(arr) {
                const shuffled = [...arr];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const temp = shuffled[i];
                    shuffled[i] = shuffled[j];
                    shuffled[j] = temp;
                }
                return shuffled;
            }
        }

        // Initialize app
        const app = new CISSPStudyApp();

        // Close modals on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                app.closeModal();
            }
        });
    
    </script>
</body>
</html>
